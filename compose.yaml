services:
  demo-os-db:
    image: pgvector/pgvector:pg16
    container_name: demo-os-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-ai}
      POSTGRES_PASSWORD: ${DB_PASS:-ai}
      POSTGRES_DB: ${DB_DATABASE:-ai}
    volumes:
      - /volume3/docker/volumes/agno-demo-os/pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - demo-os

  demo-os-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_NAME:-demo-os}:${IMAGE_TAG:-latest}
    container_name: demo-os-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Hot-reload: mount source code
      - .:/app
      # Enterprise skills (read-only)
      - /volume3/docker/volumes/agno-demo-os/skills:/app/enterprise/skills:ro
      # Property demo data persistence
      - /volume1/docker/volumes/agno-demo-os/property-data:/app/data
    environment:
      - RUNTIME_ENV=dev
      - AGNO_DEBUG=True
      - PYTHONPATH=/app
      - AGENTOS_URL=http://127.0.0.1:8000
      # Database
      - DB_HOST=demo-os-db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-ai}
      - DB_PASS=${DB_PASS:-ai}
      - DB_DATABASE=${DB_DATABASE:-ai}
      - WAIT_FOR_DB=True
      - PRINT_ENV_ON_LOAD=${PRINT_ENV_ON_LOAD:-False}
      # Property demo data directory
      - PROPERTY_DATA_DIR=/app/data
      # Runtime default chat model for owner-facing Router / vertical Agents.
      # Pro is reserved for A/B tests and Darwin deep-fix only.
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL_ID=${DEEPSEEK_MODEL_ID:-deepseek-v4-flash}
      # Optional API keys
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - EXA_API_KEY=${EXA_API_KEY:-}
      - PARALLEL_API_KEY=${PARALLEL_API_KEY:-}
      - ELEVEN_LABS_API_KEY=${ELEVEN_LABS_API_KEY:-}
      - FAL_KEY=${FAL_KEY:-}
      - LUMAAI_API_KEY=${LUMAAI_API_KEY:-}
      # Voyager — flight search (Duffel) + itinerary email (Resend), optional
      - DUFFEL_API_TOKEN=${DUFFEL_API_TOKEN:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - VOYAGER_FROM_EMAIL=${VOYAGER_FROM_EMAIL:-}
      # Slack (optional)
      - SLACK_TOKEN=${SLACK_TOKEN:-}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
    depends_on:
      - demo-os-db
    networks:
      - demo-os
    extra_hosts:
      - "host.docker.internal:host-gateway"


  demo-os-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: demo-os-web
    restart: unless-stopped
    ports:
      - "18005:80"
    depends_on:
      - demo-os-api
    networks:
      - demo-os

networks:
  demo-os:
