      async function openAgentModal(agent = null) {
        const isEdit = !!agent;
        const isSeededRouter = isEdit && agent.agent_id === 'router' && agent.is_router;
        const title = isEdit ? (isSeededRouter ? '编辑路由策略' : '编辑 Agent') : '新增 Agent';
        const selectedSkillNames = (agent && agent.available_skills || []).map(s => (typeof s === 'object' && s !== null ? (s.name || '') : String(s))).filter(Boolean);
        let skills = [];
        let mcpTools = [];
        let knowledgeDocs = [];
        try {
          const [skillsData, mcpData, knowledgeData] = await Promise.all([
            apiGet('/api/skills'),
            apiGet('/api/mcp-servers'),
            apiGet('/api/knowledge/docs')
          ]);
          skills = (skillsData.skills || []).map(s => ({ value: s.name, label: `${s.name} (${s.category || '未分类'})` }));
          knowledgeDocs = (knowledgeData.knowledge_docs || [])
            .filter(doc => doc.source_type !== 'demo_test' && doc.is_indexed)
            .map(doc => ({ value: String(doc.id), label: `${doc.title}（${doc.chunk_count || 0} 分片）` }));
          // Bindings are stored at MCP Server level (tool_name = server name).  Only
          // enabled servers with at least one successfully discovered tool are shown
          // as bindable; disabled / test / tool-less servers are hidden by default.
          const toolPromises = (mcpData.mcp_servers || [])
            .filter(serv => serv.enabled)
            .map(async serv => {
              const tools = serv.tools || (await apiGet(`/api/mcp-servers/${serv.id}/tools`)).tools || [];
              if (!tools.length) return null;
              const toolDescs = tools.map(t => `${t.name}${t.description ? '：' + t.description : ''}`).join('；');
              return { value: serv.name, label: `${serv.name}（${toolDescs}）` };
            });
          mcpTools = (await Promise.all(toolPromises)).filter(Boolean);
        } catch (err) {
          console.error('加载 Agent 选项失败', err);
        }

        // Build router members section when viewing the seeded router.
        let routerMembersHtml = '';
        if (isSeededRouter) {
          const members = cachedAgents.filter(a => !a.is_router && a.enabled);
          routerMembersHtml = `
            <div class="mt-5">
              <h4 class="text-sm font-semibold text-slate-900 mb-2">当前路由成员</h4>
              ${members.length === 0 ? '<p class="text-xs text-slate-400">暂无启用的垂直 Agent</p>' : `
              <div class="space-y-2 max-h-64 overflow-y-auto pr-1">
                ${members.map(m => `
                  <div class="bg-slate-50 rounded-xl p-3 border border-slate-200">
                    <div class="flex items-center justify-between mb-1">
                      <span class="text-sm font-medium text-slate-900">${escapeHtml(m.name)}</span>
                      <span class="text-xs px-2 py-0.5 rounded-full ${m.enabled ? 'bg-brand-50 text-brand-600' : 'bg-slate-100 text-slate-400'}">${m.enabled ? '启用' : '禁用'}</span>
                    </div>
                    <p class="text-xs text-slate-500 mb-1.5">${escapeHtml(m.description || '-')}</p>
                    <div class="text-xs text-slate-600 space-y-0.5">
                      <div><span class="text-slate-400">绑定 Skill：</span>${(m.available_skills || []).length ? escapeHtml((m.available_skills || []).map(s => (typeof s === 'object' && s !== null ? (s.name || '') : String(s))).filter(Boolean).join('、')) : '无'}</div>
                      <div><span class="text-slate-400">绑定 MCP：</span>${(m.available_mcp_tools || []).length ? escapeHtml((m.available_mcp_tools || []).join('、')) : '无'}</div>
                    </div>
                  </div>
                `).join('')}
              </div>`}
            </div>
          `;
        }

        let body;
        if (isSeededRouter) {
          body = `
            <div class="space-y-4 text-sm">
              <div class="bg-slate-50 rounded-xl p-3 border border-slate-200">
                <div class="flex justify-between mb-1"><span class="text-slate-500">名称</span><span class="font-medium text-slate-900">${escapeHtml(agent.name)}</span></div>
                <div class="flex justify-between mb-1"><span class="text-slate-500">agent_id</span><span class="font-mono text-slate-700">${escapeHtml(agent.agent_id)}</span></div>
                <div class="flex justify-between mb-1"><span class="text-slate-500">类型</span><span class="text-xs px-2 py-0.5 rounded-full bg-indigo-50 text-indigo-600">路由</span></div>
                <div class="flex justify-between mb-1"><span class="text-slate-500">状态</span><span>${agent.enabled ? '启用' : '禁用'}</span></div>
              </div>
              ${formInput('名称', 'agent-name', agent ? agent.name : '', '路由 Agent 名称')}
              ${formInput('描述', 'agent-description', agent ? agent.description : '', '简短描述路由 Agent 职责')}
              ${formTextarea('System Prompt', 'agent-system-prompt', agent ? agent.system_prompt : '', '定义路由 Agent 的系统提示词；运行时会自动附加当前启用垂直 Agent 清单与 JSON 输出契约', 5)}
              ${routerMembersHtml}
            </div>
          `;
          openModal(title, body, async () => {
            const payload = {
              name: $('#agent-name').value.trim(),
              description: $('#agent-description').value.trim(),
              system_prompt: $('#agent-system-prompt').value.trim(),
            };
            if (!payload.name || !payload.system_prompt) {
              showToast('名称和 System Prompt 不能为空', 'error');
              return;
            }
            try {
              await apiPut(`/api/agents/${agent.id}`, payload);
              showToast('路由策略已更新');
              closeModal();
              await loadAgents();
            } catch (err) {
              showToast('保存失败，请重试', 'error');
            }
          });
          return;
        }

        const runtimeNote = `
          <div class="mb-4 rounded-xl border border-brand-100 bg-brand-50 p-3 text-xs text-brand-800">
            <div class="font-semibold mb-1">运行时动态注入</div>
            <div>保存只更新平台 Draft。请到“V1.8 运行时发布”校验并发布；之后该 Agent、Skill、MCP 与 RAG 绑定仅在下一新会话生效，已有会话不热切换。</div>
          </div>`;
        const selectedKnowledgeIds = agent
          ? (agent.knowledge_doc_ids === null
            ? knowledgeDocs.map(item => item.value)
            : (agent.knowledge_doc_ids || []).map(String))
          : [];
        body = `
          ${runtimeNote}
          ${formInput('名称', 'agent-name', agent ? agent.name : '', '如：维修报修 Agent')}
          ${formInput('描述', 'agent-description', agent ? agent.description : '', '简短描述 Agent 职责')}
          ${formTextarea('System Prompt', 'agent-system-prompt', agent ? agent.system_prompt : '', '定义该 Agent 的系统提示词', 5)}
          ${formCheckboxGroup('可用 Skill', 'agent-skills', skills, agent ? selectedSkillNames : [])}
          ${formCheckboxGroup('可用 MCP Server（展开查看可调用工具）', 'agent-mcp-tools', mcpTools, agent ? agent.available_mcp_tools : [])}
          ${formCheckboxGroup('可用 RAG 文档（发布快照固定）', 'agent-knowledge-docs', knowledgeDocs, selectedKnowledgeIds)}
        `;
        openModal(title, body, async () => {
          const payload = {
            name: $('#agent-name').value.trim(),
            description: $('#agent-description').value.trim(),
            system_prompt: $('#agent-system-prompt').value.trim(),
            available_skills: Array.from(document.querySelectorAll('input[name="agent-skills"]:checked')).map(cb => cb.value),
            available_mcp_tools: Array.from(document.querySelectorAll('input[name="agent-mcp-tools"]:checked')).map(cb => cb.value),
            knowledge_doc_ids: Array.from(document.querySelectorAll('input[name="agent-knowledge-docs"]:checked')).map(cb => Number(cb.value)),
            enabled: true
          };
          if (!payload.name || !payload.system_prompt) {
            showToast('名称和 System Prompt 不能为空', 'error');
            return;
          }
          try {
            if (isEdit) {
              await apiPut(`/api/agents/${agent.id}`, payload);
              showToast('Agent Draft 已更新；请发布 RuntimeRelease');
            } else {
              await apiPost('/api/agents', payload);
              showToast('Agent Draft 已创建；请绑定能力并发布 RuntimeRelease');
            }
            closeModal();
            await loadAgents();
          } catch (err) {
            showToast('保存失败，请重试', 'error');
          }
        });
      }

      async function editAgent(agentId) {
        try {
          const data = await apiGet(`/api/agents/${agentId}`);
          openAgentModal(data.agent);
        } catch (err) {
          showToast('加载 Agent 失败', 'error');
        }
      }

      async function deleteAgent(agentId) {
        if (!confirm('确定要删除这个 Agent 吗？')) return;
        try {
          await apiDelete(`/api/agents/${agentId}`);
          showToast('Agent 已从 Draft 删除；已发布会话快照不受影响');
          await loadAgents();
        } catch (err) {
          showToast('删除失败，请重试', 'error');
        }
      }

      $('#agent-add-btn').addEventListener('click', () => openAgentModal());
      await loadAgents();
    }

      function openSkillModal(skill = null) {
        const isEdit = !!skill;
        const title = isEdit ? '编辑 Skill' : '新增 Skill';
        const meta = (skill && skill.skill_metadata) || {};
        const asTerms = value => Array.isArray(value) ? value.join('、') : (value || '');
        const body = `
          ${formInput('名称', 'skill-name', skill ? skill.name : '', '如：维修工单处理')}
          ${formInput('分类', 'skill-category', skill ? skill.category : '', '如：业务技能、系统技能')}
          ${formInput('描述', 'skill-description', skill ? skill.description : '', '简短描述 Skill 用途')}

          ${formInput('正向触发', 'skill-trigger', skill ? (skill.trigger_condition || asTerms(meta.positive_triggers)) : '', '逗号分隔，如：报修、漏水、查询工单')}

          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            ${formSwitch('允许同冲突组叠加', 'skill-composable', !!meta.composable)}
            ${formSwitch('默认注入（谨慎）', 'skill-always-on', !!meta.always_on)}
          </div>
          ${formInput('工具提示（可选）', 'skill-tool-hints', asTerms(meta.tool_hints), '仅提示 SOP；真实工具权限仍由 Agent MCP 绑定决定')}
          ${formTextarea('输入契约（可选）', 'skill-input-contract', meta.input_contract || '', '此 Skill 需要哪些信息；信息缺失时如何追问', 3)}
          ${formTextarea('输出契约（可选）', 'skill-output-contract', meta.output_contract || '', '输出必须包含什么；哪些动作必须等待用户确认', 3)}
          ${formTextarea('指令 (Instructions)', 'skill-instructions', skill ? skill.instructions : '', '定义 Skill 的系统提示词与行为约束', 6)}
        `;
        openModal(title, body, async () => {
          const splitTerms = value => value.split(/[，、,;；|]+/).map(item => item.trim()).filter(Boolean);
          const existingMetadata = meta || {};
          const payload = {
            name: $('#skill-name').value.trim(),
            category: $('#skill-category').value.trim() || '未分类',
            description: $('#skill-description').value.trim(),
            instructions: $('#skill-instructions').value.trim(),
            trigger_condition: $('#skill-trigger').value.trim(),
            enabled: $('#skill-enabled').checked,
            skill_metadata: {
              ...existingMetadata,
              positive_triggers: splitTerms($('#skill-trigger').value),
              negative_triggers: splitTerms($('#skill-negative-trigger').value),
              priority: Number($('#skill-priority').value || 50),
              conflict_group: $('#skill-conflict-group').value.trim(),
              composable: $('#skill-composable').checked,
              always_on: $('#skill-always-on').checked,
              tool_hints: splitTerms($('#skill-tool-hints').value),
              input_contract: $('#skill-input-contract').value.trim(),
              output_contract: $('#skill-output-contract').value.trim()
            }
          };
          if (!payload.name) {
            showToast('Skill 名称不能为空', 'error');
            return;
          }
          try {
            if (isEdit) {
              await apiPut(`/api/skills/${skill.id}`, payload);
               showToast('Skill Draft 已更新；请发布 RuntimeRelease');
            } else {
              await apiPost('/api/skills', payload);
               showToast('Skill Draft 已创建；请绑定 Agent 并发布 RuntimeRelease');
            }
            closeModal();
            await loadSkills();
          } catch (err) {
            showToast('保存失败，请重试', 'error');
          }

      async function exportSkill(skillId) {
        try {
          const res = await fetch(`${API_BASE}/api/skills/${skillId}/export`);
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `skill-${skillId}.zip`;
          a.click();
          URL.revokeObjectURL(url);
          showToast('Skill 导出成功');
        } catch (err) {
          showToast('导出失败', 'error');
        }
      }

      async function manageSkillFiles(skillId) {
        try {
          const data = await apiGet(`/api/skills/${skillId}/files`);
          const files = data.files || [];
          const body = `
            <div class="space-y-4">
              <div class="flex gap-2">
                <input type="file" id="skill-file-input" class="flex-1 text-sm">
                <button type="button" id="skill-file-upload" class="px-3 py-2 bg-brand-600 text-white rounded-lg text-xs">上传</button>
              </div>
              <div class="space-y-2 max-h-80 overflow-y-auto">
                ${files.length === 0 ? '<p class="text-sm text-slate-500">暂无文件</p>' : files.map(f => `
                  <div class="flex items-center justify-between bg-slate-50 rounded-lg p-2 border border-slate-200">
                    <span class="text-sm text-slate-700">${escapeHtml(f)}</span>
                    <button type="button" data-path="${escapeHtml(f)}" class="skill-file-delete text-xs text-red-600 hover:underline">删除</button>
                  </div>
                `).join('')}
              </div>
            </div>
          `;
          openModal('Skill 文件管理', body, null, '关闭');

          $('#skill-file-upload')?.addEventListener('click', async () => {
            const input = $('#skill-file-input');
            if (!input.files || input.files.length === 0) return;
            const form = new FormData();
            form.append('file', input.files[0]);
            try {
              const res = await fetch(`${API_BASE}/api/skills/${skillId}/files`, { method: 'POST', body: form });
              if (!res.ok) throw new Error('HTTP ' + res.status);
              showToast('上传成功');
              closeModal();
              await manageSkillFiles(skillId);
            } catch (err) {
              showToast('上传失败', 'error');
            }
          });

          $$('.skill-file-delete').forEach(btn => {
            btn.addEventListener('click', async () => {
              if (!confirm('确定删除该文件？')) return;
              try {
                await apiDelete(`/api/skills/${skillId}/files/${encodeURIComponent(btn.dataset.path)}`);
                showToast('删除成功');
                closeModal();
                await manageSkillFiles(skillId);
              } catch (err) {
                showToast('删除失败', 'error');
              }
            });
          });
        } catch (err) {
          showToast('加载文件失败', 'error');
        }
      }

      function bindMcpActions() {
        $$('.mcp-discover-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            const serverId = Number(btn.dataset.id);
            const original = btn.textContent;
            btn.disabled = true;
            btn.textContent = '连接中…';
            try {
              const result = await apiPost(`/api/mcp-servers/${serverId}/discover`, {});
              showToast(`连接成功，已发现 ${result.count || 0} 个 Tool`, 'success');
              await loadMcpServers();
              await viewMcpTools(serverId);
            } catch (err) {
              showToast('连接或工具发现失败：' + (err.message || err), 'error');
              await loadMcpServers();
            } finally {
              btn.disabled = false;
              btn.textContent = original;
            }
          });
        });
        $$('.mcp-tools-btn').forEach(btn => {
          btn.addEventListener('click', () => viewMcpTools(Number(btn.dataset.id)));
        });
        $$('.mcp-edit-btn').forEach(btn => {
          btn.addEventListener('click', () => editMcpServer(Number(btn.dataset.id)));
        });
        $$('.mcp-delete-btn').forEach(btn => {
          btn.addEventListener('click', () => deleteMcpServer(Number(btn.dataset.id)));
        });
        $$('.mcp-toggle').forEach(toggle => {
          toggle.addEventListener('change', async () => {
            const serverId = Number(toggle.dataset.id);
            const enabled = toggle.checked;
            try {
              const data = await apiGet(`/api/mcp-servers/${serverId}`);
              const server = data.mcp_server;
              await apiPut(`/api/mcp-servers/${serverId}`, {
                name: server.name,
                command: server.command,
                args: server.args,
                env: server.env,
                description: server.description,
                enabled: enabled
              });
              showToast(`MCP Server Draft 已${enabled ? '启用' : '禁用'}；请发布 RuntimeRelease`);
              await loadMcpServers();
            } catch (err) {
              showToast('状态更新失败', 'error');
              toggle.checked = !enabled;
            }
          });
        });
      }

        const isEdit = !!server;
        const title = isEdit ? '编辑 MCP Server 高级设置' : '高级手动配置 MCP Server';
        const body = `
          <div class="rounded-xl border border-amber-200 bg-amber-50 p-3 text-xs text-amber-900">

          ${formInput('名称', 'mcp-name', server ? server.name : '', '如：weather-server')}

          ${formInput('环境变量 (JSON 对象)', 'mcp-env', server ? JSON.stringify(server.env || {}) : '{}', '如：{"API_KEY": "xxx"}')}
          ${formInput('描述', 'mcp-description', server ? server.description : '', '描述该 MCP Server 用途')}
          ${formSwitch('启用', 'mcp-enabled', server ? server.enabled : true)}
        `;
        openModal(title, body, async () => {
          let args, env;
          try {
            args = JSON.parse($('#mcp-args').value.trim() || '[]');
            env = JSON.parse($('#mcp-env').value.trim() || '{}');
          } catch (e) {
            showToast('参数或环境变量 JSON 格式错误', 'error');
            return;
          }
          const payload = {
            name: $('#mcp-name').value.trim(),
            command: $('#mcp-command').value.trim(),
            args: args,
            env: env,
            description: $('#mcp-description').value.trim(),
            enabled: $('#mcp-enabled').checked
          };
          if (!payload.name) {
            showToast('名称不能为空', 'error');
            return;
          }
          try {
            if (isEdit) {
              await apiPut(`/api/mcp-servers/${server.id}`, payload);
              showToast('MCP Server Draft 已更新；正在重新连接并发现 Tool');
              await apiPost(`/api/mcp-servers/${server.id}/discover`, {});
            } else {
              const created = await apiPost('/api/mcp-servers', payload);
              const createdId = (created.mcp_server || {}).id;
              if (!createdId) throw new Error('创建结果缺少 Server ID');
              showToast('MCP Server Draft 已创建；正在连接并发现 Tool');
              await apiPost(`/api/mcp-servers/${createdId}/discover`, {});
            }
            closeModal();
            showToast('连接成功；请确认 Tool 的只读/写入模板', 'success');
            await loadMcpServers();
          } catch (err) {
            showToast('保存或连接失败：' + (err.message || err), 'error');
          }
        });
      }

            <details class="rounded-xl border border-slate-200 p-3">
              <summary class="text-sm font-medium text-slate-700 cursor-pointer">高级设置：运行所需环境变量</summary>
              <div class="mt-3">${formTextarea('环境变量 JSON（可选）', 'mcp-git-env', '{}', '只有仓库明确要求 API Key 时才填写', 4)}</div>
            </details>
            <div id="mcp-git-progress" class="hidden rounded-xl border border-indigo-100 bg-indigo-50 p-3 text-xs text-indigo-800"></div>
          </div>
        `;
        openModal('从 Git 导入 MCP', body, async () => {
          const gitUrl = $('#mcp-git-url').value.trim();
          if (!gitUrl) {
            showToast('请粘贴公开 Git 仓库地址', 'error');
            return;
          }
          let env;
          try {
            env = JSON.parse($('#mcp-git-env').value.trim() || '{}');
          } catch (_) {
            showToast('环境变量必须是 JSON 对象', 'error');
            return;
          }
          const progress = $('#mcp-git-progress');
          const confirmButton = $('#modal-confirm');
          progress.classList.remove('hidden');
          progress.textContent = '正在下载仓库、识别运行环境并安装依赖；首次导入可能需要几十秒，请不要关闭页面。';
          confirmButton.disabled = true;
          confirmButton.textContent = '正在导入…';
          try {
            const result = await apiPost('/api/mcp-servers/import-git', {
              git_url: gitUrl,
              name: $('#mcp-git-name').value.trim(),
              description: $('#mcp-git-description').value.trim(),
              runtime_type: $('#mcp-git-runtime').value,
              env
            });
            const server = result.mcp_server || {};
            closeModal();
            await loadMcpServers();
            showToast(`导入成功：${server.name || 'MCP'}，已发现 ${result.count || 0} 个 Tool`, 'success');
            if (server.id) await viewMcpTools(Number(server.id));
          } catch (err) {
            progress.className = 'rounded-xl border border-red-200 bg-red-50 p-3 text-xs text-red-700';
            progress.textContent = err.message || String(err);
            confirmButton.disabled = false;
            confirmButton.textContent = '重试导入';
          }
        }, '开始导入');
      }

      async function viewMcpTools(serverId) {
        try {
          const [data, contractData] = await Promise.all([
            apiGet(`/api/mcp-servers/${serverId}/tools`),
            apiGet('/api/mcp-contracts'),
          ]);
          const server = data.mcp_server || {};
          const tools = data.tools || [];
          const contract = (contractData.servers || []).find(item => item.server_id === serverId) || {};
          const contractTools = Object.fromEntries((contract.tools || []).map(item => [item.name, item]));
          const nextStepActions = `
            <div class="sticky top-0 z-10 mb-3 rounded-xl border border-brand-100 bg-white/95 p-3 shadow-sm backdrop-blur">
              <div class="text-xs font-medium text-slate-700 mb-2">完成 Tool 模板后继续</div>
              <div class="grid grid-cols-2 gap-2">
                <button id="mcp-go-bind-agent" class="text-xs px-3 py-2 rounded-lg bg-brand-600 text-white">下一步：绑定 Agent</button>
                <button id="mcp-go-runtime-publish" class="text-xs px-3 py-2 rounded-lg bg-indigo-600 text-white">最后：校验并发布</button>
              </div>
              <p class="mt-2 text-[10px] text-slate-500">绑定时编辑目标垂直 Agent 并勾选此 MCP；发布只影响下一次新会话。</p>
            </div>`;
          const body = nextStepActions + (tools.length === 0
            ? '<p class="text-sm text-slate-500">该 MCP Server 暂未返回工具列表，请先返回列表点击“连接并刷新 Tool”。</p>'
              : `<div class="space-y-3">${tools.map(t => {
                const metadata = t.effective_runtime_metadata || t.tool_metadata || {};
                const suggestedEffect = metadata.effect && metadata.effect !== 'unknown'
                  ? metadata.effect
                  : (metadata.effect_suggestion || 'read');
                const defaultIntent = (metadata.natural_language_intents || []).join('、') || t.description || t.name;
                const defaultTriggers = (metadata.trigger_keywords || []).join('、') || t.name.replace(/[_-]+/g, ' ');
                const editableContract = {
                  effect: metadata.effect || 'unknown',
                  risk_level: metadata.risk_level || 'L1',
                  result_contract: metadata.result_contract || {
                    success_statuses: ['success'],
                    non_success_statuses: ['empty','not_found','invalid_input','unauthorized','timeout','upstream_error','unknown'],
                    claim_rule: 'Only an explicit success business status may be described as success.'
                  },
                  natural_language_intents: metadata.natural_language_intents || [],
                  trigger_keywords: metadata.trigger_keywords || [],
                  trigger_mode: metadata.trigger_mode || 'any',
                  execution_mode: metadata.execution_mode || 'model_native',
                  argument_bindings: metadata.argument_bindings || {}
                };
                return `
                <div class="bg-slate-50 rounded-xl p-3 border border-slate-200">
                  <div class="flex items-center justify-between mb-1">
                    <span class="text-sm font-medium text-slate-900">${escapeHtml(t.name)}</span>
                    <span class="text-xs px-2 py-0.5 bg-brand-50 text-brand-600 rounded-full">${escapeHtml(t.type || 'tool')}</span>
                  </div>
                  <p class="text-xs text-slate-600 mb-2">${escapeHtml(t.description || '暂无描述')}</p>
                  ${contractTools[t.name]?.policy?.purpose ? `<p class="text-xs text-slate-500 mb-2">调用目的：${escapeHtml(contractTools[t.name].policy.purpose)}</p>` : ''}
                  <p class="text-xs text-slate-500 mb-2">允许 Agent：${escapeHtml((contractTools[t.name]?.allowed_by || []).join('、') || '当前无正式运行时授权')}</p>
                  <div class="rounded-xl border border-white bg-white p-3 space-y-3 mb-2">
                    <div>
                      <label class="block text-xs font-medium text-slate-700 mb-1">这个 Tool 是什么类型？</label>
                      <select class="mcp-template-effect w-full border border-slate-200 rounded-lg px-3 py-2 text-sm" data-tool-id="${t.id}">
                        <option value="read" ${suggestedEffect === 'read' ? 'selected' : ''}>只读查询（可直接调用）</option>
                        <option value="create" ${suggestedEffect === 'create' ? 'selected' : ''}>新增/写入（必须确认）</option>
                        <option value="update" ${suggestedEffect === 'update' ? 'selected' : ''}>更新（必须确认）</option>
                        <option value="unknown" ${suggestedEffect === 'unknown' ? 'selected' : ''}>暂不授权</option>
                      </select>
                    </div>
                    <div>
                      <label class="block text-xs font-medium text-slate-700 mb-1">用户通常会怎么说？</label>
                      <input class="mcp-template-intents w-full border border-slate-200 rounded-lg px-3 py-2 text-sm" data-tool-id="${t.id}" value="${escapeHtml(defaultIntent)}" placeholder="例如：查询目标星体的观测窗口">
                    </div>
                    <div>
                      <label class="block text-xs font-medium text-slate-700 mb-1">触发词（逗号分隔）</label>
                      <input class="mcp-template-triggers w-full border border-slate-200 rounded-lg px-3 py-2 text-sm" data-tool-id="${t.id}" value="${escapeHtml(defaultTriggers)}" placeholder="例如：观测窗口、明晚、凌日">
                    </div>
                    <button class="mcp-template-save w-full text-xs px-3 py-2 rounded-lg bg-brand-600 text-white" data-tool-id="${t.id}">保存此 Tool 模板</button>
                  </div>
                  <details class="mb-2">
                    <summary class="text-xs text-slate-500 cursor-pointer">高级运行契约 JSON</summary>
                    <label class="block text-xs text-slate-500 mt-2">
                      <textarea class="mcp-runtime-contract mt-1 w-full font-mono text-[10px] border border-slate-200 rounded-lg p-2 bg-white" rows="12" data-tool-id="${t.id}">${escapeHtml(JSON.stringify(editableContract, null, 2))}</textarea>
                    </label>
                    <button class="mcp-runtime-policy-save mt-2 text-xs px-3 py-1.5 rounded-lg bg-slate-800 text-white" data-tool-id="${t.id}">保存高级 JSON</button>
                  </details>
                  <p class="text-[10px] text-slate-500 mb-2">只读 Tool 可由模型调用；新增/更新 Tool 会被后端强制改为 Proposal，用户确认前不会执行。</p>
                  ${t.input_schema ? `<pre class="text-[10px] bg-white rounded-lg p-2 border border-slate-200 overflow-x-auto">${escapeHtml(JSON.stringify(t.input_schema, null, 2))}</pre>` : ''}
                </div>
              `}).join('')}</div>`);
          openDrawer(`${escapeHtml(server.name || 'MCP Server')} 工具列表`, body);
          $('#mcp-go-bind-agent')?.addEventListener('click', () => {
            closeDrawer();
            queueNavigation('platform', 'agents', '前往 Agent 绑定');
          });
          $('#mcp-go-runtime-publish')?.addEventListener('click', () => {
            closeDrawer();
            queueNavigation('platform', 'runtime', '前往运行时发布');
          });
          const splitTerms = value => String(value || '').split(/[，、,;；|]+/).map(item => item.trim()).filter(Boolean);
          $$('.mcp-template-save').forEach(button => {
            button.addEventListener('click', async () => {
              const toolId = Number(button.dataset.toolId);
              const effect = document.querySelector(`.mcp-template-effect[data-tool-id="${toolId}"]`).value;
              const intents = splitTerms(document.querySelector(`.mcp-template-intents[data-tool-id="${toolId}"]`).value);
              const triggers = splitTerms(document.querySelector(`.mcp-template-triggers[data-tool-id="${toolId}"]`).value);
              const payload = {
                effect,
                risk_level: effect === 'read' ? 'L1' : effect === 'unknown' ? 'L3' : 'L2',
                result_contract: {
                  success_statuses: ['success'],
                  non_success_statuses: ['empty','not_found','invalid_input','unauthorized','timeout','upstream_error','unknown'],
                  claim_rule: 'Only an explicit success business status may be described as success.'
                },
                natural_language_intents: intents,
                trigger_keywords: triggers,
                trigger_mode: 'any',
                execution_mode: effect === 'read' ? 'model_native' : effect === 'unknown' ? 'model_native' : 'proposal',
                argument_bindings: {}
              };
              try {
                await apiPut(`/api/mcp-servers/${serverId}/tools/${toolId}/runtime-policy`, payload);
                showToast(effect === 'read' ? '只读 Tool 模板已保存' : effect === 'unknown' ? 'Tool 保持未授权' : '写 Tool 模板已保存，运行时将强制确认', 'success');
                const advanced = document.querySelector(`.mcp-runtime-contract[data-tool-id="${toolId}"]`);
                if (advanced) advanced.value = JSON.stringify(payload, null, 2);
              } catch (err) {
                showToast('Tool 模板保存失败：' + (err.message || err), 'error');
              }
            });
          });
          $$('.mcp-runtime-policy-save').forEach(button => {
            button.addEventListener('click', async () => {
              const toolId = Number(button.dataset.toolId);
              const input = document.querySelector(`.mcp-runtime-contract[data-tool-id="${toolId}"]`);
              let payload;
              try {
                payload = JSON.parse(input.value);
              } catch (err) {
                showToast('运行契约必须是合法 JSON', 'error');
                return;
              }
              try {
                await apiPut(`/api/mcp-servers/${serverId}/tools/${toolId}/runtime-policy`, payload);
                showToast('MCP 运行契约 Draft 已保存；发布后在下一新会话生效');
              } catch (err) {
                showToast('MCP 运行契约保存失败：' + (err.message || err), 'error');
              }
            });
          });
        } catch (err) {
          showToast('加载工具列表失败', 'error');
        }
      }

      async function editMcpServer(serverId) {
        try {
          const data = await apiGet(`/api/mcp-servers/${serverId}`);
          openMcpModal(data.mcp_server);
        } catch (err) {
          showToast('加载 MCP Server 失败', 'error');
        }
      }

      async function deleteMcpServer(serverId) {
        if (!confirm('确定要删除这个 MCP Server 吗？')) return;
        try {
          await apiDelete(`/api/mcp-servers/${serverId}`);
          showToast('MCP Server 已从 Draft 删除；已发布会话快照不受影响');
          await loadMcpServers();
        } catch (err) {
          showToast('删除失败，请重试', 'error');
        }
      }

      $('#mcp-git-import-btn').addEventListener('click', openMcpGitImportModal);
      $('#mcp-advanced-add-btn').addEventListener('click', () => openMcpModal());
      await loadMcpServers();
    }

    // ==========================================
    // Helpers
    // ==========================================
    function escapeHtml(text) {
      if (text == null) return '';
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function openSidebar() {
      STATE.sidebarOpen = true;
      $('#sidebar').classList.remove('-translate-x-full');
      $('#sidebar-overlay').classList.remove('hidden');
    }

    function closeSidebar() {
      STATE.sidebarOpen = false;
      $('#sidebar').classList.add('-translate-x-full');
      $('#sidebar-overlay').classList.add('hidden');
    }

    // ==========================================
    // Initialization
    // ==========================================
    async function init() {
      try {
        // Restore persisted chat session so history survives reloads/tab switches.
        try {
          const savedSession = localStorage.getItem('chatSessionId');
          if (savedSession) STATE.chatSessionId = savedSession;
        } catch (e) {}

        ['#main-content', '#sub-menu', '#role-title'].forEach(sel => requireElement(sel, 'init'));
        const versionEl = $('#app-version');
        if (versionEl) versionEl.textContent = APP_VERSION;
        renderTopTabs();
        renderSidebar();
        await renderContent();

        $$('.top-tab, .top-tab-mobile').forEach(btn => {
          btn.addEventListener('click', () => {
            const topTab = btn.dataset.top;
            const firstSub = (MENU[topTab] || [])[0];
            if (!firstSub) {
              displayRenderError(
                new Error(`标签 "${topTab}" 没有可用页面`),
                `切换 ${topTab} 标签`
              );
              return;
            }
            queueNavigation(
              topTab,
              firstSub.id,
              `切换 ${topTab} 标签`,
              false
            ).then(() => {
              if (window.innerWidth < 768) openSidebar();
            }).catch(() => {});
          });
        });

        $('#mobile-menu-btn').addEventListener('click', () => {
          if (STATE.sidebarOpen) closeSidebar();
          else openSidebar();
        });

        $('#sidebar-overlay').addEventListener('click', closeSidebar);

        window.addEventListener('resize', () => {
          if (window.innerWidth >= 768) closeSidebar();
        });
      } catch (err) {
        displayRenderError(err, '初始化');
        throw err;
      }
    }

    document.addEventListener('DOMContentLoaded', () => init().catch(err => displayRenderError(err, '启动')));
  </script>
</body>
</html>
