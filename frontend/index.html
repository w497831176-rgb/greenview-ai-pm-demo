                        <td class="px-4 py-3 text-slate-500 text-xs">${formatTimeLabel(c.created_at)}</td>
                        <td class="px-4 py-3">
                          <button data-id="${c.id}" class="badcase-process-btn text-xs px-3 py-1.5 bg-brand-600 hover:bg-brand-700 text-white rounded-lg transition-colors">处理</button>
                        </td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
            </div>
          `;
          bindBadcaseActions();
        } catch (err) {
          $('#badcases-content').innerHTML = emptyState('加载失败，请刷新重试');
        }
      }

      function bindBadcaseActions() {
        $$('.badcase-process-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            STATE.badcaseDetailId = Number(btn.dataset.id);
            STATE.subTab = 'badcase-detail';
            renderSidebar();
            renderContent();
          });
        });
      }

      $('#badcase-filter-btn').addEventListener('click', loadBadcases);
      await loadBadcases();
    }

    async function renderBadcaseDetailPage(container) {
      const id = STATE.badcaseDetailId;
      if (!id) {
        STATE.subTab = 'badcases';
        STATE.badcaseDetailId = null;
        renderSidebar();
        renderContent();
        return;
      }
      let allowed = new Set();
      let isTerminal = false;
      let category = 'pending';
      const categoryLabels = {
        knowledge_gap: '知识库缺口',
        skill_prompt: 'Skill/Prompt 问题',
        mcp_capability: 'MCP/能力缺口',
        routing: '路由问题',
        response_quality: '模型回答质量',
        other: '其他',
        pending: '待分类'
      };
      const actionTypeLabels = {
        classify: '分类',
        'darwin-fix': 'Darwin 深度分析',
        'extract-knowledge': '提取知识草稿',
        retest: '真实复测',
        verify: '验证',
        'verify-pass': '验证通过',
        'verify-fail': '验证不通过',
        close: '发布观察后关闭',
        'accept-limitation': '接受能力边界',
        'mark-duplicate': '标记重复记录',
        reject: '驳回',
        transition: '状态流转',
        update: '更新字段',
        'edit-knowledge-draft': '编辑知识草稿',
        'edit-skill-prompt-draft': '编辑 Skill/Prompt 草稿',
        'edit-capability-gap-draft': '编辑能力缺口草稿',
        'review-knowledge-draft': '审核知识草稿',
        'review-skill-prompt-draft': '审核 Skill/Prompt 草稿',
        'review-capability-gap-draft': '审核能力缺口草稿',
        'apply-knowledge-draft': '应用知识草稿',
        'apply-skill-prompt-draft': '应用 Skill/Prompt 草稿',
        'apply-capability-gap-draft': '记录能力缺口待办',
        'publish-skill-draft': '发布 Skill 到 Agent',
        'publish-knowledge': '发布知识',
        'publish-skill-prompt': '发布 Skill/Prompt',
        'accept-capability-gap': '记录能力缺口',
        'switch-model-retry': '模型重试',
        'check-tools': '工具检查'
      };
      const draftStatusLabels = {
        draft: '草稿',
        under_review: '审核中',
        approved: '已通过',
        published: '已发布',
        rejected: '已驳回',
        accepted: '已采纳'
      };

      async function runAction(path, body, successText, opts = {}) {
        const { loadingEl, loadingText = '处理中...' } = opts;
        const prevText = loadingEl ? loadingEl.textContent : '';
        if (loadingEl) {
          loadingEl.disabled = true;
          loadingEl.dataset.originalText = prevText;
          loadingEl.textContent = loadingText;
        }
        try {
          await apiPost(path, body || {});
          showToast(successText, 'success');
          await loadDetail();
        } catch (err) {
          showToast('操作失败：' + err.message, 'error');
        } finally {
          if (loadingEl) {
            loadingEl.disabled = false;
            loadingEl.textContent = loadingEl.dataset.originalText || prevText;
          }
        }
      }

      container.innerHTML = `
        <div class="max-w-6xl mx-auto p-4 md:p-6 space-y-5">
          <div class="flex items-center gap-3 mb-2">
            <button id="badcase-detail-back" class="p-2 hover:bg-slate-200 rounded-lg text-slate-600 transition-colors">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <div>
              <h2 class="text-xl font-semibold text-slate-900">Badcase #${id}</h2>
              <p id="badcase-detail-header-status" class="text-sm text-slate-500">状态：加载中…</p>
            </div>
          </div>
          <div id="badcase-detail-content">${loadingState()}</div>
        </div>
      `;
      $('#badcase-detail-back').addEventListener('click', () => {
        STATE.subTab = 'badcases';
        STATE.badcaseDetailId = null;
        renderSidebar();
        renderContent();
      });

      function sourceBadgeDetail(srcLabel) {
        if (srcLabel === '人工反馈') return '<span class="text-xs px-2 py-1 rounded-full bg-indigo-50 text-indigo-600 border border-indigo-100">人工反馈</span>';
        return '<span class="text-xs px-2 py-1 rounded-full bg-slate-100 text-slate-500 border border-slate-200">自动发现</span>';
      }

      function sourceBadge(src) {
        const map = {
          realtime: '实时账单',
          estimated: '本地估算',
          fallback: '回退估算',
          unknown: '未知'
        };
        const label = map[src] || src || '未知';
        const color = src === 'realtime' ? 'bg-indigo-50 text-indigo-600' : src === 'estimated' ? 'bg-brand-50 text-brand-600' : 'bg-slate-100 text-slate-500';
        return `<span class="text-[10px] px-1.5 py-0.5 rounded-full ${color}">${escapeHtml(label)}</span>`;
      }

      function statusBadgeSmall(s) {
        const map = { success: ['bg-green-50 text-green-600', '成功'], error: ['bg-red-50 text-red-600', '失败'], warning: ['bg-amber-50 text-amber-600', '警告'] };
        const [cls, label] = map[s] || ['bg-slate-100 text-slate-500', s || '未知'];
        return `<span class="text-[10px] px-1.5 py-0.5 rounded-full ${cls}">${escapeHtml(label)}</span>`;
      }

      function parseDarwin(da) {
        if (!da) return null;
        try {
          return typeof da === 'string' ? JSON.parse(da) : da;
        } catch (e) {
          return null;
        }
      }

      function renderContextValue(v) {
        if (v === null || v === undefined) return '<span class="text-slate-400">-</span>';
        if (Array.isArray(v)) {
          const items = v.map(x => (typeof x === 'string' ? escapeHtml(x) : escapeHtml(JSON.stringify(x)))).join('、');
          return items ? `<div class="text-sm text-slate-700">${items}</div>` : '<span class="text-slate-400">-</span>';
        }
        if (typeof v === 'object') {
          return `<pre class="text-xs bg-slate-50 p-2 rounded border border-slate-200 overflow-x-auto">${escapeHtml(JSON.stringify(v, null, 2))}</pre>`;
        }
        return `<div class="text-sm text-slate-700 whitespace-pre-wrap">${escapeHtml(String(v))}</div>`;
      }

      function renderKeyValue(obj) {
        if (!obj || typeof obj !== 'object' || Object.keys(obj).length === 0) {
          return '<p class="text-sm text-slate-400">-</p>';
        }
        return `
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            ${Object.entries(obj).map(([k, v]) => `
              <div class="bg-slate-50 rounded-lg p-3 border border-slate-200">
                <div class="text-xs text-slate-500 mb-1">${escapeHtml(k)}</div>
                ${renderContextValue(v)}
              </div>
            `).join('')}
          </div>
        `;
      }

      function renderDetail(detail) {
        if (!detail || typeof detail !== 'object' || Object.keys(detail).length === 0) return '';
        const lines = Object.entries(detail).map(([k, v]) => {
          let text;
          if (v === null || v === undefined) text = '-';
          else if (typeof v === 'object') text = JSON.stringify(v, null, 2);
          else text = String(v);
          return `<div class="text-xs text-slate-600"><span class="font-medium text-slate-700">${escapeHtml(k)}:</span> <span class="whitespace-pre-wrap">${escapeHtml(text)}</span></div>`;
        }).join('');
        return `<div class="mt-1 pl-2 border-l border-slate-200 space-y-0.5">${lines}</div>`;
      }

      function transitionBadge(before, beforeLabel, after, afterLabel) {
        const styleMap = {
          pending: 'bg-amber-50 text-amber-700 border-amber-200',
          classified: 'bg-indigo-50 text-indigo-700 border-indigo-200',
          fixing: 'bg-brand-50 text-brand-700 border-brand-200',
          verifying: 'bg-sky-50 text-sky-700 border-sky-200',
          closed: 'bg-slate-100 text-slate-600 border-slate-200',
          rejected: 'bg-red-50 text-red-700 border-red-200'
        };
        const beforeClass = styleMap[before] || 'bg-slate-100 text-slate-600 border-slate-200';
        const afterClass = styleMap[after] || 'bg-slate-100 text-slate-600 border-slate-200';
        return `<span class="px-2 py-0.5 rounded-full text-[10px] font-medium border ${beforeClass}">${escapeHtml(beforeLabel || before)}</span><span class="text-slate-400">→</span><span class="px-2 py-0.5 rounded-full text-[10px] font-medium border ${afterClass}">${escapeHtml(afterLabel || after)}</span>`;
      }

      function draftField(type, d) {
        if (type === 'knowledge') return d.content || '';
        if (type === 'skill_prompt') return d.prompt_content || '';
        return d.description || '';
      }

      function draftFields(type, d) {
        if (type === 'knowledge') {
          return [
            { key: 'title', label: '标题', value: d.title || '' },
            { key: 'content', label: '正文', value: d.content || '', textarea: true },
            { key: 'category', label: '分类', value: d.category || '' }
          ];
        }
        if (type === 'skill_prompt') {
          return [
            { key: 'title', label: '标题', value: d.title || '' },
            { key: 'skill_name', label: 'Skill 名称', value: d.skill_name || '' },
            { key: 'prompt_content', label: 'Prompt 内容', value: d.prompt_content || '', textarea: true },
            { key: 'trigger_keywords', label: '触发关键词', value: d.trigger_keywords || '' }
          ];
        }
        return [
          { key: 'title', label: '标题', value: d.title || '' },
          { key: 'description', label: '缺口描述', value: d.description || '', textarea: true },
          { key: 'gap_type', label: '缺口类型', value: d.gap_type || '' },
          { key: 'suggested_action', label: '建议动作', value: d.suggested_action || '', textarea: true }
        ];
      }

      function draftEndpoint(type) {
        if (type === 'knowledge') return 'knowledge-drafts';
        if (type === 'skill_prompt') return 'skill-prompt-drafts';
        return 'capability-gap-drafts';
      }

      function openDraftView(d, type) {
        const fields = draftFields(type, d);
        const body = fields.map(f => `
          <div class="mb-3">
            <label class="block text-xs text-slate-500 mb-1">${escapeHtml(f.label)}</label>
            <div class="text-sm text-slate-700 whitespace-pre-wrap bg-slate-50 rounded-lg p-3 border border-slate-200">${escapeHtml(f.value || '-')}</div>
          </div>
        `).join('');
        openModal(`${escapeHtml(draftStatusLabels[d.status] || d.status)} - ${escapeHtml(d.title || '草稿')}`, body, () => closeModal(), '关闭');
      }

      function openDraftEdit(d, type) {
        const fields = draftFields(type, d);
        const body = fields.map(f => `
          <div class="mb-3">
            <label class="block text-xs text-slate-500 mb-1">${escapeHtml(f.label)}</label>
            ${f.textarea
              ? `<textarea id="draft-edit-${f.key}" rows="5" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-brand-400">${escapeHtml(f.value)}</textarea>`
              : `<input id="draft-edit-${f.key}" type="text" value="${escapeHtml(f.value)}" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-brand-400">`}
          </div>
        `).join('');
        openModal(`编辑${type === 'knowledge' ? '知识' : type === 'skill_prompt' ? 'Skill/Prompt' : '能力缺口'}草稿`, body, async () => {
          const payload = {};
          fields.forEach(f => { payload[f.key] = $(`#draft-edit-${f.key}`).value; });
          try {
            await apiPut(`/api/badcases/${id}/${draftEndpoint(type)}/${d.id}`, payload);
            showToast('草稿已保存', 'success');
            closeModal();
            await loadDetail();
          } catch (err) {
            showToast('保存失败：' + err.message, 'error');
          }
        });
      }

      let agentsList = [];
      async function loadAgentsList() {
        try {
          const data = await apiGet('/api/agents');
          agentsList = data.agents || [];
        } catch (err) {
          agentsList = [];
        }
      }

      function openSkillApplyModal(d) {
        const options = agentsList.length
          ? agentsList.map(a => `<option value="${a.id}">${escapeHtml(a.name)}${a.is_router ? '（路由）' : ''}</option>`).join('')
          : '<option value="">暂无可用 Agent</option>';
        const body = `
          <div class="space-y-3">
            <p class="text-sm text-slate-600">选择要绑定该 Skill 的目标 Agent：</p>
            ${formSelect('目标 Agent', 'skill-target-agent', agentsList.map(a => ({ value: String(a.id), label: a.name + (a.is_router ? '（路由）' : '') })), '')}
            <p class="text-xs text-slate-400">应用后系统将创建/更新 Skill 并把该 Skill 绑定到所选 Agent。</p>
          </div>
        `;
        openModal('应用 Skill/Prompt 草稿', body, async () => {
          const targetId = $('#skill-target-agent').value;
          if (!targetId) {
            showToast('请选择目标 Agent', 'error');
            return false;
          }
          try {
            await apiPost(`/api/badcases/${id}/skill-prompt-drafts/${d.id}/publish-skill-draft`, { target_agent_id: Number(targetId) });
            showToast('Skill 已发布并绑定到 Agent', 'success');
            closeModal();
            await loadDetail();
            return true;
          } catch (err) {
            showToast('发布失败：' + err.message, 'error');
            return false;
          }
        }, '发布并绑定');
      }

      function renderDraftCard(d, type, idx) {
        const content = draftField(type, d);
        const snippet = (content || '').slice(0, 120);
        const status = d.status || 'draft';
        const terminalDraft = type === 'capability_gap'
          ? ['accepted', 'rejected'].includes(status)
          : ['published', 'rejected'].includes(status);
        const canEdit = !isTerminal && allowed.has('edit-draft') && status !== 'published' && status !== 'accepted' && status !== 'rejected';
        const applyConfirm = {
          knowledge: '应用后系统将：\n1. 写入正式知识库文档；\n2. 重建向量索引；\n3. 将 Badcase 推进到“验证中”。\n\n请确认索引服务可用。',
          capability_gap: '应用后系统将：\n1. 把能力缺口记录为产品待办；\n2. 不会创建任何 MCP 工具或真实能力；\n3. Badcase 仍保持“修复中”。\n\n请确认。'
        };

        let actionButtons = `<button data-draft-id="${d.id}" data-draft-type="${type}" class="badcase-draft-view px-2 py-1 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg text-xs transition-colors">查看全文</button>`;

        if (isTerminal || terminalDraft) {
          actionButtons += `<span class="px-2 py-1 bg-slate-100 text-slate-400 rounded-lg text-xs">${terminalDraft ? '草稿已终态' : 'Badcase 已终态'}</span>`;
        } else {
          if (canEdit) {
            actionButtons += `<button data-draft-id="${d.id}" data-draft-type="${type}" class="badcase-draft-edit px-2 py-1 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg text-xs transition-colors">编辑</button>`;
          }

          if (status === 'draft') {
            actionButtons += `<button data-draft-id="${d.id}" data-draft-type="${type}" data-review="under_review" class="badcase-draft-review px-2 py-1 bg-blue-50 hover:bg-blue-100 text-blue-700 rounded-lg text-xs transition-colors" ${allowed.has('review-draft') ? '' : 'disabled title="当前状态不可审核"'}>提交审核</button>`;
            actionButtons += `<button data-draft-id="${d.id}" data-draft-type="${type}" data-review="rejected" class="badcase-draft-review px-2 py-1 bg-red-50 hover:bg-red-100 text-red-700 rounded-lg text-xs transition-colors" ${allowed.has('review-draft') ? '' : 'disabled title="当前状态不可审核"'}>驳回</button>`;
          } else if (status === 'under_review') {
            actionButtons += `<button data-draft-id="${d.id}" data-draft-type="${type}" data-review="approved" class="badcase-draft-review px-2 py-1 bg-green-50 hover:bg-green-100 text-green-700 rounded-lg text-xs transition-colors" ${allowed.has('review-draft') ? '' : 'disabled title="当前状态不可审核"'}>通过审核</button>`;
            actionButtons += `<button data-draft-id="${d.id}" data-draft-type="${type}" data-review="draft" class="badcase-draft-review px-2 py-1 bg-amber-50 hover:bg-amber-100 text-amber-700 rounded-lg text-xs transition-colors" ${allowed.has('review-draft') ? '' : 'disabled title="当前状态不可审核"'}>退回草稿</button>`;
            actionButtons += `<button data-draft-id="${d.id}" data-draft-type="${type}" data-review="rejected" class="badcase-draft-review px-2 py-1 bg-red-50 hover:bg-red-100 text-red-700 rounded-lg text-xs transition-colors" ${allowed.has('review-draft') ? '' : 'disabled title="当前状态不可审核"'}>驳回</button>`;
          } else if (status === 'approved') {
            if (type === 'knowledge' && allowed.has('apply-draft')) {
              actionButtons += `<button data-draft-id="${d.id}" data-draft-type="${type}" data-confirm="${escapeHtml(applyConfirm.knowledge)}" class="badcase-draft-apply px-2 py-1 bg-brand-600 hover:bg-brand-700 text-white rounded-lg text-xs transition-colors">应用到正式知识库</button>`;
            } else if (type === 'skill_prompt' && allowed.has('apply-draft')) {
              actionButtons += `<button data-draft-id="${d.id}" data-draft-type="${type}" class="badcase-draft-skill-apply px-2 py-1 bg-brand-600 hover:bg-brand-700 text-white rounded-lg text-xs transition-colors">选择 Agent 并应用</button>`;
            } else if (type === 'capability_gap' && allowed.has('apply-draft')) {
              actionButtons += `<button data-draft-id="${d.id}" data-draft-type="${type}" data-confirm="${escapeHtml(applyConfirm.capability_gap)}" class="badcase-draft-apply px-2 py-1 bg-brand-600 hover:bg-brand-700 text-white rounded-lg text-xs transition-colors">采纳为产品待办</button>`;
            }
          }
        }

        return `
          <div class="bg-slate-50 rounded-xl p-3 border border-slate-200 text-sm">
            <div class="flex items-center justify-between mb-1 gap-2">
              <span class="font-medium text-slate-900 truncate">#${idx + 1} ${escapeHtml(d.title || '未命名')}</span>
              <span class="shrink-0 text-[10px] px-2 py-0.5 rounded-full border bg-white text-slate-600 border-slate-200">${escapeHtml(draftStatusLabels[status] || status)}</span>
            </div>
            <div class="text-xs text-slate-500 mb-2 min-h-[2.5em]">${escapeHtml(snippet)}${(content || '').length > 120 ? '...' : ''}</div>
            <div class="flex flex-wrap gap-2">
              ${actionButtons}
            </div>
          </div>
        `;
      }

      function renderDraftSection(type, drafts, title) {
        if (!drafts.length) return '';
        return `
          <div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-5">
            <h3 class="font-semibold text-slate-900 mb-3">${title}</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
              ${drafts.map((d, idx) => renderDraftCard(d, type, idx)).join('')}
            </div>
          </div>
        `;
      }

      function renderDarwinStructured(parsed) {
        if (!parsed || typeof parsed !== 'object') return '';
        const repairPathLabels = {
          knowledge: '补充知识库',
          skill_prompt: '新增/优化 Skill 或 Prompt',
          mcp_capability: '开发 MCP 能力',
          ops_only: '仅运营处理'
        };
        const fields = [
          { key: 'phenomenon_impact', label: '现象与影响范围' },
          { key: 'root_cause_hypothesis', label: '根因假设' },
          { key: 'evidence_uncertainties', label: '证据与不确定项' },
          { key: 'repair_path_suggestion', label: '修复路径建议' },
          { key: 'recommended_category', label: '推荐分类' },
          { key: 'repair_path', label: '推荐修复路径', format: v => repairPathLabels[v] || v }
        ];
        const cards = fields.map(f => {
          const raw = parsed[f.key];
          if (raw === null || raw === undefined || raw === '') return '';
          const value = f.format ? f.format(raw) : raw;
          return `
            <div class="bg-slate-50 rounded-lg p-3 border border-slate-200">
              <div class="text-xs text-slate-500 mb-1">${f.label}</div>
              <div class="text-sm text-slate-700 whitespace-pre-wrap">${escapeHtml(value)}</div>
            </div>
          `;
        }).filter(Boolean).join('');
        const meta = [];
        if (parsed.model) meta.push(`模型：${escapeHtml(parsed.model)}`);
        if (parsed.trace_id) meta.push(`Trace ID：${escapeHtml(parsed.trace_id)}`);
        if (parsed.token_cost_estimate) meta.push(`Token/成本估算：${escapeHtml(parsed.token_cost_estimate)}`);
        const metaHtml = meta.length ? `<div class="mt-3 text-xs text-slate-500 flex flex-wrap gap-3">${meta.map(m => `<span>${m}</span>`).join('')}</div>` : '';
        return `
          <div class="space-y-3 text-sm text-slate-700">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
              ${cards}
            </div>
            ${metaHtml}
          </div>
        `;
      }

      function renderRetestResult(bc) {
        const retestContext = bc.retest_context || {};
        return `
          <div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-5">
            <h3 class="font-semibold text-slate-900 mb-3">真实复测结果</h3>
            <div class="space-y-3 text-sm text-slate-700">
              <div>
                <div class="text-xs text-slate-500 mb-1">复测回答</div>
                <div class="whitespace-pre-wrap bg-slate-50 rounded-lg p-3 border border-slate-200">${escapeHtml(bc.retest_response || '（无）')}</div>

                ${formTextarea('验证备注', 'verify-note', '', '请输入验证意见或观察到的现象', 4)}
                <p class="text-xs text-slate-400">${passed ? '通过后进入“发布观察”，还需由操作员记录一次观察后才能关闭。' : '不通过后将回到修复阶段。'}</p>
              </div>
            `;
            openModal(title, body, async () => {
              const note = $('#verify-note').value.trim();
              if (!note) {
                showToast('请输入验证备注', 'error');
                return false;
              }
              try {
                await apiPost(`/api/badcases/${id}/verify`, { passed, note });
                showToast(passed ? '已进入发布观察' : '已退回修复', 'success');
                closeModal();
                await loadDetail();
                return true;
              } catch (err) {
                showToast('验证失败：' + err.message, 'error');
                return false;
              }
            }, passed ? '确认通过' : '确认退回');
          }

          const rejectBtn = $('#badcase-reject');
          if (rejectBtn && !rejectBtn.disabled) {
            rejectBtn.addEventListener('click', () => {
              const reason = window.prompt('驳回原因：');
              if (reason === null) return;
              if (!reason.trim()) {
                showToast('驳回原因不能为空', 'error');
                return;
              }
              runAction(`/api/badcases/${id}/reject`, { rejected_reason: reason.trim() }, '已驳回', { loadingEl: rejectBtn });
            });
          }

          const limitationBtn = $('#badcase-accept-limitation');
          if (limitationBtn && !limitationBtn.disabled) {
            limitationBtn.addEventListener('click', () => {
              openModal('记录当前能力边界', `${formTextarea('当前不能自动解决的原因', 'badcase-limitation-reason', '', '例如：当前仅接入只读 MCP，无法自动代业主办理外部业务。', 4)}${formTextarea('替代路径', 'badcase-limitation-alternative', '', '例如：转人工或作为 V1.7 产品待办；不要把未实现能力写成已修复。', 3)}`, async () => {
                const reason = $('#badcase-limitation-reason').value.trim();
                const alternativePath = $('#badcase-limitation-alternative').value.trim();
                if (!reason || !alternativePath) { showToast('请完整填写原因与替代路径', 'error'); return false; }
                try { await apiPost(`/api/badcases/${id}/accept-limitation`, { reason, alternative_path: alternativePath }); closeModal(); await loadDetail(); showToast('已记录能力边界'); return true; }
                catch (err) { showToast('记录失败：' + err.message, 'error'); return false; }
              }, '确认记录');
            });
          }

          const duplicateBtn = $('#badcase-mark-duplicate');
          if (duplicateBtn && !duplicateBtn.disabled) {
            duplicateBtn.addEventListener('click', () => {
              openModal('标记为重复案例', `${formInput('主案例 Badcase ID', 'badcase-primary-id', '', '例如：123', 'number', 1)}${formTextarea('关联说明（可选）', 'badcase-duplicate-note', '', '说明两个案例为什么属于同一问题。', 3)}`, async () => {
                const primaryId = Number($('#badcase-primary-id').value);
                if (!Number.isInteger(primaryId) || primaryId <= 0 || primaryId === id) { showToast('请输入其他有效的主案例 ID', 'error'); return false; }
                try { await apiPost(`/api/badcases/${id}/duplicate`, { primary_badcase_id: primaryId, note: $('#badcase-duplicate-note').value.trim() }); closeModal(); await loadDetail(); showToast('已关联主案例'); return true; }
                catch (err) { showToast('关联失败：' + err.message, 'error'); return false; }
              }, '确认关联');
            });
          }

          $$('.badcase-draft-view').forEach(btn => {
            btn.addEventListener('click', () => {
              const type = btn.dataset.draftType;
              const draftId = Number(btn.dataset.draftId);
              let d;
              if (type === 'knowledge') d = kDrafts.find(x => x.id === draftId);
              else if (type === 'skill_prompt') d = sDrafts.find(x => x.id === draftId);
              else d = cDrafts.find(x => x.id === draftId);
              if (d) openDraftView(d, type);
            });
          });

          $$('.badcase-draft-edit').forEach(btn => {
            if (btn.disabled) return;
            btn.addEventListener('click', () => {
              const type = btn.dataset.draftType;
              const draftId = Number(btn.dataset.draftId);
              let d;
              if (type === 'knowledge') d = kDrafts.find(x => x.id === draftId);
              else if (type === 'skill_prompt') d = sDrafts.find(x => x.id === draftId);
              else d = cDrafts.find(x => x.id === draftId);
              if (d) openDraftEdit(d, type);
            });
          });

          $$('.badcase-draft-review').forEach(btn => {
            if (btn.disabled) return;
            btn.addEventListener('click', () => {
              const type = btn.dataset.draftType;
              const draftId = Number(btn.dataset.draftId);
              const status = btn.dataset.review;
              runAction(`/api/badcases/${id}/${draftEndpoint(type)}/${draftId}/review`, { status }, '审核完成', { loadingEl: btn });
            });
          });

          $$('.badcase-draft-apply').forEach(btn => {
            if (btn.disabled) return;
            btn.addEventListener('click', () => {
              const type = btn.dataset.draftType;
              const draftId = Number(btn.dataset.draftId);
              const confirmMsg = btn.dataset.confirm || '确认应用该草稿？';
              if (!window.confirm(confirmMsg)) return;
              const body = {};
              runAction(`/api/badcases/${id}/${draftEndpoint(type)}/${draftId}/apply`, body, type === 'capability_gap' ? '已记录能力缺口待办' : '草稿已应用', { loadingEl: btn });
            });
          });

          $$('.badcase-draft-skill-apply').forEach(btn => {
            if (btn.disabled) return;
            btn.addEventListener('click', () => {
              const draftId = Number(btn.dataset.draftId);
              const d = sDrafts.find(x => x.id === draftId);
              if (d) openSkillApplyModal(d);
            });
          });
        } catch (err) {
          $('#badcase-detail-content').innerHTML = emptyState('加载详情失败：' + escapeHtml(err.message));
        }
      }

      await loadDetail();
    }


    async function renderEvaluationsPage(container) {
      container.innerHTML = loadingState();
      const state = { summary: {}, cases: [], agents: [] };
      const caseStateLabel = { draft: '草稿', active: '已启用', archived: '已归档' };
      const runStateLabel = { passed: '通过', failed: '失败', needs_manual_review: '待人工评审', error: '运行异常' };
      const colorForCase = status => ({ draft: 'bg-slate-100 text-slate-600', active: 'bg-emerald-50 text-emerald-700', archived: 'bg-amber-50 text-amber-700' }[status] || 'bg-slate-100 text-slate-600');
      const colorForRun = status => ({ passed: 'bg-emerald-50 text-emerald-700', failed: 'bg-red-50 text-red-700', needs_manual_review: 'bg-amber-50 text-amber-700', error: 'bg-red-50 text-red-700' }[status] || 'bg-slate-100 text-slate-600');
      const badge = (label, cls) => `<span class="text-[10px] px-2 py-1 rounded-full ${cls}">${escapeHtml(label || '-')}</span>`;
      const money = value => value === null || value === undefined ? '—' : `¥${Number(value).toFixed(6)}`;
      const commaList = value => String(value || '').split(/[，,]/).map(item => item.trim()).filter(Boolean);

      async function loadAll() {
        const [overviewData, casesData, agentsData] = await Promise.all([
          apiGet('/api/evaluations/overview'),
          apiGet('/api/evaluations/cases'),
          apiGet('/api/agents')
        ]);
        state.summary = overviewData.summary || {};
        state.cases = casesData.cases || [];
        state.agents = agentsData.agents || [];
      }

      function expectationLine(label, values) {
        const list = Array.isArray(values) ? values : (values ? [values] : []);
        return `<div><span class="text-slate-500">${escapeHtml(label)}：</span>${list.length ? escapeHtml(list.join('、')) : '<span class="text-slate-400">未设门槛</span>'}</div>`;
      }

      async function openCase(caseId) {
        try {
          const data = await apiGet(`/api/evaluations/cases/${caseId}`);
          const item = data.case || {};
          const runs = data.runs || [];
          const requirements = `<div class="space-y-2 text-xs text-slate-700">
            ${expectationLine('预期 Agent', item.expected_agent_id)}
            ${expectationLine('预期 Skill', item.expected_skills)}
            ${expectationLine('预期 Tool/MCP', item.expected_tools)}
            ${expectationLine('预期知识证据', item.expected_citation_docs)}
            ${expectationLine('必须表达', item.required_terms)}
            ${expectationLine('禁止表达', item.forbidden_terms)}
            ${item.expected_handoff === null || item.expected_handoff === undefined ? '<div><span class="text-slate-500">人工接管：</span><span class="text-slate-400">未设门槛</span></div>' : `<div><span class="text-slate-500">人工接管：</span>${item.expected_handoff ? '必须进入' : '不应进入'}</div>`}
          </div>`;
          const runHtml = runs.length ? `<div class="space-y-3">${runs.map(run => {
            const rules = run.rule_results || [];
            return `<div class="border border-slate-200 rounded-xl p-3 space-y-2">
              <div class="flex items-center justify-between gap-2"><div class="font-medium text-sm text-slate-900">运行 #${escapeHtml(String(run.id))}</div>${badge(runStateLabel[run.status] || run.status, colorForRun(run.status))}</div>
              <div class="text-xs text-slate-500">${escapeHtml(formatTimeLabel(run.created_at))} · Trace ${escapeHtml(run.trace_id || '未生成')} · ${run.total_tokens ?? '—'} Token · ${money(run.estimated_cost_cny)}</div>
              ${rules.length ? `<div class="space-y-1">${rules.map(rule => `<div class="text-xs ${rule.status === 'fail' ? 'text-red-700' : rule.status === 'pass' ? 'text-emerald-700' : 'text-slate-500'}">${rule.status === 'pass' ? '✓' : rule.status === 'fail' ? '×' : '•'} ${escapeHtml(rule.label)}：${escapeHtml(Array.isArray(rule.expected) ? rule.expected.join('、') : String(rule.expected ?? '—'))}${rule.note ? `（${escapeHtml(rule.note)}）` : ''}</div>`).join('')}</div>` : ''}
              ${run.operator_judgement ? `<div class="text-xs bg-slate-50 p-2 rounded">人工评审：${escapeHtml(run.operator_judgement)} · ${escapeHtml(run.operator_note || '')}</div>` : ''}
              <div class="flex flex-wrap gap-2 pt-1">
                ${run.trace_id ? `<button class="evaluation-open-trace text-xs px-2 py-1 bg-slate-100 hover:bg-slate-200 rounded-lg" data-trace-id="${escapeHtml(run.trace_id)}">查看 Trace</button>` : ''}
                ${run.status === 'needs_manual_review' ? `<button class="evaluation-review-run text-xs px-2 py-1 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 rounded-lg" data-run-id="${run.id}">人工评审</button>` : ''}
                ${['failed', 'needs_manual_review'].includes(run.status) && !run.badcase_id ? `<button class="evaluation-create-badcase text-xs px-2 py-1 bg-red-50 hover:bg-red-100 text-red-700 rounded-lg" data-run-id="${run.id}">沉淀为 Badcase</button>` : ''}
                ${run.badcase_id ? `<span class="text-xs text-slate-500">已关联 Badcase #${escapeHtml(String(run.badcase_id))}</span>` : ''}
              </div>
            </div>`;
          }).join('')}</div>` : '<p class="text-sm text-slate-400">尚未运行。只有操作员主动点击“运行真实链路”才会产生一次真实模型调用。</p>';
          const actions = `<div class="flex flex-wrap gap-2">
            ${item.status === 'draft' ? `<button id="evaluation-activate" class="px-3 py-2 bg-brand-600 hover:bg-brand-700 text-white rounded-xl text-sm">启用用例</button>` : ''}
            ${item.status === 'active' ? `<button id="evaluation-run" class="px-3 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-sm">运行真实链路</button><button id="evaluation-archive" class="px-3 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl text-sm">归档</button>` : ''}
          </div>`;
          openDrawer(`Golden Set · ${item.case_key || item.id}`, `<div class="space-y-5"><div><div class="flex items-center gap-2"><h4 class="text-lg font-semibold text-slate-900">${escapeHtml(item.title || '-')}</h4>${badge(caseStateLabel[item.status] || item.status, colorForCase(item.status))}${badge(item.risk_level || 'L2', 'bg-violet-50 text-violet-700')}</div><p class="mt-2 text-sm text-slate-600 whitespace-pre-wrap">${escapeHtml(item.description || item.scenario || '未填写描述')}</p></div><div class="bg-slate-50 border border-slate-200 rounded-xl p-3"><div class="text-xs text-slate-500 mb-1">测试输入（运行时会作为一条新会话消息）</div><div class="text-sm text-slate-800 whitespace-pre-wrap">${escapeHtml(item.user_message || '')}</div></div><div><h5 class="font-medium text-slate-900 mb-2">可验证门槛</h5>${requirements}</div>${item.rubric && Object.keys(item.rubric).length ? `<div class="text-xs text-amber-700 bg-amber-50 border border-amber-100 rounded-xl p-3">此用例含业务 Rubric。硬规则通过后，仍必须由人工写下是否通过的依据；系统不伪造“模型自评”结论。</div>` : ''}${actions}<div><h5 class="font-medium text-slate-900 mb-2">运行记录</h5>${runHtml}</div></div>`);
          setTimeout(() => {
            const activate = $('#evaluation-activate');
            if (activate) activate.addEventListener('click', async () => { await apiPut(`/api/evaluations/cases/${item.id}`, { status: 'active' }); await loadAll(); await openCase(item.id); showToast('用例已启用'); });
            const archive = $('#evaluation-archive');
            if (archive) archive.addEventListener('click', async () => { await apiPut(`/api/evaluations/cases/${item.id}`, { status: 'archived' }); await loadAll(); await openCase(item.id); showToast('用例已归档'); });
            const run = $('#evaluation-run');
            if (run) run.addEventListener('click', async () => {
              if (!window.confirm('这会以一条独立新会话运行真实 Flash 链路，并产生真实 Token 成本。确认继续？')) return;
              run.disabled = true; run.textContent = '运行中…';
              try { await apiPost(`/api/evaluations/cases/${item.id}/run`, {}); await loadAll(); await openCase(item.id); showToast('评估规则结果已生成'); }
              catch (err) { showToast('运行失败：' + err.message, 'error'); run.disabled = false; run.textContent = '运行真实链路'; }
            });
            $$('.evaluation-open-trace').forEach(button => button.addEventListener('click', () => openTraceDrawer(button.dataset.traceId)));
            $$('.evaluation-review-run').forEach(button => button.addEventListener('click', () => openReviewModal(Number(button.dataset.runId), item.id)));
            $$('.evaluation-create-badcase').forEach(button => button.addEventListener('click', async () => {
              if (!window.confirm('将本次失败证据沉淀为一个 Trace 关联 Badcase；系统不会自动判定根因。确认？')) return;
              try { await apiPost(`/api/evaluations/runs/${button.dataset.runId}/create-badcase`, {}); await openCase(item.id); showToast('已创建 Trace 关联 Badcase'); }
              catch (err) { showToast('创建 Badcase 失败：' + err.message, 'error'); }
            }));
          }, 0);
        } catch (err) { showToast('加载评估用例失败：' + err.message, 'error'); }
      }

      function openReviewModal(runId, caseId) {
        openModal('人工评审', `${formSelect('结论', 'evaluation-review-passed', [{ value: 'true', label: '通过' }, { value: 'false', label: '不通过' }], 'true')}${formTextarea('评审依据', 'evaluation-review-note', '', '例如：处理建议符合物业 SOP，但语气还需优化。', 4)}`, async () => {
          const note = $('#evaluation-review-note').value.trim();
          if (!note) { showToast('请填写人工评审依据', 'error'); return false; }
          try {
            await apiPost(`/api/evaluations/runs/${runId}/review`, { passed: $('#evaluation-review-passed').value === 'true', note });
            closeModal(); await loadAll(); await openCase(caseId); showToast('人工评审已记录'); return true;
          } catch (err) { showToast('评审保存失败：' + err.message, 'error'); return false; }
        }, '保存评审');
      }

      function openCreateModal() {
        const agentOptions = [{ value: '', label: '不设 Agent 硬门槛' }].concat(state.agents.filter(agent => !agent.is_router).map(agent => ({ value: agent.agent_id || agent.id, label: `${agent.name} (${agent.agent_id || agent.id})` })));
        const body = `
          ${formInput('用例编号', 'evaluation-case-key', '', '如：EVAL-LEAK-001')}
          ${formInput('用例标题', 'evaluation-case-title', '', '如：漏水紧急维修全链路')}
          ${formTextarea('用户消息', 'evaluation-case-message', '', '写入一次完整、可重复的用户输入。', 5)}
          ${formTextarea('场景与业务目的', 'evaluation-case-description', '', '说明这个用例为什么重要，以及预期业务结果。', 3)}
          ${formSelect('风险等级', 'evaluation-case-risk', [{ value: 'L1', label: 'L1 低风险' }, { value: 'L2', label: 'L2 一般业务' }, { value: 'L3', label: 'L3 高影响业务' }, { value: 'L4', label: 'L4 高风险边界' }], 'L2')}
          ${formSelect('来源', 'evaluation-case-source', [{ value: 'expert', label: '专家/SOP' }, { value: 'badcase', label: 'Badcase 回归' }, { value: 'adversarial', label: '对抗测试' }, { value: 'synthetic', label: '合成用例' }], 'expert')}
          ${formSelect('预期 Agent', 'evaluation-case-agent', agentOptions, '')}
          ${formInput('预期 Skill（逗号分隔）', 'evaluation-case-skills', '', '如：维修工单处理')}
          ${formInput('预期 Tool/MCP（逗号分隔）', 'evaluation-case-tools', '', '如：get_current_weather,count_work_orders')}
          ${formInput('预期引用文档（逗号分隔）', 'evaluation-case-citations', '', '如：常见维修问题 FAQ,物业维修服务承诺')}
          ${formInput('必须出现的表达（逗号分隔）', 'evaluation-case-required', '', '如：30分钟内到场')}
          ${formInput('禁止出现的表达（逗号分隔）', 'evaluation-case-forbidden', '', '如：已立即创建工单')}
          ${formSelect('人工接管预期', 'evaluation-case-handoff', [{ value: '', label: '不设门槛' }, { value: 'false', label: '不应转人工' }, { value: 'true', label: '必须转人工' }], '')}
          ${formTextarea('人工 Rubric（可选）', 'evaluation-case-rubric', '', '填写业务可用性、语气、SOP 等需要人工判断的标准。填写后运行结果会进入“待人工评审”。', 3)}
          ${formSelect('创建后状态', 'evaluation-case-status', [{ value: 'draft', label: '草稿（不允许运行）' }, { value: 'active', label: '启用（允许操作员运行）' }], 'draft')}`;
        openModal('新增 Golden Set 用例', body, async () => {
          const key = $('#evaluation-case-key').value.trim();
          const title = $('#evaluation-case-title').value.trim();
          const userMessage = $('#evaluation-case-message').value.trim();
          if (!key || !title || !userMessage) { showToast('用例编号、标题、用户消息不能为空', 'error'); return false; }
          const handoffValue = $('#evaluation-case-handoff').value;
          const rubricText = $('#evaluation-case-rubric').value.trim();
          const payload = {
            case_key: key, title, user_message: userMessage,
            description: $('#evaluation-case-description').value.trim(), risk_level: $('#evaluation-case-risk').value,
            source: $('#evaluation-case-source').value, expected_agent_id: $('#evaluation-case-agent').value || null,
            expected_skills: commaList($('#evaluation-case-skills').value), expected_tools: commaList($('#evaluation-case-tools').value),
            expected_citation_docs: commaList($('#evaluation-case-citations').value), required_terms: commaList($('#evaluation-case-required').value),
            forbidden_terms: commaList($('#evaluation-case-forbidden').value), expected_handoff: handoffValue === '' ? null : handoffValue === 'true',
            rubric: rubricText ? { operator_rubric: rubricText } : {}, status: $('#evaluation-case-status').value,
            version_label: APP_VERSION
          };
          try { await apiPost('/api/evaluations/cases', payload); closeModal(); await loadAll(); renderPage(); showToast('Golden Set 用例已创建'); return true; }
          catch (err) { showToast('创建失败：' + err.message, 'error'); return false; }
        }, '创建用例');
      }

      function renderPage() {
        const summary = state.summary || {};
        container.innerHTML = `<div class="max-w-6xl mx-auto p-4 md:p-6 space-y-5">
          <div class="flex flex-wrap items-end justify-between gap-3"><div><h2 class="text-xl font-semibold text-slate-900">评估中心（Golden Set）</h2><p class="text-sm text-slate-500 mt-1">把关键业务链路固定成可重复的产品门槛：规则检查 + 人工 Rubric，而不是只看一次回答好不好。</p></div><button id="evaluation-create" class="px-4 py-2 bg-brand-600 hover:bg-brand-700 text-white rounded-xl text-sm">新增 Golden Set</button></div>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-3"><div class="bg-white border border-slate-200 rounded-2xl p-4"><div class="text-xs text-slate-500">累计运行</div><div class="text-2xl font-semibold text-slate-900 mt-1">${summary.total_runs || 0}</div></div><div class="bg-white border border-slate-200 rounded-2xl p-4"><div class="text-xs text-slate-500">规则通过 / 失败 / 待人工</div><div class="text-lg font-semibold text-slate-900 mt-1">${summary.passed || 0} / ${summary.failed || 0} / ${summary.needs_manual_review || 0}</div></div><div class="bg-white border border-slate-200 rounded-2xl p-4"><div class="text-xs text-slate-500">评估模型直接成本</div><div class="text-2xl font-semibold text-slate-900 mt-1">${money(summary.estimated_cost_cny)}</div><div class="text-[11px] text-slate-400 mt-1">仅按 Trace 价格快照估算，不是供应商账单。</div></div></div>
          <div class="bg-violet-50 border border-violet-200 rounded-2xl p-4 text-sm text-violet-900"><div class="font-medium">质量运营闭环</div><div class="mt-1 text-violet-800">Trace 记录这一次怎样发生；Badcase 保存真实失败与修复；Golden Set 将关键修复固化为可重复门槛。运行评估必须由操作员主动点击，系统不自动消耗模型，也不伪造线上 SLA。</div></div>
          <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden"><div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="bg-slate-50 border-b border-slate-200"><th class="px-4 py-3 text-left text-slate-600">用例</th><th class="px-4 py-3 text-left text-slate-600">来源 / 风险</th><th class="px-4 py-3 text-left text-slate-600">预期路径</th><th class="px-4 py-3 text-left text-slate-600">状态</th><th class="px-4 py-3 text-left text-slate-600">最近运行</th><th class="px-4 py-3 text-left text-slate-600"></th></tr></thead><tbody class="divide-y divide-slate-100">${state.cases.length ? state.cases.map(item => `<tr class="hover:bg-slate-50"><td class="px-4 py-3"><div class="font-medium text-slate-900">${escapeHtml(item.title || '-')}</div><div class="font-mono text-[11px] text-slate-500">${escapeHtml(item.case_key || '')}</div></td><td class="px-4 py-3">${badge(item.source || '-', 'bg-slate-100 text-slate-600')} ${badge(item.risk_level || '-', 'bg-violet-50 text-violet-700')}</td><td class="px-4 py-3 text-xs text-slate-600">${escapeHtml([item.expected_agent_id, ...(item.expected_tools || []), ...(item.expected_citation_docs || [])].filter(Boolean).join(' · ') || '人工 Rubric / 无硬门槛')}</td><td class="px-4 py-3">${badge(caseStateLabel[item.status] || item.status, colorForCase(item.status))}</td><td class="px-4 py-3 text-xs text-slate-500">${item.last_run_status ? `${badge(runStateLabel[item.last_run_status] || item.last_run_status, colorForRun(item.last_run_status))}<div class="mt-1">${escapeHtml(formatTimeLabel(item.last_run_at))}</div>` : '未运行'}</td><td class="px-4 py-3"><button class="evaluation-open-case px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg text-xs" data-case-id="${item.id}">查看</button></td></tr>`).join('') : `<tr><td colspan="6" class="px-4 py-10 text-center text-slate-400">还没有 Golden Set。先把一个高风险或高频业务链路写成可重复用例。</td></tr>`}</tbody></table></div></div></div>`;
        $('#evaluation-create').addEventListener('click', openCreateModal);
        $$('.evaluation-open-case').forEach(button => button.addEventListener('click', () => openCase(Number(button.dataset.caseId))));
      }

      try { await loadAll(); renderPage(); } catch (err) { container.innerHTML = emptyState('加载评估中心失败：' + escapeHtml(err.message)); }
    }

    async function renderCostGovernancePage(container) {
      container.innerHTML = loadingState();

      const state = {
        filters: { start: '', end: '', model: '', agent: '', intent: '', stage: '', search: '', groupBy: 'model' },
        overview: null,
        traces: [],
        trends: [],
        distribution: [],
        prices: [],
        budget: {},
        costCases: [],
      };

      function fmtDate(d) {
        if (!d) return '';
        const date = new Date(d);
        if (isNaN(date.getTime())) return d;
        return date.toISOString().slice(0, 10);
      }
      function fmtTime(d) {
        if (!d) return '';
        return formatTimeLabel(d);
      }
      function fmtCost(v) {
        if (v === null || v === undefined) return '未配置价格';
        return '¥' + Number(v).toFixed(6);
      }
      function fmtContextTokens(v) {
        if (v === null || v === undefined || v === 0) return '不可得';
        return Number(v).toLocaleString();
      }
      function fmtTokens(v) {
        if (v === null || v === undefined) return '-';
        return Number(v).toLocaleString();
      }
      function sourceBadge(src) {
        if (src === 'provider_reported') return '<span class="px-1.5 py-0.5 bg-green-50 text-green-600 rounded text-[10px]">Provider账单</span>';
        if (src === 'estimated_tokenization') return '<span class="px-1.5 py-0.5 bg-amber-50 text-amber-600 rounded text-[10px]">本地估算</span>';
        return '<span class="px-1.5 py-0.5 bg-slate-100 text-slate-500 rounded text-[10px]">未知</span>';
      }
      function statusBadgeSmall(s) {
        if (s === 'success') return '<span class="text-green-600">成功</span>';
        if (s === 'failed') return '<span class="text-red-600">失败</span>';
        return '<span class="text-slate-500">' + escapeHtml(s || '-') + '</span>';
      }

      async function loadAll() {
        const params = new URLSearchParams();
        if (state.filters.start) params.append('start', state.filters.start);
        if (state.filters.end) params.append('end', state.filters.end);
        if (state.filters.model) params.append('model_id', state.filters.model);
        if (state.filters.stage) params.append('stage', state.filters.stage);
        if (state.filters.search) params.append('trace_id', state.filters.search);
        const qs = params.toString() ? '?' + params.toString() : '';
        const [overview, traces, trends, distribution, prices, budget] = await Promise.all([
          apiGet(`/api/observability/overview${qs}`).catch(() => ({})),
          apiGet(`/api/observability/traces${qs}`).catch(() => ({ traces: [] })),
          apiGet(`/api/observability/trends${qs}`).catch(() => ({ items: [] })),
          apiGet(`/api/observability/distribution?group_by=${state.filters.groupBy}${state.filters.start ? '&start=' + state.filters.start : ''}${state.filters.end ? '&end=' + state.filters.end : ''}${state.filters.model ? '&model_id=' + state.filters.model : ''}`).catch(() => ({ items: [] })),
          apiGet('/api/observability/prices').catch(() => ({ prices: [] })),
          apiGet('/api/observability/budget').catch(() => ({ budget: {} })),
        ]);
        state.overview = overview;
        state.traces = traces.traces || [];
        state.traceRange = { start: traces.start || state.filters.start, end: traces.end || state.filters.end };
        state.trends = trends.items || [];
        state.distribution = distribution.items || [];
        state.prices = prices.prices || [];
        state.budget = budget.budget || {};
      }

      function renderOverview() {
        const o = state.overview || {};
        const alerts = (o.alerts || []).map(a => `<span class="px-2 py-1 rounded-lg text-xs ${a.type === 'daily' ? 'bg-red-100 text-red-700' : 'bg-amber-100 text-amber-700'}">${a.type === 'daily' ? '每日' : '单次'}预警：阈值 ¥${a.threshold}，实际 ¥${a.actual}</span>`).join('');
        const priceMissingWarning = o.price_missing ? `<div class="mt-3 p-3 bg-amber-50 border border-amber-200 rounded-xl text-xs text-amber-700 flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>部分模型调用缺少价格配置，成本显示为“未配置价格”。请先到下方“模型价格表”补全价格。</div>` : '';

        function periodCard(label, p) {
          const usage = p && typeof p.budget_usage_percent === 'number' ? `${p.budget_usage_percent.toFixed(2)}%` : '-';
          const usageBar = p && typeof p.budget_usage_percent === 'number' ? `
            <div class="w-full h-1.5 bg-slate-100 rounded-full mt-2 overflow-hidden">
              <div class="h-full ${p.budget_usage_percent >= 80 ? 'bg-red-500' : 'bg-brand-500'}" style="width: ${Math.min(100, p.budget_usage_percent)}%"></div>
            </div>
          ` : '';
          return `
            <div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-4">
              <div class="text-[11px] text-slate-500 mb-1">${label}</div>
              <div class="text-lg font-semibold text-slate-900">${fmtTokens(p ? p.total_tokens : null)}</div>
              <div class="text-[11px] text-slate-500 mt-1">估算成本 ${fmtCost(p ? p.estimated_cost_cny : null)}</div>
              <div class="mt-2 text-[10px] text-slate-400 flex flex-col gap-0.5">
                <span>Provider 账单 Token：${fmtTokens(p ? p.provider_reported_tokens : null)}</span>
                <span>本地估算 Token：${fmtTokens(p ? p.local_estimated_tokens : null)}</span>
                <span>预算使用：${usage}</span>
              </div>
              ${usageBar}
            </div>
          `;
        }

        return `
          <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3">
            <div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-4">
              <div class="text-[11px] text-slate-500">今日调用次数</div>
              <div class="text-xl font-semibold text-slate-900 mt-1">${Number(o.calls || 0).toLocaleString()}</div>
            </div>
            <div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-4">
              <div class="text-[11px] text-slate-500">今日总 Token</div>
              <div class="text-xl font-semibold text-slate-900 mt-1">${fmtTokens(o.total_tokens)}</div>
            </div>
            <div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-4">
              <div class="text-[11px] text-slate-500">今日估算成本</div>
              <div class="text-xl font-semibold text-slate-900 mt-1">${fmtCost(o.total_cost)}</div>
            </div>
            <div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-4">
              <div class="text-[11px] text-slate-500">平均单轮 Token</div>
              <div class="text-xl font-semibold text-slate-900 mt-1">${fmtTokens(o.avg_tokens)}</div>
            </div>
            <div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-4">
              <div class="text-[11px] text-slate-500">平均单轮估算成本</div>
              <div class="text-xl font-semibold text-slate-900 mt-1">${fmtCost(o.avg_cost)}</div>
            </div>
            <div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-4">
              <div class="text-[11px] text-slate-500">成本未知调用数</div>
              <div class="text-xl font-semibold text-slate-900 mt-1">${Number(o.unknown_cost_calls || 0).toLocaleString()}</div>
            </div>
            <div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-4">
              <div class="text-[11px] text-slate-500">失败调用数</div>
              <div class="text-xl font-semibold text-slate-900 mt-1">${Number(o.failed_calls || 0).toLocaleString()}</div>
            </div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mt-3">
            ${periodCard('今日', o.today)}
            ${periodCard('近7天', o.last_7_days)}
            ${periodCard('本月', o.this_month)}
          </div>
          ${alerts ? `<div class="flex flex-wrap gap-2 mt-3">${alerts}</div>` : ''}
          ${priceMissingWarning}
          <p class="text-[11px] text-slate-400 mt-2">${escapeHtml(o.cost_note || '按配置价格估算成本，非供应商实际结算金额')} · 货币 ${escapeHtml(o.currency || 'CNY')}</p>
        `;
      }

      function renderFilters() {
        return `
          <div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-4">
            <div class="flex flex-wrap gap-3 items-end">
              <div class="flex flex-col gap-1">
                <label class="text-[10px] text-slate-400">开始日期</label>
                <input id="cg-start" type="date" value="${state.filters.start ? fmtDate(state.filters.start) : ''}" class="px-3 py-2 border border-slate-200 rounded-xl text-sm">
              </div>
              <div class="flex flex-col gap-1">
                <label class="text-[10px] text-slate-400">结束日期（含当天）</label>
                <input id="cg-end" type="date" value="${state.filters.end ? fmtDate(state.filters.end) : ''}" class="px-3 py-2 border border-slate-200 rounded-xl text-sm">
              </div>
              <input id="cg-search" type="text" placeholder="session_id / trace_id" value="${escapeHtml(state.filters.search)}" class="px-3 py-2 border border-slate-200 rounded-xl text-sm w-48">
              <select id="cg-model" class="px-3 py-2 border border-slate-200 rounded-xl text-sm">
                <option value="">全部模型</option>
                <option value="deepseek-v4-flash" ${state.filters.model === 'deepseek-v4-flash' ? 'selected' : ''}>deepseek-v4-flash</option>
                <option value="deepseek-v4-pro" ${state.filters.model === 'deepseek-v4-pro' ? 'selected' : ''}>deepseek-v4-pro</option>
              </select>
              <select id="cg-stage" class="px-3 py-2 border border-slate-200 rounded-xl text-sm">
                <option value="">全部阶段</option>
                <option value="router" ${state.filters.stage === 'router' ? 'selected' : ''}>router</option>
                <option value="vertical_agent" ${state.filters.stage === 'vertical_agent' ? 'selected' : ''}>vertical_agent</option>
                <option value="ab_test_a" ${state.filters.stage === 'ab_test_a' ? 'selected' : ''}>ab_test_a</option>
                <option value="ab_test_b" ${state.filters.stage === 'ab_test_b' ? 'selected' : ''}>ab_test_b</option>
                <option value="darwin" ${state.filters.stage === 'darwin' ? 'selected' : ''}>darwin</option>
              </select>
              <select id="cg-group" class="px-3 py-2 border border-slate-200 rounded-xl text-sm">
                <option value="model" ${state.filters.groupBy === 'model' ? 'selected' : ''}>按模型分布</option>
                <option value="agent" ${state.filters.groupBy === 'agent' ? 'selected' : ''}>按 Agent 分布</option>
                <option value="intent" ${state.filters.groupBy === 'intent' ? 'selected' : ''}>按意图分布</option>
                <option value="stage" ${state.filters.groupBy === 'stage' ? 'selected' : ''}>按阶段分布</option>
              </select>
              <button id="cg-apply" type="button" class="px-4 py-2 bg-brand-600 hover:bg-brand-700 text-white rounded-xl text-sm">应用筛选</button>
            </div>
          </div>
        `;
      }

      function renderTrends() {
        const items = state.trends || [];
        if (!items.length) return `<div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-4"><p class="text-sm text-slate-400">暂无趋势数据</p></div>`;
        const maxCalls = Math.max(...items.map(i => i.calls || 0), 1);
        return `
          <div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-4">
            <h3 class="font-semibold text-slate-900 mb-3">调用趋势</h3>
            <div class="space-y-2 max-h-64 overflow-y-auto">
              ${items.map(i => `
                <div class="flex items-center gap-3 text-sm">
                  <div class="w-24 text-slate-500 shrink-0">${escapeHtml(i.period)}</div>
                  <div class="flex-1 h-4 bg-slate-100 rounded-full overflow-hidden">
                    <div class="h-full bg-brand-500 rounded-full" style="width: ${Math.min(100, ((i.calls || 0) / maxCalls) * 100)}%"></div>
                  </div>
                  <div class="w-16 text-right text-slate-700">${Number(i.calls || 0).toLocaleString()}</div>
                  <div class="w-20 text-right text-slate-500">${fmtTokens(i.tokens)}</div>
                  <div class="w-24 text-right text-slate-700">${fmtCost(i.cost)}</div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }

      function renderDistribution() {
        const items = state.distribution || [];
        if (!items.length) return `<div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-4"><p class="text-sm text-slate-400">暂无分布数据</p></div>`;
        return `
          <div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-4">
            <h3 class="font-semibold text-slate-900 mb-3">${{ model: '模型', agent: 'Agent', intent: '意图', stage: '阶段' }[state.filters.groupBy] || '分布'}</h3>
            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead><tr class="text-left text-slate-500 text-xs border-b border-slate-100"><th class="pb-2">分组</th><th class="pb-2">调用数</th><th class="pb-2">Token</th><th class="pb-2">估算成本</th></tr></thead>
                <tbody>
                  ${items.map(i => `
                    <tr class="border-b border-slate-50 last:border-0">
                      <td class="py-2">${escapeHtml(i[state.filters.groupBy === 'stage' ? 'stage' : (state.filters.groupBy === 'model' ? 'model_id' : state.filters.groupBy)] || '-')}</td>
                      <td class="py-2">${Number(i.calls || 0).toLocaleString()}</td>
                      <td class="py-2">${fmtTokens(i.tokens)}</td>
                      <td class="py-2">${fmtCost(i.cost)}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>
        `;
      }

      function renderBarChart(items, labelKey, title) {
        if (!items || !items.length) return `<div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-4"><p class="text-sm text-slate-400">暂无${title}数据</p></div>`;
        const maxTokens = Math.max(...items.map(i => i.total_tokens || 0), 1);
        return `
          <div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-4">
            <h3 class="font-semibold text-slate-900 mb-3">${title}</h3>
            <div class="space-y-2 max-h-64 overflow-y-auto">
              ${items.map(i => `
                <div class="flex items-center gap-3 text-sm">
                  <div class="w-28 text-slate-500 shrink-0 truncate" title="${escapeHtml(i[labelKey] || '-')}">${escapeHtml(i[labelKey] || '-')}</div>
                  <div class="flex-1 h-4 bg-slate-100 rounded-full overflow-hidden">
                    <div class="h-full bg-brand-500 rounded-full" style="width: ${Math.min(100, ((i.total_tokens || 0) / maxTokens) * 100)}%"></div>
                  </div>
                  <div class="w-16 text-right text-slate-700">${Number(i.calls || 0).toLocaleString()}</div>
                  <div class="w-20 text-right text-slate-500">${fmtTokens(i.total_tokens)}</div>
                  <div class="w-24 text-right text-slate-700">${fmtCost(i.estimated_cost_cny)}</div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }

      function renderModelChart() {
        const o = state.overview || {};
        const byModel = o.by_model || {};
        const items = Object.entries(byModel).map(([k, v]) => ({ ...v, model_id: v.model_name || k }));
        return renderBarChart(items, 'model_id', '按模型（Flash / Pro）');
      }

      function renderStageChart() {
        const o = state.overview || {};
        const byStage = o.by_stage || {};
        const stageLabels = {
          router: '路由',
          vertical_agent: '垂直 Agent',
          darwin: 'Darwin 分析',
          ab_test: 'A/B 测试',
          badcase_classify: 'Badcase 分类'
        };
        const items = Object.entries(byStage).map(([k, v]) => ({ ...v, stage: stageLabels[k] || k, stage_key: k }));
        return renderBarChart(items, 'stage', '按阶段');
      }

      function renderTraces() {
        let items = state.traces || [];
        if (state.filters.search) {
          const s = state.filters.search.toLowerCase();
          items = items.filter(t => (t.trace_id || '').toLowerCase().includes(s) || (t.session_id || '').toLowerCase().includes(s));
        }
        if (!items.length) return `<div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-4"><p class="text-sm text-slate-400">暂无 Trace 数据</p></div>`;
        const range = state.traceRange || {};
        const rangeText = (range.start || range.end)
          ? `<span class="text-xs text-slate-500">生效范围：${escapeHtml(range.start || '')} ~ ${escapeHtml(range.end || '')}</span>`
          : '';
        return `
          <div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-4">
            <div class="flex items-center justify-between mb-3">
              <h3 class="font-semibold text-slate-900">调用 Trace 列表（含成本可解释性）</h3>
              ${rangeText}
            </div>
            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead><tr class="text-left text-slate-500 text-xs border-b border-slate-100"><th class="pb-2">trace_id</th><th class="pb-2">时间</th><th class="pb-2">意图</th><th class="pb-2">Agent</th><th class="pb-2">模型</th><th class="pb-2">Token</th><th class="pb-2">估算成本</th><th class="pb-2">状态</th><th class="pb-2">操作</th></tr></thead>
                <tbody>
                  ${items.map(t => `
                    <tr class="border-b border-slate-50 last:border-0 hover:bg-slate-50">
                      <td class="py-2 font-mono text-xs text-slate-600">${escapeHtml(t.trace_id)}</td>
                      <td class="py-2 text-slate-500">${fmtTime(t.created_at)}</td>
                      <td class="py-2">${escapeHtml(t.intent || '-')}</td>
                      <td class="py-2">${escapeHtml(t.agent_name || '-')}</td>
                      <td class="py-2">${escapeHtml(t.model_summary || '-')}</td>
                      <td class="py-2">${t.no_model_calls ? '<span class="text-xs text-amber-600">尚无模型调用记录</span>' : fmtTokens(t.total_tokens)}</td>
                      <td class="py-2">${t.price_missing ? '<span class="text-xs text-amber-600">未配置价格</span>' : fmtCost(t.estimated_cost_cny)}</td>
                      <td class="py-2">${statusBadgeSmall(t.status)}</td>
                      <td class="py-2"><button type="button" data-trace="${escapeHtml(t.trace_id)}" class="cg-trace-detail px-2 py-1 bg-brand-50 text-brand-600 rounded-lg text-xs hover:bg-brand-100">查看账单</button></td>

              </details>
              ${c.error_summary ? `<div class="text-xs text-red-600 mt-1">错误：${escapeHtml(c.error_summary)}</div>` : ''}
            </div>

          const mcpHtml = mcpCalls.length ? mcpCalls.map(c => `
            <div class="border border-slate-200 rounded-xl p-3 mb-2 text-sm">
              <div class="flex items-center justify-between mb-1">
                <span class="font-medium text-slate-900">[${escapeHtml(c.server_name)}] ${escapeHtml(c.tool_name)}</span>
                <span class="text-xs">${statusBadgeSmall(c.status)} · ${c.latency_ms || 0}ms</span>
              </div>
              <div class="text-xs text-slate-500">invocation_mode: ${escapeHtml(c.invocation_mode || 'model_native')}</div>
              <div class="text-xs text-slate-500">参数：${escapeHtml(JSON.stringify(c.arguments || {}))}</div>
              ${c.result_summary ? `<div class="text-xs text-slate-600 mt-1 bg-slate-50 rounded p-1.5">结果摘要：${escapeHtml(c.result_summary)}</div>` : ''}
              ${c.error_summary ? `<div class="text-xs text-red-600 mt-1">错误：${escapeHtml(c.error_summary)}</div>` : ''}
            </div>
          `).join('') : '<p class="text-sm text-slate-400">无 MCP 调用</p>';
          const breakdownHtml = `
            <div class="text-sm text-slate-600 space-y-1">
              <div class="flex justify-between"><span>system prompt</span><span>${fmtContextTokens(breakdown.system_prompt_tokens)}</span></div>
              <div class="flex justify-between"><span>history（历史消息）</span><span>${fmtContextTokens(breakdown.history_tokens)}</span></div>
              <div class="flex justify-between"><span>skill</span><span>${fmtContextTokens(breakdown.skill_tokens)}</span></div>
              <div class="flex justify-between"><span>rag</span><span>${fmtContextTokens(breakdown.rag_tokens)}</span></div>
              <div class="flex justify-between"><span>tool_result</span><span>${fmtContextTokens(breakdown.tool_result_tokens)}</span></div>
              <div class="flex justify-between"><span>user_message</span><span>${fmtContextTokens(breakdown.user_message_tokens)}</span></div>
              <p class="text-[11px] text-amber-600 mt-2">本地上下文估算，不等于 Provider 原始账单</p>
            </div>
          `;
          const html = `
            <div class="space-y-4">
              <div class="bg-slate-50 rounded-xl p-3 border border-slate-200 text-sm">
                <div><span class="text-slate-500">trace_id:</span> <span class="font-mono">${escapeHtml(traceId)}</span></div>

      async function runCost01() {
        const resultEl = $('#cost01-result');
        resultEl.innerHTML = '<span class="text-slate-400">执行中...</span>';
        try {
          const query = '我要投诉楼下噪音太大，物业不作为';
          const r = await apiPost('/api/model-configs/ab-test', { prompt: query });
          const fmt = (d, name) => {
            if (d.error) return `<div class="text-red-600">${name} 失败：${escapeHtml(d.error)}</div>`;
            return `<div><span class="font-medium">${name}</span> · Token ${fmtTokens(d.total_tokens)} · 耗时 ${d.latency_ms || 0}ms · 估算 ${fmtCost(d.estimated_cost_cny)} · usage ${escapeHtml(d.usage_source || '-')}</div>`;
          };
          resultEl.innerHTML = `
            <div>trace: ${escapeHtml(r.trace_id || '-')}</div>
            ${fmt(r.model_a_result, 'Flash')}
            ${fmt(r.model_b_result, 'Pro')}
          `;
          state.costCases.push({ id: 'COST-01', result: r });
        } catch (err) {
          resultEl.innerHTML = '<span class="text-red-600">执行失败：' + escapeHtml(err.message || err) + '</span>';
        }
      }

      async function runCost02() {
        const resultEl = $('#cost02-result');
        resultEl.innerHTML = '<span class="text-slate-400">执行中...</span>';
        try {
          const query = '一般漏水多久响应';
          const run = async (k) => {
            const res = await apiPost('/api/runtime/cost-preview/retrieval', {
              query,
              agent_id: 'maintenance',
              top_k: k
            });
            const preview = res.preview || {};
            const results = preview.results || [];
            return {
              k,
              count: results.length,
              contextChars: Number(preview.context_characters || 0),
              titles: [...new Set(results.map(item => item.document_title).filter(Boolean))].slice(0, 3),
              fallback: Boolean(preview.used_snapshot_fallback),
              releaseId: preview.release_id
            };
          };
          const r1 = await run(1);
          const r5 = await run(5);
          resultEl.innerHTML = `
            <div>Top-K=1：证据 ${r1.count} 条 · 上下文 ${r1.contextChars} 字 · 文档 ${escapeHtml(r1.titles.join('、') || '-')} · 快照回退 ${r1.fallback ? '是' : '否'}</div>
            <div>Top-K=5：证据 ${r5.count} 条 · 上下文 ${r5.contextChars} 字 · 文档 ${escapeHtml(r5.titles.join('、') || '-')} · 快照回退 ${r5.fallback ? '是' : '否'}</div>
            <div class="text-amber-700">基于 Release ${escapeHtml(r5.releaseId || '-')} 与 maintenance Agent 的显式 RAG 绑定；没有修改配置，也不等于 Provider Token 或成本。真正优化需发布候选 Release 后用同题 Trace 通过质量门槛。</div>
          `;
          state.costCases.push({ id: 'COST-02', r1, r5 });
        } catch (err) {
          resultEl.innerHTML = '<span class="text-red-600">执行失败：' + escapeHtml(err.message || err) + '</span>';
        }
      }

              </details>
            </div>`;
          $$('.runtime-rollback-btn').forEach(button => {

              if (!confirm(`确认把当前指针回滚到 ${releaseId}？仅下一新会话生效。`)) return;
              try {
                await apiPost('/api/runtime/releases/rollback', { release_id: releaseId });
                showToast(`已回滚到 ${releaseId}；已有会话仍保持原 Snapshot`);

              } catch (err) {
                showToast('回滚失败：' + (err.message || err), 'error');
              }
            });
          });
          const parseCsv = value => value.split(/[,，、\n]+/).map(item => item.trim()).filter(Boolean);

          const renderAcceptance = result => `
            <div class="space-y-2">
              <div class="rounded-xl p-3 ${result.passed ? 'bg-emerald-50 text-emerald-800' : 'bg-red-50 text-red-800'} font-semibold">${result.passed ? '验收通过' : '验收失败'} · ${escapeHtml(result.acceptance_run_id || '')}</div>
              ${(result.assertions || []).map(item => `<div class="rounded-xl border p-3 text-xs ${item.passed ? 'border-emerald-100' : 'border-red-100'}"><div class="font-semibold">${item.passed ? '✓' : '✗'} ${escapeHtml(item.name)}</div><div class="mt-1">expected: ${escapeHtml(JSON.stringify(item.expected))}</div><div>actual: ${escapeHtml(JSON.stringify(item.actual))}</div></div>`).join('')}

            try {
              const result = await apiPost('/api/runtime/acceptance/trace', {
                case_key: 'HIT-TRACE-01',
                trace_id: traceId,
                expected_agent_id: $('#runtime-trace-agent').value.trim() || null,
                expected_skill_ids: parseIds($('#runtime-trace-skills').value),
                expected_mcp_tools: parseCsv($('#runtime-trace-mcp').value),
                expected_knowledge_doc_ids: parseIds($('#runtime-trace-docs').value),
                require_skill: $('#runtime-require-skill').checked,
                require_rag: $('#runtime-require-rag').checked,
                require_mcp: $('#runtime-require-mcp').checked,

                require_cost: $('#runtime-require-cost').checked,
                forbid_business_write: $('#runtime-forbid-write').checked
              });
              openDrawer('Trace 验收结果', renderAcceptance(result));
            } catch (err) { showToast('Trace 验收失败：' + (err.message || err), 'error'); }
          });
          $('#runtime-extension-accept-btn').addEventListener('click', async () => {
            const query = $('#runtime-ext-query').value.trim();
            const agentId = $('#runtime-ext-agent').value.trim();
            if (!query || !agentId) return showToast('请填写固定问题和预期 Agent', 'error');
            try {
              const result = await apiPost('/api/runtime/acceptance/extension', {
                case_key: 'EXT-OFFDOMAIN-01',
                session_id: $('#runtime-ext-session').value.trim() || `ext-${Date.now()}`,
                query,
                expected_agent_id: agentId,
                expected_skill_ids: parseIds($('#runtime-ext-skills').value),
                expected_mcp_tools: parseCsv($('#runtime-ext-mcp').value),
                expected_knowledge_doc_ids: parseIds($('#runtime-ext-docs').value),
                run_scoped_retrieval: $('#runtime-ext-retrieval').checked,
                baseline_session_id: $('#runtime-ext-baseline-session').value.trim() || null,
                expected_baseline_snapshot_hash: $('#runtime-ext-baseline-hash').value.trim() || null
              });

            } catch (err) { showToast('新增能力包验收失败：' + (err.message || err), 'error'); }
          });
          $('#runtime-composite-accept-btn').addEventListener('click', async () => {
            try {
              const childCases = JSON.parse($('#runtime-composite-cases').value.trim() || '[]');
              if (!Array.isArray(childCases) || !childCases.length) throw new Error();
              const result = await apiPost('/api/runtime/acceptance/composite', {
                case_key: 'HIT-COMPOSITE-01',
                child_cases: childCases,
                expected_child_case_keys: childCases.map(item => item.case_key).filter(Boolean)
              });
              openDrawer('组合 Acceptance Run', renderAcceptance(result));
            } catch (err) { showToast('组合验收 JSON 或子 Trace 无效', 'error'); }
          });
        } catch (err) {
          $('#runtime-content').innerHTML = emptyState('运行时发布信息加载失败');
        }
      }

      $('#runtime-compile-btn').addEventListener('click', async () => {
        try {
          const data = await apiPost('/api/runtime/releases/compile', { created_by: 'platform-ui' });
          const release = data.release || {};
          const valid = !!(release.validation || {}).valid;
          openDrawer('RuntimeRelease 草稿校验', renderRelease(release));
          showToast(valid ? '草稿校验通过，尚未发布' : '草稿校验失败，请查看错误', valid ? 'success' : 'error');
        } catch (err) {
          showToast('草稿校验失败：' + (err.message || err), 'error');
        }
      });
      $('#runtime-publish-btn').addEventListener('click', async () => {
        if (!confirm('发布后仅影响下一新会话；已有会话继续使用原 Snapshot。确认校验并发布？')) return;
        try {
          const data = await apiPost('/api/runtime/releases/publish-current-config', { created_by: 'platform-ui' });
          if (!data.published) {
            openDrawer('发布校验未通过', renderRelease(data.release || {}));
            showToast('发布失败：配置校验未通过', 'error');
            return;
          }
          showToast(`已发布 ${(data.release || {}).release_id || '新 RuntimeRelease'}；请新建会话验收`);
          await loadRuntime();
        } catch (err) {
          showToast('发布失败：' + (err.message || err), 'error');
        }
      });
      await loadRuntime();
    }

      function bindAgentActions() {
        $$('.agent-edit-btn').forEach(btn => {
          btn.addEventListener('click', () => editAgent(Number(btn.dataset.id)));
        });
        $$('.agent-delete-btn').forEach(btn => {
          btn.addEventListener('click', () => deleteAgent(Number(btn.dataset.id)));
        });
        $$('.agent-toggle').forEach(toggle => {
          toggle.addEventListener('change', async () => {
            const agentId = Number(toggle.dataset.id);
            const enabled = toggle.checked;
            try {
              await apiPatch(`/api/agents/${agentId}`, { enabled });
              showToast(`Agent Draft 已${enabled ? '启用' : '禁用'}；发布 RuntimeRelease 后进入下一新会话`);
              await loadAgents();
            } catch (err) {
              showToast('状态更新失败', 'error');
