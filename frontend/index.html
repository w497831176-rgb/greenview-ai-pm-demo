    // ==========================================
    // Utility Functions

    function $(selector) { return document.querySelector(selector); }
    function $$(selector) { return document.querySelectorAll(selector); }

    function requireElement(selector, context = '') {
      const el = $(selector);
      if (!el) throw new Error(`渲染失败：缺少必要 DOM 元素 "${selector}"${context ? ' (' + context + ')' : ''}`);
      return el;
    }

    function displayRenderError(err, context = '') {
      console.error(`[${context || 'frontend'}] 渲染失败:`, err);
      const main = document.getElementById('main-content');
      if (!main) return;
      const msg = err && err.message ? err.message : String(err);
      main.innerHTML = `
        <div class="min-h-screen flex items-center justify-center p-6 fade-in">
          <div class="max-w-md w-full bg-white rounded-2xl shadow-soft border border-slate-200 p-8 text-center">

            </div>
            <h2 class="text-lg font-semibold text-slate-800 mb-2">页面加载失败</h2>
            ${context ? `<p class="text-sm text-slate-500 mb-2">${escapeHtml(context)}</p>` : ''}
            <pre class="text-xs text-left bg-slate-50 p-3 rounded-lg text-red-600 overflow-auto max-h-32 mb-6">${escapeHtml(msg)}</pre>
            <button onclick="location.reload()" class="px-4 py-2 bg-brand-600 hover:bg-brand-700 text-white rounded-lg transition-colors">刷新重试</button>
          </div>
        </div>`;
    }

    function showToast(message, type = 'success') {
      const toast = $('#toast');
      const icon = type === 'success'
        ? '<svg class="w-5 h-5 text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>'
        : '<svg class="w-5 h-5 text-gold-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';
      $('#toast-icon').innerHTML = icon;
      $('#toast-message').textContent = message;
      toast.classList.remove('translate-y-20', 'opacity-0');
      setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
    }

    function statusBadge(status) {
      const styleMap = {
        'pending': 'bg-amber-50 text-amber-700 border-amber-200',
        'classified': 'bg-indigo-50 text-indigo-700 border-indigo-200',
        'fixing': 'bg-brand-50 text-brand-700 border-brand-200',
        'verifying': 'bg-sky-50 text-sky-700 border-sky-200',
        'closed': 'bg-slate-100 text-slate-600 border-slate-200',
        'rejected': 'bg-red-50 text-red-700 border-red-200',
        '待派单': 'bg-amber-50 text-amber-700 border-amber-200',
        '待处理': 'bg-amber-50 text-amber-700 border-amber-200',

    async function sendThumbFeedback(messageId, type, reason = null) {
      try {
        const res = await fetch(`${API_BASE}/api/chat/feedback`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: STATE.chatSessionId, message_id: messageId, type, reason })

        <p class="text-sm text-slate-600 mb-3">请选择不满意的原因：</p>

    function renderAiMessageTags(skills, tools, agent, routeReason = '', routeIntent = '', modelId = '', thinkingEnabled = null, modelSelectionReason = '', traceId = '', mcpCalls = null, usageSource = '') {
      const tags = [];
      if (modelId) {
        const modelLabel = modelId === 'deepseek-v4-pro' ? 'Pro' : (modelId === 'deepseek-v4-flash' ? 'Flash' : modelId);
        const thinkingText = thinkingEnabled ? '· thinking' : '';
        tags.push(`<span class="px-1.5 py-0.5 bg-purple-50 text-purple-600 rounded text-[10px]" title="${escapeHtml(modelSelectionReason || '')}">模型：${escapeHtml(modelId)}${thinkingText}</span>`);
      }
      if (routeReason) tags.push(`<span class="px-1.5 py-0.5 bg-slate-100 text-slate-600 rounded text-[10px]" title="${escapeHtml(routeIntent || '')}">路由原因：${escapeHtml(routeReason)}</span>`);
      if (agent) tags.push(`<span class="px-1.5 py-0.5 bg-indigo-50 text-indigo-600 rounded text-[10px]">当前处理 Agent：${escapeHtml(agent)}</span>`);
      if (skills && skills.length) tags.push(`<span class="px-1.5 py-0.5 bg-brand-50 text-brand-600 rounded text-[10px]">已命中 Skill：${escapeHtml(skills.join('、'))}</span>`);
      if (tools && tools.length) tags.push(`<span class="px-1.5 py-0.5 bg-gold-50 text-gold-600 rounded text-[10px]">已调用工具：${escapeHtml(tools.map(t => typeof t === 'string' ? t : (t.name || t.tool_name || JSON.stringify(t))).join('、'))}</span>`);
      if (mcpCalls && mcpCalls.length) {
        const okCount = mcpCalls.filter(c => c.status === 'success').length;
        const failCount = mcpCalls.length - okCount;
        const statusText = failCount > 0 ? `${okCount}成功/${failCount}失败` : `${okCount}次成功`;
        const summary = mcpCalls.map(c => `[${escapeHtml(c.server_name || 'unknown')}] ${escapeHtml(c.tool_name || '')} ${c.status === 'success' ? '✓' : '✗'} ${c.latency_ms || 0}ms`).join('\n');
        tags.push(`<span class="px-1.5 py-0.5 bg-cyan-50 text-cyan-600 rounded text-[10px] cursor-help" title="${escapeHtml(summary)}">MCP 调用：${statusText}</span>`);
      }
      if (traceId) {
        const sourceLabel = usageSource === 'provider_reported' ? 'Provider账单' : (usageSource === 'estimated_tokenization' ? '本地估算' : '未知');
        tags.push(`<span class="px-1.5 py-0.5 bg-slate-50 text-slate-500 rounded text-[10px]" title="trace_id: ${escapeHtml(traceId)} · usage_source: ${escapeHtml(usageSource || 'unknown')}">Trace · ${escapeHtml(sourceLabel)}</span>`);
      }
      return tags.length ? `<div class="flex flex-wrap items-center gap-1 mt-2">${tags.join('')}</div>` : '';
    }

          if (active) {
            btn.className = 'top-tab px-4 py-2 rounded-lg text-sm font-medium transition-all bg-brand-600 text-white shadow-md';

    function renderSidebar() {
      const role = ROLES[STATE.topTab];

      requireElement('#role-title', 'renderSidebar').textContent = role.title;
      requireElement('#role-subtitle', 'renderSidebar').textContent = role.subtitle;
      const avatar = requireElement('#role-avatar', 'renderSidebar');
      avatar.textContent = role.avatar;
      avatar.className = `w-10 h-10 rounded-full bg-gradient-to-br ${role.color} flex items-center justify-center text-white font-semibold shadow-lg`;

      const menu = MENU[STATE.topTab];
      if (!menu) throw new Error(`renderSidebar: 无菜单配置 "${STATE.topTab}"`);
      requireElement('#sub-menu', 'renderSidebar').innerHTML = menu.map(item => {
        const active = item.id === STATE.subTab;
        return `
          <button data-sub="${item.id}" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all ${active ? 'bg-brand-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}">
            <span class="${active ? 'text-white' : 'text-slate-400'}">${ICONS[item.icon]}</span>
            ${item.label}
          </button>
        `;
      }).join('');

      $$('#sub-menu button').forEach(btn => {
        btn.addEventListener('click', () => {
          STATE.subTab = btn.dataset.sub;
          renderSidebar();
          renderContent();

      });

    async function loadChatSessions() {
      try {
        const data = await apiGet('/api/chat/sessions?user_id=web-user');
        STATE.chatSessions = data.sessions || [];
      } catch (err) {
        console.error('Load sessions failed:', err);
        STATE.chatSessions = [];
      }
    }

    async function createNewSession() {
      if (STATE.chatStreaming) {
        showToast('流式回复中，请稍后再新建会话', 'error');
        return;
      }
      try {
        const data = await apiPost('/api/chat/sessions?user_id=web-user', {});
        const session = data.session || {};
        STATE.chatSessionId = session.session_id || null;
        try { if (STATE.chatSessionId) localStorage.setItem('chatSessionId', STATE.chatSessionId); } catch (e) {}
        STATE.chatMessages = [];
        STATE.currentAiMessage = null;
        STATE.currentRoute = null;
        await loadChatSessions();
        await renderContent();
        const input = $('#chat-input');
        if (input) input.focus();
        showToast('已创建新会话', 'success');
      } catch (err) {
        console.error('createNewSession failed:', err);
        showToast('新建会话失败', 'error');
      }
    }

    async function switchChatSession(sessionId) {
      if (STATE.chatStreaming) {
        showToast('流式回复中，请稍后再切换', 'error');
        return;
      }
      if (!sessionId || sessionId === STATE.chatSessionId) return;
      STATE.chatSessionId = sessionId;
      try { localStorage.setItem('chatSessionId', sessionId); } catch (e) {}
      STATE.chatMessages = [];
      STATE.currentAiMessage = null;
      STATE.currentRoute = null;
      await loadChatSessions();
      renderContent();
    }

    function formatTimeLabel(isoString) {
      if (!isoString) return '';
      // Backend stores Beijing time as "YYYY-MM-DD HH:mm:ss" without timezone.
      // Treat bare datetime strings as +08:00 so the display is always Beijing time.
      let value = isoString;
      if (typeof value === 'string' && value.includes(' ') && !value.includes('T') && !value.match(/[Z+-]\d/)) {
        value = value.replace(' ', 'T') + '+08:00';
      }
      const date = new Date(value);
      if (isNaN(date.getTime())) return isoString;
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      const hours = String(date.getHours()).padStart(2, '0');
      const minutes = String(date.getMinutes()).padStart(2, '0');
      const seconds = String(date.getSeconds()).padStart(2, '0');
      return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
    }

    function stripThinking(content) {
      // Remove reasoning blocks like </think>...</think> or <think>...</think>
      return content.replace(/<\/?think>[\s\S]*?<\/?think>/g, '').trim();
    }

    function formatTokenDetail(detail) {
      if (!detail) return '';
      const parts = [];
      if (detail.input_tokens) parts.push(`输入 ${detail.input_tokens}`);
      if (detail.output_tokens) parts.push(`输出 ${detail.output_tokens}`);
      if (detail.reasoning_tokens) parts.push(`推理 ${detail.reasoning_tokens}`);
      if (detail.cached_tokens) parts.push(`缓存命中 ${detail.cached_tokens}`);
      if (detail.total_tokens) parts.push(`总计 ${detail.total_tokens}`);
      return parts.join(' · ');
    }

    function renderCitations(citations) {
      if (!citations || citations.length === 0) return '';
      const items = citations.map((c, i) => {
        const score = typeof c.score === 'number' ? c.score.toFixed(3) : '-';
        const title = escapeHtml(c.doc_title || '未知文档');
        const docId = c.doc_id || '';
        const chunkIdx = typeof c.chunk_index === 'number' ? c.chunk_index : '';
        const snippet = escapeHtml((c.content || '').slice(0, 120).replace(/[\n\r]+/g, ' '));
        const clickable = docId ? 'cursor-pointer hover:text-brand-600 hover:underline' : '';
        const attrs = docId
          ? `data-doc-id="${docId}" data-chunk-index="${chunkIdx}" data-snippet="${snippet}" onclick="showCitationChunk(${docId}, '${chunkIdx}', this.dataset.snippet)"`
          : '';
        const chunkLabel = chunkIdx !== '' ? ` · 分片 ${chunkIdx}` : '';
        return `<li class="mt-1 ${clickable}" ${attrs}>[${i + 1}] 《${title}》${chunkLabel}<span class="text-slate-400">（相关度 ${score}）</span></li>`;
      }).join('');
      return `<div class="mt-2 pt-2 border-t border-slate-100"><p class="text-[10px] text-slate-400 mb-1">引用来源</p><ol class="text-[10px] text-slate-500 list-decimal list-inside">${items}</ol></div>`;
    }

    async function showCitationChunk(docId, chunkIndex, snippet = '') {
      try {
        const data = await apiGet(`/api/knowledge/docs/${docId}/chunks`);
        const chunks = data.chunks || [];
        const title = data.knowledge_doc?.title || '知识文档';
        const hasIndex = chunkIndex !== '' && chunkIndex !== null && chunkIndex !== undefined;
        const chunk = hasIndex ? chunks.find(c => String(c.chunk_index) === String(chunkIndex)) : null;
        let html = '';
        if (!hasIndex) {
          // Legacy citation without chunk_index: show the first chunk only as a reference, clearly labelled.
          const first = chunks[0];
          const content = first ? first.content : '';
          let display = escapeHtml(content);
          if (snippet && content) {
            const plainSnippet = snippet.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&');
            if (plainSnippet.length > 6 && content.includes(plainSnippet)) {
              display = display.replace(escapeHtml(plainSnippet), `<strong class="text-brand-700 bg-brand-50 px-1 rounded">${escapeHtml(plainSnippet)}</strong>`);
            }
          }
          html = `<div class="bg-amber-50 rounded-xl p-3 border border-amber-200">
            <p class="text-xs text-amber-700 mb-2">历史引用，分片编号缺失</p>
            ${content ? `<p class="text-xs text-slate-500 mb-1">参考：文档首分片</p><p class="text-sm text-slate-700 whitespace-pre-line">${display}</p>` : '<p class="text-sm text-slate-500">未找到对应分片内容。</p>'}
          </div>`;
        } else if (chunk) {
          const content = chunk.content;
          let display = escapeHtml(content);
          if (snippet) {
            const plainSnippet = snippet.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&');
            if (plainSnippet.length > 6 && content.includes(plainSnippet)) {
              display = display.replace(escapeHtml(plainSnippet), `<strong class="text-brand-700 bg-brand-50 px-1 rounded">${escapeHtml(plainSnippet)}</strong>`);
            }
          }
          html = `<div class="bg-slate-50 rounded-xl p-3 border border-slate-200">
            <p class="text-xs text-slate-500 mb-2">分片 ${escapeHtml(chunk.chunk_index)}</p>
            <p class="text-sm text-slate-700 whitespace-pre-line">${display}</p>
          </div>`;
        } else {
          // Exact chunk not found: do not silently fall back to the first chunk.
          const available = chunks.map(c => c.chunk_index).join(', ');
          html = `<div class="bg-red-50 rounded-xl p-3 border border-red-200">
            <p class="text-sm font-medium text-red-700 mb-1">该引用分片已不存在或无法定位</p>
            <p class="text-xs text-slate-600">doc_id: ${escapeHtml(docId)}，chunk_index: ${escapeHtml(chunkIndex)}</p>
            ${available ? `<p class="text-xs text-slate-500 mt-1">文档现有分片编号：${escapeHtml(available)}</p>` : '<p class="text-xs text-slate-500 mt-1">该文档暂无分片数据。</p>'}
          </div>`;
        }
        openModal(`《${escapeHtml(title)}》引用分片`, html, null, '关闭');
      } catch (err) {
        showToast('加载引用分片失败：' + (err && err.message ? err.message : err), 'error');
      }
    }
    window.showCitationChunk = showCitationChunk;

    function updateAiMessage(content, done = false, tokenCount = 0, messageId = null, tokenDetail = null, citations = null, activatedSkills = null, tools = null, agent = null, modelId = '', thinkingEnabled = null, modelSelectionReason = '', traceId = '', mcpCalls = null, usageSource = '') {

          const existingFootnotes = footer.parentElement.querySelector('.ai-message-footnotes');
          if (existingFootnotes) existingFootnotes.remove();
          const footnotes = document.createElement('div');

          if (footnotes.innerHTML) footer.parentElement.appendChild(footnotes);

      }
      scrollChatToBottom();
    }

    async function sendChatMessage(text) {
      appendUserMessage(text);
      STATE.chatStreaming = true;
      STATE.currentRoute = null;
      const btn = $('#chat-send');
      if (btn) btn.disabled = true;

      const placeholder = appendAiMessagePlaceholder();
      STATE.currentAiMessage = placeholder;
      let accumulated = '';

      try {
        const response = await fetch(`${API_BASE}/api/chat/stream`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, session_id: STATE.chatSessionId, user_id: 'web-user' })
        });

        if (!response.ok) {
          let errText = '';
          try { errText = await response.text(); } catch (e) {}
          throw new Error(`服务暂时不可用（HTTP ${response.status}${errText ? ': ' + errText.slice(0, 200) : ''}）`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          // Extract complete SSE events split by double newlines.
          const events = [];
          let idx;
          while ((idx = buffer.indexOf('\n\n')) !== -1) {
            events.push(buffer.slice(0, idx));
            buffer = buffer.slice(idx + 2);
          }

          for (const event of events) {
            if (!event.trim()) continue;
            let eventType = '';
            const dataLines = [];
            for (const line of event.split('\n')) {
              if (line.startsWith('event:')) eventType = line.slice(6).trim();
              else if (line.startsWith('data:')) dataLines.push(line.slice(5).trim());
            }
            if (dataLines.length === 0) continue;

            let data;
            try {
              data = JSON.parse(dataLines.join('\n'));
            } catch (e) {
              console.warn('SSE data parse error:', e, dataLines.join('\n'));
              continue;
            }

            if (eventType === 'start') {
              STATE.chatSessionId = data.session_id;
              try { localStorage.setItem('chatSessionId', data.session_id); } catch (e) {}
              if (data.trace_id) STATE.currentTraceId = data.trace_id;
            } else if (eventType === 'route') {
              STATE.currentRoute = {
                intent: data.intent || '',
                reason: data.reason || '',
                current_agent: data.current_agent || ''
              };
              const statusEl = placeholder.querySelector('.ai-message-route-status');
              if (statusEl) statusEl.textContent = `路由：${data.reason || data.intent || ''} → ${data.current_agent || ''}`;
            } else if (eventType === 'delta') {
              if (data.current_agent && STATE.currentRoute) STATE.currentRoute.current_agent = data.current_agent;
              accumulated += (data.content || '');
              updateAiMessage(accumulated);
            } else if (eventType === 'tool_calls') {
              if (data.current_agent && STATE.currentRoute) STATE.currentRoute.current_agent = data.current_agent;
              const toolNames = (data.tool_calls || []).map(t => typeof t === 'string' ? t : (t.name || t.tool_name || JSON.stringify(t))).join('、');
              const statusEl = placeholder.querySelector('.ai-message-tool-status');
              if (statusEl) statusEl.textContent = toolNames ? `调用工具：${toolNames}` : '';
            } else if (eventType === 'done') {
              updateAiMessage(
                accumulated,
                true,
                data.token_count || 0,
                data.message_id || null,
                data.token_detail || null,
                data.citations || null,
                data.activated_skills || null,
                data.tool_calls || null,
                data.current_agent || (STATE.currentRoute && STATE.currentRoute.current_agent) || null,
                data.model_id || '',
                data.thinking_enabled || false,
                data.model_selection_reason || '',
                data.trace_id || STATE.currentTraceId || '',
                data.mcp_calls || null,
                data.usage_source || ''
              );
              if (data.handoff) {
                STATE.chatHandoff = true;
                updateHandoffBanner(data.handoff_status || 'requested');
                showToast('已转人工，请等待工作人员回复', 'success');
              }
              loadChatSessions().then(() => renderChatSessionsSidebar());
              STATE.currentTraceId = null;
            } else if (eventType === 'error') {
              accumulated += `\n\n[错误: ${data.error}]`;
              updateAiMessage(accumulated, true);
            }
          }
        }
      } catch (err) {
        console.error('Chat error:', err);
        updateAiMessage((accumulated ? accumulated + '\n\n' : '') + `[${err.message || '连接失败，请稍后重试'}]`, true);
      } finally {
        STATE.chatStreaming = false;
        const btn = $('#chat-send');
        if (btn) btn.disabled = false;
      }
    }

    async function restoreChatMessages() {
      if (!STATE.chatSessionId) return;
      try {
        const res = await fetch(`${API_BASE}/api/chat/history?session_id=${encodeURIComponent(STATE.chatSessionId)}`);
        if (!res.ok) return;
        const data = await res.json();
        const messages = data.messages || [];
        const session = data.session || {};
        STATE.chatHandoff = session.handoff_status === 'requested' || session.handoff_status === 'active';
        const container = $('#chat-message-list');
        if (!container) return;
        // Clear existing messages except the welcome message
        const welcome = container.querySelector('.welcome-message');
        container.innerHTML = '';
        if (welcome) container.appendChild(welcome);
        messages.forEach(msg => {
          if (msg.role === 'user') {
            appendUserMessage(msg.content || '', msg.created_at);
          } else if (msg.role === 'assistant') {
            appendAiMessageFromHistory(
              msg.content || '',
              msg.created_at,
              msg.token_count,
              msg.id,
              msg.token_detail,
              msg.citations,
              msg.activated_skills,
              msg.tool_calls,
              msg.current_agent,
              msg.route_reason,
              msg.route_intent,
              msg.model_id,
              msg.thinking_enabled,
              msg.model_selection_reason,
              msg.trace_id,
              msg.mcp_calls,
              msg.usage_source
            );
          } else if (msg.role === 'staff') {
            appendStaffMessage(msg.content || '', msg.created_at);
          }
        });
        updateHandoffBanner(session.handoff_status);
      } catch (err) {
        console.error('Restore chat history failed:', err);
      }
    }

    function appendAiMessageFromHistory(content, createdAt, tokenCount, messageId, tokenDetail = null, citations = null, activatedSkills = null, tools = null, agent = null, routeReason = '', routeIntent = '', modelId = '', thinkingEnabled = null, modelSelectionReason = '', traceId = '', mcpCalls = null, usageSource = '') {

      const clean = stripThinking(content);
      const tokenText = tokenCount > 0 ? `消耗 ${tokenCount} tokens` : '消耗 - tokens';
      const detailText = formatTokenDetail(tokenDetail);
      const tokenHtml = detailText
        ? `<span class="cursor-help underline decoration-dotted" title="${escapeHtml(detailText)}">${tokenText}</span>`
        : tokenText;
      const footnotesHtml = renderCitations(citations);
      const tagsHtml = renderAiMessageTags(activatedSkills, tools, agent, routeReason, routeIntent, modelId, thinkingEnabled, modelSelectionReason, traceId, mcpCalls, usageSource);
      div.innerHTML = `
        <div class="w-9 h-9 rounded-full bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center text-white shrink-0 shadow-md">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
        </div>
        <div class="bg-white rounded-2xl rounded-tl-sm shadow-soft px-4 py-3 max-w-[85%] min-w-0 border border-slate-100">
          <div class="markdown-body text-sm text-slate-700 break-words">${marked.parse(clean)}</div>
          <div class="mt-2 pt-2 border-t border-slate-100">
            <div class="flex items-center justify-between gap-3">
              <div class="flex items-center gap-2 text-[10px] text-slate-400">
                <span>${time}</span>
                <span>${tokenHtml}</span>
              </div>
              <div class="flex items-center gap-1">
                <button type="button" class="thumb-up-btn p-1 text-slate-400 hover:text-brand-600 transition-colors" title="满意">👍</button>
                <button type="button" class="thumb-down-btn p-1 text-slate-400 hover:text-red-500 transition-colors" title="不满意">👎</button>
              </div>
            </div>
            ${tagsHtml}
          </div>
          ${footnotesHtml ? `<div class="ai-message-footnotes">${footnotesHtml}</div>` : ''}
        </div>
      `;
      const upBtn = div.querySelector('.thumb-up-btn');
      const downBtn = div.querySelector('.thumb-down-btn');
      if (upBtn) upBtn.onclick = () => sendThumbFeedback(messageId, 'thumb_up');
      if (downBtn) downBtn.onclick = () => openThumbFeedbackModal(messageId);

    function openFeedbackModal(messageId, content) {
      const body = `
        <p class="text-sm text-slate-600 mb-3">请填写不满意的具体原因，提交后将自动进入 Badcase 库。</p>
        ${formTextarea('具体描述 *', 'feedback-reason', '', '例如：回答不准确、没有理解我的问题、没有给出工单号等', 4)}
        <div class="mt-2 text-xs text-slate-400">原回复摘要：${escapeHtml((content || '').slice(0, 120))}${(content || '').length > 120 ? '...' : ''}</div>

          closeModal();
          return true;
        } catch (err) {
          showToast('反馈提交失败：' + err.message, 'error');

          const messages = data.messages || [];
          if (messages.length === 0) {
            container.innerHTML = '<p class="text-sm text-slate-500">暂无会话消息</p>';
            return;
          }
          container.innerHTML = messages.map(renderHandoffContextMessage).join('');
        } catch (err) {
          container.innerHTML = `<p class="text-sm text-red-600">加载上下文失败：${escapeHtml(err.message)}</p>`;
        }
      }

      $('#handoff-reply-submit').addEventListener('click', async () => {
        const staffName = $('#handoff-staff-name').value.trim() || '物业工作人员';
        const message = $('#handoff-reply-text').value.trim();
        if (!message) {
          showToast('请输入回复内容', 'error');
          return;
        }
        try {
          const res = await fetch(`${API_BASE}/api/chat/handoff-reply`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ session_id: sessionId, staff_name: staffName, message })
          });
          if (!res.ok) throw new Error('发送失败');
          showToast('回复已发送', 'success');
          closeModal();
          await loadHandoffSessions();
        } catch (err) {
          showToast('发送失败，请重试', 'error');
        }
      });

      loadContext();
    }

    async function resolveHandoff(sessionId) {
      if (!confirm('确定要完结该人工会话吗？')) return;
      try {
        const res = await fetch(`${API_BASE}/api/chat/handoff-resolve`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId })
        });
        if (!res.ok) throw new Error('完结失败');
        showToast('会话已完结', 'success');
        await loadHandoffSessions();
      } catch (err) {
        showToast('完结失败，请重试', 'error');
      }
    }

      async function renderDocsTab() {

            <div class="space-y-3">
              ${results.length === 0 ? '<p class="text-xs text-slate-400">无结果</p>' : results.map((r, i) => {
                const docId = r.doc_id || r.id || '';
                const docTitle = r.doc_title || r.title || '未知文档';
                const chunkIdx = r.chunk_index != null ? r.chunk_index : '';
                return `
                <div class="bg-slate-50 rounded-xl p-3 border border-slate-200">
                  <div class="flex items-center justify-between mb-1">
                    <span class="text-xs font-semibold text-slate-500">#${i + 1} ${escapeHtml(docTitle)}</span>
                    <span class="text-xs font-mono text-slate-600">score ${typeof r.score === 'number' ? r.score.toFixed(3) : '-'}</span>
                  </div>
                  <p class="text-xs text-slate-700 mb-2 max-h-20 overflow-hidden">${escapeHtml((r.content || '').slice(0, 180))}${(r.content || '').length > 180 ? '...' : ''}</p>
                  <button class="debug-view-chunk text-xs text-brand-600 hover:text-brand-700 underline" data-doc-id="${docId}" data-chunk-index="${chunkIdx}">查看分片</button>

      async function renderDebugTab() {
        $('#knowledge-content').innerHTML = `
          <div class="space-y-4">
            <form id="retrieval-debug-form" class="flex gap-2">
              <input id="debug-query" type="text" placeholder="输入检索问题..." class="flex-1 px-4 py-2.5 bg-white border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-brand-400 focus:ring-2 focus:ring-brand-100">
              <button type="submit" class="px-4 py-2.5 bg-brand-600 hover:bg-brand-700 text-white rounded-xl text-sm transition-colors">检索</button>
            </form>
            <div id="debug-rerank-note" class="hidden text-xs text-slate-500 bg-slate-50 rounded-lg p-3 border border-slate-200"></div>
            <div id="debug-results" class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-4 gap-4"></div>
          </div>
        `;
        $('#retrieval-debug-form').addEventListener('submit', async (e) => {
          e.preventDefault();
          const query = $('#debug-query').value.trim();
          if (!query) {
            showToast('请输入检索问题', 'error');
            return;
          }
          $('#debug-results').innerHTML = `<div class="col-span-full flex justify-center py-10 text-slate-400"><div class="w-8 h-8 border-2 border-slate-200 border-t-brand-500 rounded-full animate-spin mr-2"></div>检索中...</div>`;
          $('#debug-rerank-note').classList.add('hidden');
          try {
            const data = await apiPost('/api/retrieval/debug', { query });
            const settings = data.settings || {};
            const rerankEnabled = !!settings.enable_rerank;
            const rerankReturned = Array.isArray(data.reranked_results) && data.reranked_results.length > 0;
            const noteEl = $('#debug-rerank-note');
            noteEl.classList.remove('hidden');
            if (rerankEnabled && rerankReturned) {
              noteEl.textContent = `重排序已启用（模型：${settings.rerank_model || '默认'}），下方展示重排后的结果。`;
              noteEl.className = 'text-xs text-brand-600 bg-brand-50 rounded-lg p-3 border border-brand-100';
            } else if (rerankEnabled && !rerankReturned) {
              noteEl.textContent = '重排序开关已启用，但后端本次未返回重排序结果，下方展示 RRF 融合结果。';
              noteEl.className = 'text-xs text-amber-600 bg-amber-50 rounded-lg p-3 border border-amber-100';
            } else {
              noteEl.textContent = '重排序未启用，下方展示关键词、语义、RRF 融合及最终结果。';
              noteEl.className = 'text-xs text-slate-500 bg-slate-50 rounded-lg p-3 border border-slate-200';
            }
            $('#debug-results').innerHTML =
              renderDebugColumn('关键词检索', data.keyword_results || []) +
              renderDebugColumn('语义检索', data.semantic_results || []) +
              renderDebugColumn('RRF 融合', data.fused_results || []) +
              renderDebugColumn('最终结果', data.results || []);
            $$('.debug-view-chunk').forEach(btn => {
              btn.addEventListener('click', () => showCitationChunk(Number(btn.dataset.docId), btn.dataset.chunkIndex));
            });

            $('#debug-results').innerHTML = `<div class="col-span-full text-sm text-red-600">检索失败：${escapeHtml(err.message)}</div>`;
          }
        });
      }

      function bindKnowledgeActions() {
        $$('.knowledge-edit-btn').forEach(btn => {
          btn.addEventListener('click', () => editKnowledgeDoc(Number(btn.dataset.id)));
        });
        $$('.knowledge-delete-btn').forEach(btn => {
          btn.addEventListener('click', () => deleteKnowledgeDoc(Number(btn.dataset.id)));
        });
        $$('.knowledge-reindex-btn').forEach(btn => {
          btn.addEventListener('click', () => reindexDoc(Number(btn.dataset.id)));
        });
        $$('.knowledge-chunks-btn').forEach(btn => {
          btn.addEventListener('click', () => viewChunks(Number(btn.dataset.id)));
        });
      }

      function openKnowledgeModal(doc = null) {
        const isEdit = !!doc;
        const title = isEdit ? '编辑知识文档' : '新增知识文档';
        const addNote = isEdit ? '' : `<div class="bg-blue-50 text-blue-800 text-xs rounded-lg p-2 mb-3 border border-blue-100">保存后系统将自动进行文本切分、关键词索引与向量索引；无需手动选择 RAG 方案。当前仅支持文本粘贴，不支持 PDF/Word 上传。</div>`;
        const body = `
          ${addNote}
          ${formInput('标题', 'kd-title', doc ? doc.title : '', '请输入文档标题')}
          ${formInput('分类', 'kd-category', doc ? doc.category : '', '如：服务承诺、收费标准、FAQ')}
          ${formTextarea('内容', 'kd-content', doc ? doc.content : '', '请输入知识库内容，支持多行文本', 8)}
        `;
        openModal(title, body, async () => {
          const payload = {
            title: $('#kd-title').value.trim(),
            category: $('#kd-category').value.trim() || '未分类',
            content: $('#kd-content').value.trim()
          };
          if (!payload.title || !payload.content) {
            showToast('标题和内容不能为空', 'error');
            return;
          }
          try {
            if (isEdit) {
              await apiPut(`/api/knowledge/docs/${doc.id}`, payload);
              showToast('知识文档已更新');
            } else {
              await apiPost('/api/knowledge/docs', payload);
              showToast('知识文档已创建');
            }
            closeModal();
            if (activeTab === 'docs') await loadDocs($('#knowledge-search-input').value.trim());
          } catch (err) {
            showToast('保存失败，请重试', 'error');
          }
        });
      }

      async function editKnowledgeDoc(docId) {
        try {
          const data = await apiGet(`/api/knowledge/docs/${docId}`);
          openKnowledgeModal(data.knowledge_doc);
        } catch (err) {
          showToast('加载文档失败', 'error');
        }
      }

      async function deleteKnowledgeDoc(docId) {
        if (!confirm('确定要删除这条知识文档吗？')) return;
        try {
          await apiDelete(`/api/knowledge/docs/${docId}`);
          showToast('知识文档已删除');
          if (activeTab === 'docs') await loadDocs($('#knowledge-search-input').value.trim());
        } catch (err) {
          showToast('删除失败，请重试', 'error');
        }
      }

      async function reindexDoc(docId) {
        try {
          await apiPost(`/api/knowledge/docs/${docId}/reindex`);
          showToast('重新索引已开始');
          if (activeTab === 'docs') await loadDocs($('#knowledge-search-input').value.trim());
        } catch (err) {
          showToast('重新索引失败', 'error');
        }
      }

      async function viewChunks(docId) {
        try {
          const data = await apiGet(`/api/knowledge/docs/${docId}/chunks`);
          const chunks = data.chunks || [];
          const title = data.knowledge_doc?.title || '知识文档';
          const html = chunks.length === 0

    async function renderCostGovernancePage(container) {
      container.innerHTML = loadingState();

      const state = {
        filters: { start: '', end: '', model: '', agent: '', intent: '', stage: '', search: '', groupBy: 'model' },
        overview: null,
        traces: [],
        trends: [],
        distribution: [],
        prices: [],
        budget: {},
        costCases: [],
      };

      function fmtDate(d) {
        if (!d) return '';
        const date = new Date(d);
        if (isNaN(date.getTime())) return d;
        return date.toISOString().slice(0, 10);
      }
      function fmtTime(d) {
        if (!d) return '';
        return formatTimeLabel(d);
      }
      function fmtCost(v) {
        if (v === null || v === undefined) return '-- / 未配置价格';
        return '¥' + Number(v).toFixed(6);
      }
      function fmtTokens(v) {
        if (v === null || v === undefined) return '-';
        return Number(v).toLocaleString();
      }
      function sourceBadge(src) {
        if (src === 'provider_reported') return '<span class="px-1.5 py-0.5 bg-green-50 text-green-600 rounded text-[10px]">Provider账单</span>';
        if (src === 'estimated_tokenization') return '<span class="px-1.5 py-0.5 bg-amber-50 text-amber-600 rounded text-[10px]">本地估算</span>';
        return '<span class="px-1.5 py-0.5 bg-slate-100 text-slate-500 rounded text-[10px]">未知</span>';
      }
      function statusBadgeSmall(s) {
        if (s === 'success') return '<span class="text-green-600">成功</span>';
        if (s === 'failed') return '<span class="text-red-600">失败</span>';
        return '<span class="text-slate-500">' + escapeHtml(s || '-') + '</span>';
      }

      async function loadAll() {
        const params = new URLSearchParams();
        if (state.filters.start) params.append('start', state.filters.start);
        if (state.filters.end) params.append('end', state.filters.end);
        const qs = params.toString() ? '?' + params.toString() : '';
        const [overview, traces, trends, distribution, prices, budget] = await Promise.all([
          apiGet(`/api/observability/overview${qs}`).catch(() => ({})),
          apiGet(`/api/observability/traces${qs}`).catch(() => ({ traces: [] })),
          apiGet(`/api/observability/trends${qs}`).catch(() => ({ items: [] })),
          apiGet(`/api/observability/distribution?group_by=${state.filters.groupBy}${state.filters.start ? '&start=' + state.filters.start : ''}${state.filters.end ? '&end=' + state.filters.end : ''}`).catch(() => ({ items: [] })),
          apiGet('/api/observability/prices').catch(() => ({ prices: [] })),
          apiGet('/api/observability/budget').catch(() => ({ budget: {} })),
        ]);
        state.overview = overview;
        state.traces = traces.traces || [];
        state.trends = trends.items || [];
        state.distribution = distribution.items || [];
        state.prices = prices.prices || [];
        state.budget = budget.budget || {};
      }

      function renderOverview() {
        const o = state.overview || {};
        const alerts = (o.alerts || []).map(a => `<span class="px-2 py-1 rounded-lg text-xs ${a.type === 'daily' ? 'bg-red-100 text-red-700' : 'bg-amber-100 text-amber-700'}">${a.type === 'daily' ? '每日' : '单次'}预警：阈值 ¥${a.threshold}，实际 ¥${a.actual}</span>`).join('');
        return `
          <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3">
            <div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-4">
              <div class="text-[11px] text-slate-500">今日调用次数</div>
              <div class="text-xl font-semibold text-slate-900 mt-1">${Number(o.calls || 0).toLocaleString()}</div>
            </div>
            <div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-4">
              <div class="text-[11px] text-slate-500">今日总 Token</div>
              <div class="text-xl font-semibold text-slate-900 mt-1">${fmtTokens(o.total_tokens)}</div>
            </div>
            <div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-4">
              <div class="text-[11px] text-slate-500">今日估算成本</div>
              <div class="text-xl font-semibold text-slate-900 mt-1">${fmtCost(o.total_cost)}</div>
            </div>
            <div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-4">
              <div class="text-[11px] text-slate-500">平均单轮 Token</div>
              <div class="text-xl font-semibold text-slate-900 mt-1">${fmtTokens(o.avg_tokens)}</div>
            </div>
            <div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-4">
              <div class="text-[11px] text-slate-500">平均单轮估算成本</div>
              <div class="text-xl font-semibold text-slate-900 mt-1">${fmtCost(o.avg_cost)}</div>
            </div>
            <div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-4">
              <div class="text-[11px] text-slate-500">成本未知调用数</div>
              <div class="text-xl font-semibold text-slate-900 mt-1">${Number(o.unknown_cost_calls || 0).toLocaleString()}</div>
            </div>
            <div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-4">
              <div class="text-[11px] text-slate-500">失败调用数</div>

          </div>
          ${alerts ? `<div class="flex flex-wrap gap-2 mt-3">${alerts}</div>` : ''}
          <p class="text-[11px] text-slate-400 mt-2">${escapeHtml(o.cost_note || '按配置价格估算成本，非供应商实际结算金额')} · 货币 ${escapeHtml(o.currency || 'CNY')}</p>
        `;
      }

              <div class="flex justify-between"><span>用户消息</span><span>${fmtTokens(breakdown.user_message_tokens)}</span></div>

            </div>

            <div class="space-y-4">
              <div class="bg-slate-50 rounded-xl p-3 border border-slate-200 text-sm">
                <div><span class="text-slate-500">trace_id:</span> <span class="font-mono">${escapeHtml(traceId)}</span></div>
                <div><span class="text-slate-500">session_id:</span> <span class="font-mono">${escapeHtml(trace.session_id || '-')}</span></div>

          showToast('加载 Trace 详情失败', 'error');
        }

          const original = await apiGet('/api/knowledge/retrieval-settings');
          const origTopK = original.top_k;
          const query = '维修收费标准是什么';
          const run = async (k) => {
            await apiPut('/api/knowledge/retrieval-settings', { ...original, top_k: k });
            const res = await apiPost('/api/retrieval/search', { query, top_k: k });
            return { k, citations: res.citations || [], tokenCount: (res.citations || []).reduce((s, c) => s + (c.content || '').length, 0) };

          const r1 = await run(1);
          const r5 = await run(5);
          await apiPut('/api/knowledge/retrieval-settings', { ...original, top_k: origTopK });
          resultEl.innerHTML = `

      async function openAgentModal(agent = null) {
        const isEdit = !!agent;
        const title = isEdit ? '编辑 Agent' : '新增 Agent';
        let skills = [];
        let mcpTools = [];
        try {
          const [skillsData, mcpData] = await Promise.all([apiGet('/api/skills'), apiGet('/api/mcp-servers')]);
          skills = (skillsData.skills || []).map(s => ({ value: s.name, label: `${s.name} (${s.category || '未分类'})` }));
          // Bindings are stored at MCP Server level (tool_name = server name).  Only
          // enabled servers with at least one successfully discovered tool are shown
          // as bindable; disabled / test / tool-less servers are hidden by default.
          const toolPromises = (mcpData.mcp_servers || [])
            .filter(serv => serv.enabled)
            .map(async serv => {
              const tools = serv.tools || (await apiGet(`/api/mcp-servers/${serv.id}/tools`)).tools || [];
              if (!tools.length) return null;
              const toolDescs = tools.map(t => `${t.name}${t.description ? '：' + t.description : ''}`).join('；');
              return { value: serv.name, label: `${serv.name}（${toolDescs}）` };
            });
          mcpTools = (await Promise.all(toolPromises)).filter(Boolean);
        } catch (err) {
          console.error('加载 Agent 选项失败', err);
        }

        const body = `
          ${formInput('名称', 'agent-name', agent ? agent.name : '', '如：维修报修 Agent')}
          ${formInput('描述', 'agent-description', agent ? agent.description : '', '简短描述 Agent 职责')}
          ${formTextarea('System Prompt', 'agent-system-prompt', agent ? agent.system_prompt : '', '定义该 Agent 的系统提示词', 5)}
          ${formSwitch('路由 Agent (is_router)', 'agent-is-router', agent ? agent.is_router : false)}
          ${formCheckboxGroup('可用 Skill', 'agent-skills', skills, agent ? agent.available_skills : [])}
          ${formCheckboxGroup('可用 MCP Server（展开查看可调用工具）', 'agent-mcp-tools', mcpTools, agent ? agent.available_mcp_tools : [])}
        `;
        openModal(title, body, async () => {
          const payload = {
            name: $('#agent-name').value.trim(),
            description: $('#agent-description').value.trim(),
            system_prompt: $('#agent-system-prompt').value.trim(),
            is_router: $('#agent-is-router').checked,
            available_skills: Array.from(document.querySelectorAll('input[name="agent-skills"]:checked')).map(cb => cb.value),
            available_mcp_tools: Array.from(document.querySelectorAll('input[name="agent-mcp-tools"]:checked')).map(cb => cb.value),
            enabled: true
          };
          if (!payload.name || !payload.system_prompt) {
            showToast('名称和 System Prompt 不能为空', 'error');
            return;
          }
          try {
            if (isEdit) {
              await apiPut(`/api/agents/${agent.id}`, payload);
              showToast('Agent 已更新');
            } else {
              await apiPost('/api/agents', payload);
              showToast('Agent 已创建');
            }
            closeModal();
            await loadAgents();
          } catch (err) {
            showToast('保存失败，请重试', 'error');
          }
        });
      }

      async function exportSkill(skillId) {
        try {
          const res = await fetch(`${API_BASE}/api/skills/${skillId}/export`);
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `skill-${skillId}.zip`;
          a.click();
          URL.revokeObjectURL(url);
          showToast('Skill 导出成功');
        } catch (err) {
          showToast('导出失败', 'error');
        }

                  </div>
                  <p class="text-xs text-slate-600 mb-2">${escapeHtml(t.description || '暂无描述')}</p>
                  ${t.parameters ? `<pre class="text-[10px] bg-white rounded-lg p-2 border border-slate-200 overflow-x-auto">${escapeHtml(JSON.stringify(t.parameters, null, 2))}</pre>` : ''}
                </div>
              `).join('')}</div>`;
          openDrawer(`${escapeHtml(server.name || 'MCP Server')} 工具列表`, body);
        } catch (err) {
          showToast('加载工具列表失败', 'error');
        }
      }

      async function editMcpServer(serverId) {
        try {
          const data = await apiGet(`/api/mcp-servers/${serverId}`);
          openMcpModal(data.mcp_server);
        } catch (err) {
          showToast('加载 MCP Server 失败', 'error');
        }
      }

      async function deleteMcpServer(serverId) {
        if (!confirm('确定要删除这个 MCP Server 吗？')) return;
        try {
          await apiDelete(`/api/mcp-servers/${serverId}`);
          showToast('MCP Server 已删除');
          await loadMcpServers();
        } catch (err) {
          showToast('删除失败，请重试', 'error');
        }
      }

      $('#mcp-add-btn').addEventListener('click', () => openMcpModal());
      await loadMcpServers();
    }

    // ==========================================
    // Helpers
    // ==========================================
    function escapeHtml(text) {
      if (text == null) return '';
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function openSidebar() {
      STATE.sidebarOpen = true;
      $('#sidebar').classList.remove('-translate-x-full');
      $('#sidebar-overlay').classList.remove('hidden');
    }

    function closeSidebar() {
      STATE.sidebarOpen = false;
      $('#sidebar').classList.add('-translate-x-full');
      $('#sidebar-overlay').classList.add('hidden');
    }

    // ==========================================
    // Initialization
    // ==========================================
    async function init() {
      try {
        // Restore persisted chat session so history survives reloads/tab switches.
        try {
          const savedSession = localStorage.getItem('chatSessionId');
          if (savedSession) STATE.chatSessionId = savedSession;
        } catch (e) {}

        ['#main-content', '#sub-menu', '#role-title'].forEach(sel => requireElement(sel, 'init'));
        const versionEl = $('#app-version');
        if (versionEl) versionEl.textContent = APP_VERSION;
        renderTopTabs();
        renderSidebar();
        await renderContent();

        $$('.top-tab, .top-tab-mobile').forEach(btn => {
          btn.addEventListener('click', async () => {
            try {
              STATE.topTab = btn.dataset.top;
              const firstSub = MENU[STATE.topTab][0].id;
              STATE.subTab = firstSub;
              renderTopTabs();
              renderSidebar();
              await renderContent();
              if (window.innerWidth < 768) openSidebar();
            } catch (err) {
              displayRenderError(err, `切换 ${btn.dataset.top} 标签`);
            }
          });
        });

        $('#mobile-menu-btn').addEventListener('click', () => {
          if (STATE.sidebarOpen) closeSidebar();
          else openSidebar();
        });

        $('#sidebar-overlay').addEventListener('click', closeSidebar);

        window.addEventListener('resize', () => {
          if (window.innerWidth >= 768) closeSidebar();
        });
      } catch (err) {
        displayRenderError(err, '初始化');
        throw err;
      }
    }

    document.addEventListener('DOMContentLoaded', () => init().catch(err => displayRenderError(err, '启动')));
  </script>
</body>
</html>
