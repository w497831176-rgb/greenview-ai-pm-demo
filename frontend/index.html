    // ==========================================
    // Utility Functions
    // ==========================================
    function $(selector) { return document.querySelector(selector); }
    function $$(selector) { return document.querySelectorAll(selector); }

    function requireElement(selector, context = '') {
      const el = $(selector);
      if (!el) throw new Error(`渲染失败：缺少必要 DOM 元素 "${selector}"${context ? ' (' + context + ')' : ''}`);
      return el;
    }

    function displayRenderError(err, context = '') {
      console.error(`[${context || 'frontend'}] 渲染失败:`, err);
      const main = document.getElementById('main-content');
      if (!main) return;
      const msg = err && err.message ? err.message : String(err);
      main.innerHTML = `
        <div class="min-h-screen flex items-center justify-center p-6 fade-in">
          <div class="max-w-md w-full bg-white rounded-2xl shadow-soft border border-slate-200 p-8 text-center">
            <div class="w-14 h-14 mx-auto mb-4 rounded-full bg-red-50 flex items-center justify-center">

            </div>
            <h2 class="text-lg font-semibold text-slate-800 mb-2">页面加载失败</h2>
            ${context ? `<p class="text-sm text-slate-500 mb-2">${escapeHtml(context)}</p>` : ''}
            <pre class="text-xs text-left bg-slate-50 p-3 rounded-lg text-red-600 overflow-auto max-h-32 mb-6">${escapeHtml(msg)}</pre>
            <button onclick="location.reload()" class="px-4 py-2 bg-brand-600 hover:bg-brand-700 text-white rounded-lg transition-colors">刷新重试</button>
          </div>
        </div>`;
    }

    function showToast(message, type = 'success') {
      const toast = $('#toast');
      const icon = type === 'success'
        ? '<svg class="w-5 h-5 text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>'
        : '<svg class="w-5 h-5 text-gold-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';
      $('#toast-icon').innerHTML = icon;
      $('#toast-message').textContent = message;
      toast.classList.remove('translate-y-20', 'opacity-0');
      setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
    }

    function statusBadge(status) {

        'pending': 'bg-amber-50 text-amber-700 border-amber-200',
        'classified': 'bg-indigo-50 text-indigo-700 border-indigo-200',
        'fixing': 'bg-brand-50 text-brand-700 border-brand-200',
        'verifying': 'bg-sky-50 text-sky-700 border-sky-200',
        'closed': 'bg-slate-100 text-slate-600 border-slate-200',
        'rejected': 'bg-red-50 text-red-700 border-red-200',

    async function parseApiError(res) {
      let detail = null;
      try {
        const data = await res.json();
        detail = data.detail || data.message || data.error || (typeof data === 'string' ? data : null);
      } catch (e) {
        try {
          detail = await res.text();
        } catch (e2) {
          detail = null;
        }
      }
      return detail || `HTTP ${res.status}`;
    }

    async function apiGet(url) {
      try {
        const res = await fetch(`${API_BASE}${url}`);
        if (!res.ok) throw new Error(await parseApiError(res));
        return await res.json();
      } catch (err) {
        console.error('API GET error:', err);
        throw err;
      }
    }

    function renderAiMessageTags(skills, tools, agent, routeReason = '', routeIntent = '', modelId = '', thinkingEnabled = null, modelSelectionReason = '', traceId = '', mcpCalls = null, usageSource = '') {
      const tags = [];
      if (modelId) {
        const modelLabel = modelId === 'deepseek-v4-pro' ? 'Pro' : (modelId === 'deepseek-v4-flash' ? 'Flash' : modelId);
        const thinkingText = thinkingEnabled ? '· thinking' : '';
        tags.push(`<span class="px-1.5 py-0.5 bg-purple-50 text-purple-600 rounded text-[10px]" title="${escapeHtml(modelSelectionReason || '')}">模型：${escapeHtml(modelId)}${thinkingText}</span>`);
      }
      if (routeReason) tags.push(`<span class="px-1.5 py-0.5 bg-slate-100 text-slate-600 rounded text-[10px]" title="${escapeHtml(routeIntent || '')}">路由原因：${escapeHtml(routeReason)}</span>`);
      if (agent) tags.push(`<span class="px-1.5 py-0.5 bg-indigo-50 text-indigo-600 rounded text-[10px]">当前处理 Agent：${escapeHtml(agent)}</span>`);
      if (skills && skills.length) tags.push(`<span class="px-1.5 py-0.5 bg-brand-50 text-brand-600 rounded text-[10px]">已命中 Skill：${escapeHtml(skills.join('、'))}</span>`);
      if (tools && tools.length) tags.push(`<span class="px-1.5 py-0.5 bg-gold-50 text-gold-600 rounded text-[10px]">已调用工具：${escapeHtml(tools.map(t => typeof t === 'string' ? t : (t.name || t.tool_name || JSON.stringify(t))).join('、'))}</span>`);
      if (mcpCalls && mcpCalls.length) {
        const okCount = mcpCalls.filter(c => c.status === 'success').length;
        const failCount = mcpCalls.length - okCount;
        const statusText = failCount > 0 ? `${okCount}成功/${failCount}失败` : `${okCount}次成功`;
        const summary = mcpCalls.map(c => `[${escapeHtml(c.server_name || 'unknown')}] ${escapeHtml(c.tool_name || '')} ${c.status === 'success' ? '✓' : '✗'} ${c.latency_ms || 0}ms`).join('\n');
        tags.push(`<span class="px-1.5 py-0.5 bg-cyan-50 text-cyan-600 rounded text-[10px] cursor-help" title="${escapeHtml(summary)}">MCP 调用：${statusText}</span>`);
      }
      if (traceId) {

        tags.push(`<button type="button" class="px-1.5 py-0.5 bg-slate-50 text-slate-500 rounded text-[10px] hover:bg-slate-100 hover:text-slate-700 transition-colors" title="trace_id: ${escapeHtml(traceId)} · usage_source: ${escapeHtml(usageSource || 'unknown')}" onclick="openTraceDrawer('${escapeHtml(traceId)}')">Trace · ${escapeHtml(sourceLabel)}</button>`);
      }
      return tags.length ? `<div class="flex flex-wrap items-center gap-1 mt-2">${tags.join('')}</div>` : '';
    }

    async function openTraceDrawer(traceId) {
      try {
        const data = await apiGet(`/api/observability/traces/${traceId}`);
        const trace = data.trace || {};
        const modelCalls = data.model_calls || [];
        const mcpCalls = data.mcp_calls || [];
        const messages = data.messages || [];
        const assistantMsg = messages.find(m => m.role === 'assistant') || {};
        const citations = assistantMsg.citations || [];
        const currentAgent = assistantMsg.current_agent || trace.agent_name || '-';
        const activatedSkills = assistantMsg.activated_skills || [];

        const fmtTokensLocal = (v) => (v === null || v === undefined ? '-' : Number(v).toLocaleString());
        const fmtCostLocal = (v) => (v === null || v === undefined ? '--' : '¥' + Number(v).toFixed(6));

        const modelCallsHtml = modelCalls.length ? modelCalls.map(c => `
          <div class="border border-slate-200 rounded-xl p-3 mb-2 text-sm">
            <div class="flex items-center justify-between mb-1">
              <span class="font-medium text-slate-900">${escapeHtml(c.stage || 'unknown')} · ${escapeHtml(c.model_id || '-')}</span>
              <span class="text-xs ${c.status === 'success' ? 'text-green-600' : 'text-red-600'}">${c.status === 'success' ? '成功' : (c.status || '未知')}</span>
            </div>
            <div class="text-xs text-slate-500">tokens: 输入 ${fmtTokensLocal(c.input_tokens)} / 输出 ${fmtTokensLocal(c.output_tokens)} / 推理 ${fmtTokensLocal(c.reasoning_tokens)} / 缓存 ${fmtTokensLocal(c.cached_tokens)} / 总计 ${fmtTokensLocal(c.total_tokens)}</div>
            <div class="text-xs text-slate-700 mt-1">cost: ${fmtCostLocal(c.estimated_cost_cny)}</div>
            <div class="text-xs text-slate-500 mt-1">formula: ${escapeHtml(c.formula || c.cost_formula || '-')}</div>
          </div>
        `).join('') : '<p class="text-sm text-slate-400">无模型调用记录</p>';

        const mcpCallsHtml = mcpCalls.length ? mcpCalls.map(c => `
          <div class="border border-slate-200 rounded-xl p-3 mb-2 text-sm">
            <div class="flex items-center justify-between mb-1">
              <span class="font-medium text-slate-900">${escapeHtml(c.server_name || 'unknown')} · ${escapeHtml(c.tool_name || '-')}</span>
              <span class="text-xs ${c.status === 'success' ? 'text-green-600' : 'text-red-600'}">${c.status === 'success' ? '成功' : '失败'}</span>
            </div>
            <div class="text-xs text-slate-500">duration: ${c.latency_ms || 0}ms</div>
            <div class="text-xs text-slate-500 mt-1">args: ${escapeHtml(JSON.stringify(c.arguments || c.args || {}))}</div>
          </div>
        `).join('') : '<p class="text-sm text-slate-400">无 MCP 调用记录</p>';

        const citationsHtml = citations.length ? `
          <ol class="text-xs text-slate-600 list-decimal list-inside space-y-1">
            ${citations.map(c => `<li>doc_id: ${escapeHtml(c.doc_id || '-')}, chunk_index: ${typeof c.chunk_index === 'number' ? c.chunk_index : '-'}, title: 《${escapeHtml(c.doc_title || '未知文档')}》</li>`).join('')}
          </ol>
        ` : '<p class="text-sm text-slate-400">无 RAG 引用</p>';

        const summary = {
          trace_id: traceId,
          current_agent: currentAgent,
          activated_skills: activatedSkills,
          model_calls: modelCalls.map(c => ({
            model_id: c.model_id,
            stage: c.stage,
            total_tokens: c.total_tokens,
            cost_formula: c.formula || c.cost_formula,
            cost_cny: c.estimated_cost_cny
          })),
          mcp_calls: mcpCalls.map(c => ({
            server_name: c.server_name,
            tool_name: c.tool_name,
            success: c.status === 'success',
            duration_ms: c.latency_ms,
            args: c.arguments || c.args
          })),
          rag_citations: citations.map(c => ({
            doc_id: c.doc_id,
            chunk_index: c.chunk_index,
            doc_title: c.doc_title
          }))
        };
        const summaryJson = JSON.stringify(summary, null, 2);
        const summaryText = [
          `Trace ID: ${traceId}`,
          `当前 Agent: ${currentAgent}`,
          `激活 Skill: ${activatedSkills.join('、') || '无'}`,
          '',
          '模型调用:',
          ...modelCalls.map(c => `- ${c.stage || 'unknown'} / ${c.model_id || '-'}: tokens=${c.total_tokens || 0}, cost=${fmtCostLocal(c.estimated_cost_cny)}, formula=${c.formula || c.cost_formula || '-'}`),
          '',
          'MCP 调用:',
          ...mcpCalls.map(c => `- ${c.server_name || 'unknown'} / ${c.tool_name || '-'}: success=${c.status === 'success'}, duration=${c.latency_ms || 0}ms, args=${JSON.stringify(c.arguments || c.args || {})}`),
          '',
          'RAG 引用:',
          ...citations.map(c => `- doc_id=${c.doc_id || '-'}, chunk_index=${typeof c.chunk_index === 'number' ? c.chunk_index : '-'}, title=《${c.doc_title || '未知文档'}》`)
        ].join('\n');

        const html = `
          <div class="space-y-5">
            <div class="bg-slate-50 rounded-xl p-3 border border-slate-200 text-sm space-y-1">
              <div><span class="text-slate-500">trace_id:</span> <span class="font-mono">${escapeHtml(traceId)}</span></div>
              <div><span class="text-slate-500">当前 Agent:</span> ${escapeHtml(currentAgent)}</div>
              <div><span class="text-slate-500">激活 Skill:</span> ${activatedSkills.length ? escapeHtml(activatedSkills.join('、')) : '无'}</div>
            </div>
            <div>
              <h4 class="font-medium text-slate-900 mb-2">模型调用</h4>
              ${modelCallsHtml}
            </div>
            <div>
              <h4 class="font-medium text-slate-900 mb-2">MCP 调用</h4>
              ${mcpCallsHtml}
            </div>
            <div>
              <h4 class="font-medium text-slate-900 mb-2">RAG 引用</h4>
              ${citationsHtml}
            </div>
            <div class="pt-2 border-t border-slate-200">
              <button type="button" id="trace-copy-summary" class="w-full px-4 py-2 bg-brand-600 hover:bg-brand-700 text-white rounded-xl text-sm transition-colors">复制 Trace 摘要</button>
            </div>
          </div>
        `;
        openDrawer('Trace 详情', html);
        setTimeout(() => {
          const copyBtn = $('#trace-copy-summary');
          if (copyBtn) {
            copyBtn.addEventListener('click', async () => {
              try {
                const text = summaryText + '\n\n--- JSON ---\n' + summaryJson;
                await navigator.clipboard.writeText(text);
                showToast('Trace 摘要已复制', 'success');
              } catch (e) {
                showToast('复制失败', 'error');
              }
            });
          }
        }, 0);
      } catch (err) {
        showToast('加载 Trace 失败：' + (err && err.message ? err.message : err), 'error');
      }
    }

    function formatTimeLabel(isoString) {
      if (!isoString) return '';
      // Backend stores Beijing time as "YYYY-MM-DD HH:mm:ss" without timezone.
      // Treat bare datetime strings as +08:00 so the display is always Beijing time.
      let value = isoString;
      if (typeof value === 'string' && value.includes(' ') && !value.includes('T') && !value.match(/[Z+-]\d/)) {
        value = value.replace(' ', 'T') + '+08:00';
      }
      const date = new Date(value);
      if (isNaN(date.getTime())) return isoString;
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      const hours = String(date.getHours()).padStart(2, '0');
      const minutes = String(date.getMinutes()).padStart(2, '0');
      const seconds = String(date.getSeconds()).padStart(2, '0');
      return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
    }

    function stripThinking(content) {
      // Remove reasoning blocks like </think>...</think> or <think>...</think>
      return content.replace(/<\/?think>[\s\S]*?<\/?think>/g, '').trim();
    }

    function formatTokenDetail(detail) {
      if (!detail) return '';
      const parts = [];
      if (detail.input_tokens) parts.push(`输入 ${detail.input_tokens}`);
      if (detail.output_tokens) parts.push(`输出 ${detail.output_tokens}`);
      if (detail.reasoning_tokens) parts.push(`推理 ${detail.reasoning_tokens}`);
      if (detail.cached_tokens) parts.push(`缓存命中 ${detail.cached_tokens}`);
      if (detail.total_tokens) parts.push(`总计 ${detail.total_tokens}`);
      return parts.join(' · ');
    }

    function getUsedCitationIndices(content, maxCount) {
      const used = new Set();
      if (!content || !maxCount) return used;
      const regex = /【引用(\d+)】|\[引用(\d+)\]/g;
      let m;
      while ((m = regex.exec(content)) !== null) {
        const idx = parseInt(m[1] || m[2], 10);
        if (idx >= 1 && idx <= maxCount) used.add(idx);
      }
      return used;
    }

    function renderMarkdownWithCitations(content, citations) {
      if (!citations || citations.length === 0) return marked.parse(content || '');
      const renderer = new marked.Renderer();
      const originalText = renderer.text.bind(renderer);
      renderer.text = (text) => {
        const replaced = text.replace(/【引用(\d+)】|\[引用(\d+)\]/g, (match, b1, b2) => {
          const idx = parseInt(b1 || b2, 10);
          const c = citations[idx - 1];
          if (!c || !c.doc_id) return match;
          const chunkIdx = typeof c.chunk_index === 'number' ? c.chunk_index : '';
          return `<button type="button" class="inline-citation-btn px-1 py-0.5 mx-0.5 bg-brand-50 text-brand-700 rounded text-[11px] hover:bg-brand-100 transition-colors align-text-bottom" onclick="showCitationChunk(${c.doc_id}, '${chunkIdx}', '')">引用${idx}</button>`;
        });
        return originalText(replaced);
      };
      return marked.parse(content || '', { renderer });
    }

    function renderCitations(citations, content = '') {
      if (!citations || citations.length === 0) return '';
      const usedSet = getUsedCitationIndices(content, citations.length);
      const used = citations.filter((_, i) => usedSet.has(i + 1));
      const candidates = citations.filter((_, i) => !usedSet.has(i + 1));

      const renderItem = (c, i, isUsed) => {
        const score = typeof c.score === 'number' ? c.score.toFixed(3) : '-';
        const title = escapeHtml(c.doc_title || '未知文档');
        const docId = c.doc_id || '';
        const chunkIdx = typeof c.chunk_index === 'number' ? c.chunk_index : '';
        const snippet = escapeHtml((c.content || '').slice(0, 120).replace(/[\n\r]+/g, ' '));
        const clickable = docId ? 'cursor-pointer hover:text-brand-600 hover:underline' : '';
        const attrs = docId
          ? `data-doc-id="${docId}" data-chunk-index="${chunkIdx}" data-snippet="${snippet}" onclick="showCitationChunk(${docId}, '${chunkIdx}', this.dataset.snippet)"`
          : '';
        const chunkLabel = chunkIdx !== '' ? ` · 分片 ${chunkIdx}` : '';
        return `<li class="mt-1 ${clickable}" ${attrs}>[${i + 1}] 《${title}》${chunkLabel}<span class="text-slate-400">（相关度 ${score}）</span></li>`;
      };

      const usedItems = used.map((c, i) => renderItem(c, i, true)).join('');
      const candidateItems = candidates.map((c, i) => renderItem(c, i, false)).join('');

      let html = '<div class="ai-message-citations mt-2 pt-2 border-t border-slate-100">';
      if (usedItems) {
        html += `<p class="text-[10px] text-slate-400 mb-1">引用来源</p><ol class="text-[10px] text-slate-500 list-decimal list-inside">${usedItems}</ol>`;
      }
      if (candidateItems) {
        html += `
          <details class="mt-2">
            <summary class="text-[10px] text-slate-400 cursor-pointer hover:text-slate-600 select-none">本轮检索候选（${candidates.length} 条未在回答中引用）</summary>
            <ol class="text-[10px] text-slate-500 list-decimal list-inside mt-1">${candidateItems}</ol>
          </details>
        `;
      }
      html += '</div>';
      return html;
    }

    async function showCitationChunk(docId, chunkIndex, snippet = '') {
      try {
        const data = await apiGet(`/api/knowledge/docs/${docId}/chunks`);
        const chunks = data.chunks || [];
        const title = data.knowledge_doc?.title || '知识文档';
        const hasIndex = chunkIndex !== '' && chunkIndex !== null && chunkIndex !== undefined;
        const chunk = hasIndex ? chunks.find(c => String(c.chunk_index) === String(chunkIndex)) : null;
        let html = '';
        if (!hasIndex) {
          // Legacy citation without chunk_index: show the first chunk only as a reference, clearly labelled.
          const first = chunks[0];
          const content = first ? first.content : '';
          let display = escapeHtml(content);
          if (snippet && content) {
            const plainSnippet = snippet.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&');
            if (plainSnippet.length > 6 && content.includes(plainSnippet)) {
              display = display.replace(escapeHtml(plainSnippet), `<strong class="text-brand-700 bg-brand-50 px-1 rounded">${escapeHtml(plainSnippet)}</strong>`);
            }
          }
          html = `<div class="bg-amber-50 rounded-xl p-3 border border-amber-200">
            <p class="text-xs text-amber-700 mb-2">历史引用，分片编号缺失</p>
            ${content ? `<p class="text-xs text-slate-500 mb-1">参考：文档首分片</p><p class="text-sm text-slate-700 whitespace-pre-line">${display}</p>` : '<p class="text-sm text-slate-500">未找到对应分片内容。</p>'}
          </div>`;
        } else if (chunk) {
          const content = chunk.content;
          let display = escapeHtml(content);
          if (snippet) {
            const plainSnippet = snippet.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&');
            if (plainSnippet.length > 6 && content.includes(plainSnippet)) {
              display = display.replace(escapeHtml(plainSnippet), `<strong class="text-brand-700 bg-brand-50 px-1 rounded">${escapeHtml(plainSnippet)}</strong>`);
            }
          }
          html = `<div class="bg-slate-50 rounded-xl p-3 border border-slate-200">
            <p class="text-xs text-slate-500 mb-2">分片 ${escapeHtml(chunk.chunk_index)}</p>
            <p class="text-sm text-slate-700 whitespace-pre-line">${display}</p>
          </div>`;
        } else {
          // Exact chunk not found: do not silently fall back to the first chunk.
          const available = chunks.map(c => c.chunk_index).join(', ');
          html = `<div class="bg-red-50 rounded-xl p-3 border border-red-200">
            <p class="text-sm font-medium text-red-700 mb-1">该引用分片已不存在或无法定位</p>
            <p class="text-xs text-slate-600">doc_id: ${escapeHtml(docId)}，chunk_index: ${escapeHtml(chunkIndex)}</p>
            ${available ? `<p class="text-xs text-slate-500 mt-1">文档现有分片编号：${escapeHtml(available)}</p>` : '<p class="text-xs text-slate-500 mt-1">该文档暂无分片数据。</p>'}
          </div>`;
        }
        openModal(`《${escapeHtml(title)}》引用分片`, html, null, '关闭');
      } catch (err) {
        showToast('加载引用分片失败：' + (err && err.message ? err.message : err), 'error');
      }
    }
    window.showCitationChunk = showCitationChunk;

    async function sendChatMessage(text) {
      appendUserMessage(text);
      STATE.chatStreaming = true;
      STATE.currentRoute = null;
      const btn = $('#chat-send');
      if (btn) btn.disabled = true;

      const placeholder = appendAiMessagePlaceholder();
      STATE.currentAiMessage = placeholder;
      let accumulated = '';

      try {
        const response = await fetch(`${API_BASE}/api/chat/stream`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, session_id: STATE.chatSessionId, user_id: 'web-user' })
        });

        if (!response.ok) {
          let errText = '';
          try { errText = await response.text(); } catch (e) {}
          throw new Error(`服务暂时不可用（HTTP ${response.status}${errText ? ': ' + errText.slice(0, 200) : ''}）`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          // Extract complete SSE events split by double newlines.
          const events = [];
          let idx;
          while ((idx = buffer.indexOf('\n\n')) !== -1) {
            events.push(buffer.slice(0, idx));
            buffer = buffer.slice(idx + 2);
          }

          for (const event of events) {
            if (!event.trim()) continue;
            let eventType = '';
            const dataLines = [];
            for (const line of event.split('\n')) {
              if (line.startsWith('event:')) eventType = line.slice(6).trim();
              else if (line.startsWith('data:')) dataLines.push(line.slice(5).trim());
            }
            if (dataLines.length === 0) continue;

            let data;
            try {
              data = JSON.parse(dataLines.join('\n'));
            } catch (e) {
              console.warn('SSE data parse error:', e, dataLines.join('\n'));
              continue;
            }

            if (eventType === 'start') {
              STATE.chatSessionId = data.session_id;
              try { localStorage.setItem('chatSessionId', data.session_id); } catch (e) {}
              if (data.trace_id) STATE.currentTraceId = data.trace_id;
            } else if (eventType === 'route') {
              STATE.currentRoute = {
                intent: data.intent || '',
                reason: data.reason || '',
                current_agent: data.current_agent || ''
              };
              const statusEl = placeholder.querySelector('.ai-message-route-status');
              if (statusEl) statusEl.textContent = `路由：${data.reason || data.intent || ''} → ${data.current_agent || ''}`;
            } else if (eventType === 'delta') {
              if (data.current_agent && STATE.currentRoute) STATE.currentRoute.current_agent = data.current_agent;
              accumulated += (data.content || '');
              updateAiMessage(accumulated);
            } else if (eventType === 'tool_calls') {
              if (data.current_agent && STATE.currentRoute) STATE.currentRoute.current_agent = data.current_agent;
              const toolNames = (data.tool_calls || []).map(t => typeof t === 'string' ? t : (t.name || t.tool_name || JSON.stringify(t))).join('、');
              const statusEl = placeholder.querySelector('.ai-message-tool-status');
              if (statusEl) statusEl.textContent = toolNames ? `调用工具：${toolNames}` : '';
            } else if (eventType === 'done') {
              updateAiMessage(
                accumulated,
                true,
                data.token_count || 0,
                data.message_id || null,
                data.token_detail || null,
                data.citations || null,
                data.activated_skills || null,
                data.tool_calls || null,
                data.current_agent || (STATE.currentRoute && STATE.currentRoute.current_agent) || null,
                data.model_id || '',
                data.thinking_enabled || false,
                data.model_selection_reason || '',
                data.trace_id || STATE.currentTraceId || '',
                data.mcp_calls || null,
                data.usage_source || ''
              );
              if (data.handoff) {
                STATE.chatHandoff = true;
                updateHandoffBanner(data.handoff_status || 'requested');
                showToast('已转人工，请等待工作人员回复', 'success');
              }
              loadChatSessions().then(() => refreshSidebar());
              STATE.currentTraceId = null;
            } else if (eventType === 'error') {
              accumulated += `\n\n[错误: ${data.error}]`;
              updateAiMessage(accumulated, true);
            }
          }
        }
      } catch (err) {
        console.error('Chat error:', err);
        updateAiMessage((accumulated ? accumulated + '\n\n' : '') + `[${err.message || '连接失败，请稍后重试'}]`, true);
      } finally {
        STATE.chatStreaming = false;
        const btn = $('#chat-send');
        if (btn) btn.disabled = false;
      }
    }

    async function restoreChatMessages() {
      if (!STATE.chatSessionId) return;
      try {
        const res = await fetch(`${API_BASE}/api/chat/history?session_id=${encodeURIComponent(STATE.chatSessionId)}`);
        if (!res.ok) return;
        const data = await res.json();
        const messages = data.messages || [];
        const session = data.session || {};
        STATE.chatHandoff = session.handoff_status === 'requested' || session.handoff_status === 'active';
        const container = $('#chat-message-list');
        if (!container) return;
        // Clear existing messages except the welcome message
        const welcome = container.querySelector('.welcome-message');
        container.innerHTML = '';
        if (welcome) container.appendChild(welcome);
        messages.forEach(msg => {
          if (msg.role === 'user') {
            appendUserMessage(msg.content || '', msg.created_at);
          } else if (msg.role === 'assistant') {
            appendAiMessageFromHistory(
              msg.content || '',
              msg.created_at,
              msg.token_count,
              msg.id,
              msg.token_detail,
              msg.citations,
              msg.activated_skills,
              msg.tool_calls,
              msg.current_agent,
              msg.route_reason,
              msg.route_intent,
              msg.model_id,
              msg.thinking_enabled,
              msg.model_selection_reason,
              msg.trace_id,
              msg.mcp_calls,
              msg.usage_source
            );
          } else if (msg.role === 'staff') {
            appendStaffMessage(msg.content || '', msg.created_at);
          }
        });
        updateHandoffBanner(session.handoff_status);
      } catch (err) {
        console.error('Restore chat history failed:', err);
      }
    }

    async function renderHandoffPage(container) {
      container.innerHTML = `

        </div>
      `;
      await loadHandoffSessions();

    async function loadHandoffSessions() {
      const content = $('#handoff-content');
      if (!content) return;
      content.innerHTML = loadingState();
      try {
        const data = await apiGet('/api/chat/handoffs');
        const sessions = data.sessions || [];
        if (sessions.length === 0) {
          content.innerHTML = emptyState('暂无待人工接管的会话');
          return;
        }
        content.innerHTML = `
          <div class="bg-white rounded-2xl shadow-soft border border-slate-200 overflow-hidden">
            <table class="w-full text-sm text-left">
              <thead class="bg-slate-50 text-slate-600">
                <tr>
                  <th class="px-4 py-3 font-medium">会话 ID</th>
                  <th class="px-4 py-3 font-medium">状态</th>
                  <th class="px-4 py-3 font-medium">原因</th>
                  <th class="px-4 py-3 font-medium">时间</th>
                  <th class="px-4 py-3 font-medium">操作</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-slate-100">
                ${sessions.map(s => `
                  <tr class="hover:bg-slate-50">
                    <td class="px-4 py-3 font-mono text-xs text-slate-500">${escapeHtml(s.session_id)}</td>
                    <td class="px-4 py-3"><span class="text-xs px-2 py-1 rounded-full ${s.handoff_status === 'active' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">${s.handoff_status === 'active' ? '接管中' : '待接管'}</span></td>
                    <td class="px-4 py-3 text-slate-700">${escapeHtml(s.handoff_reason || '-')}</td>
                    <td class="px-4 py-3 text-slate-500 text-xs">${formatTimeLabel(s.handoff_requested_at)}</td>
                    <td class="px-4 py-3 flex gap-2">
                      <button data-session="${escapeHtml(s.session_id)}" data-status="${escapeHtml(s.handoff_status)}" class="handoff-view-btn text-xs px-3 py-1.5 bg-brand-600 hover:bg-brand-700 text-white rounded-lg transition-colors">${s.handoff_status === 'active' ? '继续回复' : '接管'}</button>
                      ${s.handoff_status === 'active' ? `<button data-session="${escapeHtml(s.session_id)}" class="handoff-resolve-btn text-xs px-3 py-1.5 bg-green-600 hover:bg-green-700 text-white rounded-lg transition-colors">完结</button>` : ''}
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `;
        $$('.handoff-view-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            const sessionId = btn.dataset.session;
            if (btn.dataset.status !== 'active') {
              // Take over the session first.
              try {
                const res = await fetch(`${API_BASE}/api/chat/handoff`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ session_id: sessionId, reason: '工作人员接管会话' })
                });
                if (!res.ok) throw new Error('接管失败');
              } catch (err) {
                showToast('接管失败：' + err.message, 'error');
                return;
              }
            }
            openHandoffReplyModal(sessionId);
          });
        });
        $$('.handoff-resolve-btn').forEach(btn => {
          btn.addEventListener('click', () => resolveHandoff(btn.dataset.session));
        });
      } catch (err) {
        content.innerHTML = emptyState('加载失败，请刷新重试');
      }
    }

    function openHandoffReplyModal(sessionId) {
      const modal = document.createElement('div');
      modal.className = 'fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4';
      modal.id = 'handoff-reply-modal';
      modal.innerHTML = `
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden">
          <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between shrink-0">

            <button class="handoff-modal-close text-slate-400 hover:text-slate-600">&times;</button>
          </div>
          <div class="p-6 overflow-y-auto flex-1 min-h-0">
            <div id="handoff-context" class="mb-4">${loadingState()}</div>
            <div class="border-t border-slate-200 pt-4 space-y-4">
              <div>
                <label class="block text-xs font-medium text-slate-600 mb-1">工作人员姓名</label>
                <input id="handoff-staff-name" type="text" value="张师傅" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-brand-400 focus:ring-2 focus:ring-brand-100">

              <div>

                <textarea id="handoff-reply-text" rows="3" placeholder="请输入回复内容..." class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-brand-400 focus:ring-2 focus:ring-brand-100 resize-none"></textarea>
              </div>
            </div>
          </div>
          <div class="px-6 py-4 border-t border-slate-100 flex justify-end gap-2 shrink-0">
            <button class="handoff-modal-close px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg text-sm">取消</button>
            <button id="handoff-reply-submit" class="px-4 py-2 bg-brand-600 hover:bg-brand-700 text-white rounded-lg text-sm">发送回复</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);

      const closeModal = () => modal.remove();
      $$('.handoff-modal-close').forEach(btn => btn.addEventListener('click', closeModal));
      modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

      function renderHandoffContextMessage(msg) {
        const time = formatTimeLabel(msg.created_at);
        if (msg.role === 'user') {
          return `
            <div class="mb-3">
              <p class="text-[10px] text-slate-500 mb-0.5">业主 · ${time}</p>
              <div class="bg-slate-50 rounded-lg p-2.5 text-sm text-slate-700 whitespace-pre-wrap border border-slate-200">${escapeHtml(msg.content || '')}</div>
            </div>
          `;
        }
        if (msg.role === 'staff') {
          return `
            <div class="mb-3">
              <p class="text-[10px] text-indigo-500 mb-0.5">工作人员 · ${time}</p>
              <div class="bg-indigo-50 rounded-lg p-2.5 text-sm text-slate-700 whitespace-pre-wrap border border-indigo-100">${escapeHtml(msg.content || '')}</div>
            </div>
          `;
        }
        if (msg.role === 'assistant') {
          const clean = stripThinking(msg.content || '');
          const tags = renderAiMessageTags(msg.activated_skills, msg.tools, msg.agent);
          const footnotes = renderCitations(msg.citations, clean);
          return `
            <div class="mb-3">
              <p class="text-[10px] text-brand-500 mb-0.5">AI · ${time}</p>
              <div class="bg-brand-50 rounded-lg p-2.5 text-sm text-slate-700 border border-brand-100">
                <div class="markdown-body text-sm text-slate-700 break-words">${renderMarkdownWithCitations(clean, msg.citations)}</div>
                ${tags}
                ${footnotes}
              </div>
            </div>
          `;
        }
        return '';
      }

      async function loadContext() {
        const container = $('#handoff-context');
        if (!container) return;
        container.innerHTML = loadingState();
        try {
          const res = await fetch(`${API_BASE}/api/chat/history?session_id=${encodeURIComponent(sessionId)}`);
          if (!res.ok) throw new Error('加载失败');
          const data = await res.json();
          const messages = data.messages || [];
          if (messages.length === 0) {
            container.innerHTML = '<p class="text-sm text-slate-500">暂无会话消息</p>';
            return;
          }
          container.innerHTML = messages.map(renderHandoffContextMessage).join('');
        } catch (err) {
          container.innerHTML = `<p class="text-sm text-red-600">加载上下文失败：${escapeHtml(err.message)}</p>`;
        }
      }

      $('#handoff-reply-submit').addEventListener('click', async () => {
        const staffName = $('#handoff-staff-name').value.trim() || '物业工作人员';
        const message = $('#handoff-reply-text').value.trim();
        if (!message) {
          showToast('请输入回复内容', 'error');
          return;
        }
        try {
          const res = await fetch(`${API_BASE}/api/chat/handoff-reply`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ session_id: sessionId, staff_name: staffName, message })
          });
          if (!res.ok) throw new Error('发送失败');
          showToast('回复已发送', 'success');
          closeModal();
          await loadHandoffSessions();
        } catch (err) {
          showToast('发送失败，请重试', 'error');
        }
      });

      loadContext();
    }

    async function resolveHandoff(sessionId) {
      if (!confirm('确定要完结该人工会话吗？')) return;
      try {
        const res = await fetch(`${API_BASE}/api/chat/handoff-resolve`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId })
        });
        if (!res.ok) throw new Error('完结失败');
        showToast('会话已完结', 'success');
        await loadHandoffSessions();
      } catch (err) {
        showToast('完结失败，请重试', 'error');
      }
    }

      function openKnowledgeModal(doc = null) {
        const isEdit = !!doc;
        const title = isEdit ? '编辑知识文档' : '新增知识文档';
        const addNote = isEdit ? '' : `<div class="bg-blue-50 text-blue-800 text-xs rounded-lg p-2 mb-3 border border-blue-100 space-y-1"><p>保存后系统将自动进行文本切分、关键词索引与向量索引；无需手动选择 RAG 方案。当前仅支持文本粘贴，不支持 PDF/Word 上传。</p><p>系统按长度与语义边界自动切分；短文本可能只生成 1 个分片，属于正常结果。</p></div>`;
        const body = `
          ${addNote}
          ${formInput('标题', 'kd-title', doc ? doc.title : '', '请输入文档标题')}
          ${formInput('分类', 'kd-category', doc ? doc.category : '', '如：服务承诺、收费标准、FAQ')}
          ${formTextarea('内容', 'kd-content', doc ? doc.content : '', '请输入知识库内容，支持多行文本', 8)}
        `;
        openModal(title, body, async () => {
          const payload = {
            title: $('#kd-title').value.trim(),
            category: $('#kd-category').value.trim() || '未分类',
            content: $('#kd-content').value.trim()
          };
          if (!payload.title || !payload.content) {
            showToast('标题和内容不能为空', 'error');
            return;
          }
          try {
            if (isEdit) {
              await apiPut(`/api/knowledge/docs/${doc.id}`, payload);
              showToast('知识文档已更新');
            } else {
              await apiPost('/api/knowledge/docs', payload);
              showToast('知识文档已创建');
            }
            closeModal();
            if (activeTab === 'docs') await loadDocs($('#knowledge-search-input').value.trim());
          } catch (err) {
            showToast('保存失败，请重试', 'error');
          }
        });
      }

      async function editKnowledgeDoc(docId) {
        try {
          const data = await apiGet(`/api/knowledge/docs/${docId}`);
          openKnowledgeModal(data.knowledge_doc);
        } catch (err) {
          showToast('加载文档失败', 'error');
        }
      }

      async function deleteKnowledgeDoc(docId) {
        if (!confirm('确定要删除这条知识文档吗？')) return;
        try {
          await apiDelete(`/api/knowledge/docs/${docId}`);
          showToast('知识文档已删除');
          if (activeTab === 'docs') await loadDocs($('#knowledge-search-input').value.trim());
        } catch (err) {
          showToast('删除失败，请重试', 'error');
        }
      }

      async function reindexDoc(docId) {
        try {
          await apiPost(`/api/knowledge/docs/${docId}/reindex`);
          showToast('重新索引已开始');
          if (activeTab === 'docs') await loadDocs($('#knowledge-search-input').value.trim());
        } catch (err) {
          showToast('重新索引失败', 'error');
        }
      }

      async function viewChunks(docId) {
        try {
          const data = await apiGet(`/api/knowledge/docs/${docId}/chunks`);
          const chunks = data.chunks || [];
          const title = data.knowledge_doc?.title || '知识文档';
          const html = chunks.length === 0
            ? '<p class="text-sm text-slate-500">暂无分片，请先点击“重新索引”。</p>'
            : `<div class="space-y-3">${chunks.map((c) => `
                <div class="bg-slate-50 rounded-xl p-3 border border-slate-200">
                  <p class="text-[10px] text-slate-400 mb-1">分片 #${c.chunk_index != null ? c.chunk_index : '?'}</p>
                  <p class="text-sm text-slate-700 whitespace-pre-line">${escapeHtml(c.content)}</p>
                </div>
              `).join('')}</div>`;
          openModal(`《${escapeHtml(title)}》分片详情`, html, null, '关闭');
        } catch (err) {
          showToast('加载分片失败', 'error');
        }
      }

      $$('.knowledge-tab-btn').forEach(btn => {
        btn.addEventListener('click', () => setTab(btn.dataset.tab));
      });
      $('#knowledge-add-btn').addEventListener('click', () => openKnowledgeModal());
      setTab('docs');
    }

          loadingEl.disabled = true;
          loadingEl.dataset.originalText = prevText;
          loadingEl.textContent = loadingText;
        }
        try {
          await apiPost(path, body || {});
          showToast(successText, 'success');
          await loadDetail();
        } catch (err) {
          showToast('操作失败：' + err.message, 'error');
        } finally {
          if (loadingEl) {
            loadingEl.disabled = false;
            loadingEl.textContent = loadingEl.dataset.originalText || prevText;
          }
        }
      }

      container.innerHTML = `
        <div class="max-w-6xl mx-auto p-4 md:p-6 space-y-5">
          <div class="flex items-center gap-3 mb-2">
            <button id="badcase-detail-back" class="p-2 hover:bg-slate-200 rounded-lg text-slate-600 transition-colors">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <div>
              <h2 class="text-xl font-semibold text-slate-900">Badcase #${id}</h2>
              <p id="badcase-detail-header-status" class="text-sm text-slate-500">状态：加载中…</p>
            </div>
          </div>
          <div id="badcase-detail-content">${loadingState()}</div>
        </div>
      `;
      $('#badcase-detail-back').addEventListener('click', () => {
        STATE.subTab = 'badcases';
        STATE.badcaseDetailId = null;
        renderSidebar();
        renderContent();
      });

      function sourceBadgeDetail(srcLabel) {
        if (srcLabel === '人工反馈') return '<span class="text-xs px-2 py-1 rounded-full bg-indigo-50 text-indigo-600 border border-indigo-100">人工反馈</span>';
        return '<span class="text-xs px-2 py-1 rounded-full bg-slate-100 text-slate-500 border border-slate-200">自动发现</span>';
      }

      function sourceBadge(src) {
        const map = {
          realtime: '实时账单',
          estimated: '本地估算',
          fallback: '回退估算',
          unknown: '未知'
        };
        const label = map[src] || src || '未知';
        const color = src === 'realtime' ? 'bg-indigo-50 text-indigo-600' : src === 'estimated' ? 'bg-brand-50 text-brand-600' : 'bg-slate-100 text-slate-500';
        return `<span class="text-[10px] px-1.5 py-0.5 rounded-full ${color}">${escapeHtml(label)}</span>`;
      }

      function statusBadgeSmall(s) {
        const map = { success: ['bg-green-50 text-green-600', '成功'], error: ['bg-red-50 text-red-600', '失败'], warning: ['bg-amber-50 text-amber-600', '警告'] };
        const [cls, label] = map[s] || ['bg-slate-100 text-slate-500', s || '未知'];
        return `<span class="text-[10px] px-1.5 py-0.5 rounded-full ${cls}">${escapeHtml(label)}</span>`;
      }

      function parseDarwin(da) {
        if (!da) return null;
        try {
          return typeof da === 'string' ? JSON.parse(da) : da;
        } catch (e) {
          return null;
        }
      }

      function renderContextValue(v) {
        if (v === null || v === undefined) return '<span class="text-slate-400">-</span>';
        if (Array.isArray(v)) {
          const items = v.map(x => (typeof x === 'string' ? escapeHtml(x) : escapeHtml(JSON.stringify(x)))).join('、');
          return items ? `<div class="text-sm text-slate-700">${items}</div>` : '<span class="text-slate-400">-</span>';
        }
        if (typeof v === 'object') {
          return `<pre class="text-xs bg-slate-50 p-2 rounded border border-slate-200 overflow-x-auto">${escapeHtml(JSON.stringify(v, null, 2))}</pre>`;
        }
        return `<div class="text-sm text-slate-700 whitespace-pre-wrap">${escapeHtml(String(v))}</div>`;
      }

      function renderKeyValue(obj) {
        if (!obj || typeof obj !== 'object' || Object.keys(obj).length === 0) {
          return '<p class="text-sm text-slate-400">-</p>';
        }
        return `
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            ${Object.entries(obj).map(([k, v]) => `
              <div class="bg-slate-50 rounded-lg p-3 border border-slate-200">
                <div class="text-xs text-slate-500 mb-1">${escapeHtml(k)}</div>
                ${renderContextValue(v)}
              </div>
            `).join('')}
          </div>
        `;
      }

      function renderDetail(detail) {
        if (!detail || typeof detail !== 'object' || Object.keys(detail).length === 0) return '';
        const lines = Object.entries(detail).map(([k, v]) => {
          let text;
          if (v === null || v === undefined) text = '-';
          else if (typeof v === 'object') text = JSON.stringify(v, null, 2);
          else text = String(v);
          return `<div class="text-xs text-slate-600"><span class="font-medium text-slate-700">${escapeHtml(k)}:</span> <span class="whitespace-pre-wrap">${escapeHtml(text)}</span></div>`;
        }).join('');
        return `<div class="mt-1 pl-2 border-l border-slate-200 space-y-0.5">${lines}</div>`;
      }

      function transitionBadge(before, beforeLabel, after, afterLabel) {
        const styleMap = {
          pending: 'bg-amber-50 text-amber-700 border-amber-200',
          classified: 'bg-indigo-50 text-indigo-700 border-indigo-200',
          fixing: 'bg-brand-50 text-brand-700 border-brand-200',
          verifying: 'bg-sky-50 text-sky-700 border-sky-200',
          closed: 'bg-slate-100 text-slate-600 border-slate-200',
          rejected: 'bg-red-50 text-red-700 border-red-200'
        };
        const beforeClass = styleMap[before] || 'bg-slate-100 text-slate-600 border-slate-200';
        const afterClass = styleMap[after] || 'bg-slate-100 text-slate-600 border-slate-200';
        return `<span class="px-2 py-0.5 rounded-full text-[10px] font-medium border ${beforeClass}">${escapeHtml(beforeLabel || before)}</span><span class="text-slate-400">→</span><span class="px-2 py-0.5 rounded-full text-[10px] font-medium border ${afterClass}">${escapeHtml(afterLabel || after)}</span>`;
      }

      function draftField(type, d) {
        if (type === 'knowledge') return d.content || '';
        if (type === 'skill_prompt') return d.prompt_content || '';
        return d.description || '';
      }

      function draftFields(type, d) {
        if (type === 'knowledge') {
          return [
            { key: 'title', label: '标题', value: d.title || '' },
            { key: 'content', label: '正文', value: d.content || '', textarea: true },
            { key: 'category', label: '分类', value: d.category || '' }
          ];
        }
        if (type === 'skill_prompt') {
          return [
            { key: 'title', label: '标题', value: d.title || '' },
            { key: 'skill_name', label: 'Skill 名称', value: d.skill_name || '' },
            { key: 'prompt_content', label: 'Prompt 内容', value: d.prompt_content || '', textarea: true },
            { key: 'trigger_keywords', label: '触发关键词', value: d.trigger_keywords || '' }
          ];
        }
        return [
          { key: 'title', label: '标题', value: d.title || '' },
          { key: 'description', label: '缺口描述', value: d.description || '', textarea: true },
          { key: 'gap_type', label: '缺口类型', value: d.gap_type || '' },
          { key: 'suggested_action', label: '建议动作', value: d.suggested_action || '', textarea: true }
        ];
      }

      function draftEndpoint(type) {
        if (type === 'knowledge') return 'knowledge-drafts';
        if (type === 'skill_prompt') return 'skill-prompt-drafts';
        return 'capability-gap-drafts';
      }

      function openDraftView(d, type) {
        const fields = draftFields(type, d);
        const body = fields.map(f => `
          <div class="mb-3">
            <label class="block text-xs text-slate-500 mb-1">${escapeHtml(f.label)}</label>
            <div class="text-sm text-slate-700 whitespace-pre-wrap bg-slate-50 rounded-lg p-3 border border-slate-200">${escapeHtml(f.value || '-')}</div>
          </div>
        `).join('');
        openModal(`${escapeHtml(draftStatusLabels[d.status] || d.status)} - ${escapeHtml(d.title || '草稿')}`, body, () => closeModal(), '关闭');
      }

      function openDraftEdit(d, type) {
        const fields = draftFields(type, d);
        const body = fields.map(f => `
          <div class="mb-3">
            <label class="block text-xs text-slate-500 mb-1">${escapeHtml(f.label)}</label>
            ${f.textarea
              ? `<textarea id="draft-edit-${f.key}" rows="5" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-brand-400">${escapeHtml(f.value)}</textarea>`
              : `<input id="draft-edit-${f.key}" type="text" value="${escapeHtml(f.value)}" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-brand-400">`}
          </div>
        `).join('');
        openModal(`编辑${type === 'knowledge' ? '知识' : type === 'skill_prompt' ? 'Skill/Prompt' : '能力缺口'}草稿`, body, async () => {
          const payload = {};
          fields.forEach(f => { payload[f.key] = $(`#draft-edit-${f.key}`).value; });
          try {
            await apiPut(`/api/badcases/${id}/${draftEndpoint(type)}/${d.id}`, payload);
            showToast('草稿已保存', 'success');
            closeModal();
            await loadDetail();
          } catch (err) {
            showToast('保存失败：' + err.message, 'error');
          }
        });
      }

      let agentsList = [];
      async function loadAgentsList() {
        try {
          const data = await apiGet('/api/agents');
          agentsList = data.agents || [];
        } catch (err) {
          agentsList = [];
        }
      }

      function openSkillApplyModal(d) {
        const options = agentsList.length
          ? agentsList.map(a => `<option value="${a.id}">${escapeHtml(a.name)}${a.is_router ? '（路由）' : ''}</option>`).join('')
          : '<option value="">暂无可用 Agent</option>';
        const body = `
          <div class="space-y-3">
            <p class="text-sm text-slate-600">选择要绑定该 Skill 的目标 Agent：</p>
            ${formSelect('目标 Agent', 'skill-target-agent', agentsList.map(a => ({ value: String(a.id), label: a.name + (a.is_router ? '（路由）' : '') })), '')}
            <p class="text-xs text-slate-400">应用后系统将创建/更新 Skill 并把该 Skill 绑定到所选 Agent。</p>
          </div>
        `;
        openModal('应用 Skill/Prompt 草稿', body, async () => {
          const targetId = $('#skill-target-agent').value;
          if (!targetId) {
            showToast('请选择目标 Agent', 'error');
            return false;
          }
          try {
            await apiPost(`/api/badcases/${id}/skill-prompt-drafts/${d.id}/publish-skill-draft`, { target_agent_id: Number(targetId) });
            showToast('Skill 已发布并绑定到 Agent', 'success');
            closeModal();
            await loadDetail();
            return true;
          } catch (err) {
            showToast('发布失败：' + err.message, 'error');
            return false;
          }
        }, '发布并绑定');
      }

      function renderDraftCard(d, type, idx) {
        const content = draftField(type, d);
        const snippet = (content || '').slice(0, 120);
        const status = d.status || 'draft';
        const terminalDraft = type === 'capability_gap'
          ? ['accepted', 'rejected'].includes(status)
          : ['published', 'rejected'].includes(status);
        const canEdit = !isTerminal && allowed.has('edit-draft') && status !== 'published' && status !== 'accepted' && status !== 'rejected';
        const applyConfirm = {
          knowledge: '应用后系统将：\n1. 写入正式知识库文档；\n2. 重建向量索引；\n3. 将 Badcase 推进到“验证中”。\n\n请确认索引服务可用。',
          capability_gap: '应用后系统将：\n1. 把能力缺口记录为产品待办；\n2. 不会创建任何 MCP 工具或真实能力；\n3. Badcase 仍保持“修复中”。\n\n请确认。'
        };

        let actionButtons = `<button data-draft-id="${d.id}" data-draft-type="${type}" class="badcase-draft-view px-2 py-1 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg text-xs transition-colors">查看全文</button>`;

        if (isTerminal || terminalDraft) {
          actionButtons += `<span class="px-2 py-1 bg-slate-100 text-slate-400 rounded-lg text-xs">${terminalDraft ? '草稿已终态' : 'Badcase 已终态'}</span>`;
        } else {
          if (canEdit) {
            actionButtons += `<button data-draft-id="${d.id}" data-draft-type="${type}" class="badcase-draft-edit px-2 py-1 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg text-xs transition-colors">编辑</button>`;
          }

          if (status === 'draft') {
            actionButtons += `<button data-draft-id="${d.id}" data-draft-type="${type}" data-review="under_review" class="badcase-draft-review px-2 py-1 bg-blue-50 hover:bg-blue-100 text-blue-700 rounded-lg text-xs transition-colors" ${allowed.has('review-draft') ? '' : 'disabled title="当前状态不可审核"'}>提交审核</button>`;
            actionButtons += `<button data-draft-id="${d.id}" data-draft-type="${type}" data-review="rejected" class="badcase-draft-review px-2 py-1 bg-red-50 hover:bg-red-100 text-red-700 rounded-lg text-xs transition-colors" ${allowed.has('review-draft') ? '' : 'disabled title="当前状态不可审核"'}>驳回</button>`;
          } else if (status === 'under_review') {
            actionButtons += `<button data-draft-id="${d.id}" data-draft-type="${type}" data-review="approved" class="badcase-draft-review px-2 py-1 bg-green-50 hover:bg-green-100 text-green-700 rounded-lg text-xs transition-colors" ${allowed.has('review-draft') ? '' : 'disabled title="当前状态不可审核"'}>通过审核</button>`;
            actionButtons += `<button data-draft-id="${d.id}" data-draft-type="${type}" data-review="draft" class="badcase-draft-review px-2 py-1 bg-amber-50 hover:bg-amber-100 text-amber-700 rounded-lg text-xs transition-colors" ${allowed.has('review-draft') ? '' : 'disabled title="当前状态不可审核"'}>退回草稿</button>`;
            actionButtons += `<button data-draft-id="${d.id}" data-draft-type="${type}" data-review="rejected" class="badcase-draft-review px-2 py-1 bg-red-50 hover:bg-red-100 text-red-700 rounded-lg text-xs transition-colors" ${allowed.has('review-draft') ? '' : 'disabled title="当前状态不可审核"'}>驳回</button>`;
          } else if (status === 'approved') {
            if (type === 'knowledge' && allowed.has('apply-draft')) {
              actionButtons += `<button data-draft-id="${d.id}" data-draft-type="${type}" data-confirm="${escapeHtml(applyConfirm.knowledge)}" class="badcase-draft-apply px-2 py-1 bg-brand-600 hover:bg-brand-700 text-white rounded-lg text-xs transition-colors">应用到正式知识库</button>`;
            } else if (type === 'skill_prompt' && allowed.has('apply-draft')) {
              actionButtons += `<button data-draft-id="${d.id}" data-draft-type="${type}" class="badcase-draft-skill-apply px-2 py-1 bg-brand-600 hover:bg-brand-700 text-white rounded-lg text-xs transition-colors">选择 Agent 并应用</button>`;
            } else if (type === 'capability_gap' && allowed.has('apply-draft')) {
              actionButtons += `<button data-draft-id="${d.id}" data-draft-type="${type}" data-confirm="${escapeHtml(applyConfirm.capability_gap)}" class="badcase-draft-apply px-2 py-1 bg-brand-600 hover:bg-brand-700 text-white rounded-lg text-xs transition-colors">采纳为产品待办</button>`;
            }
          }
        }

        return `
          <div class="bg-slate-50 rounded-xl p-3 border border-slate-200 text-sm">
            <div class="flex items-center justify-between mb-1 gap-2">
              <span class="font-medium text-slate-900 truncate">#${idx + 1} ${escapeHtml(d.title || '未命名')}</span>
              <span class="shrink-0 text-[10px] px-2 py-0.5 rounded-full border bg-white text-slate-600 border-slate-200">${escapeHtml(draftStatusLabels[status] || status)}</span>
            </div>
            <div class="text-xs text-slate-500 mb-2 min-h-[2.5em]">${escapeHtml(snippet)}${(content || '').length > 120 ? '...' : ''}</div>
            <div class="flex flex-wrap gap-2">
              ${actionButtons}
            </div>
          </div>
        `;
      }

      function renderDraftSection(type, drafts, title) {
        if (!drafts.length) return '';
        return `
          <div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-5">
            <h3 class="font-semibold text-slate-900 mb-3">${title}</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
              ${drafts.map((d, idx) => renderDraftCard(d, type, idx)).join('')}
            </div>
          </div>
        `;
      }

      function renderDarwinStructured(parsed) {
        if (!parsed || typeof parsed !== 'object') return '';
        const repairPathLabels = {
          knowledge: '补充知识库',
          skill_prompt: '新增/优化 Skill 或 Prompt',
          mcp_capability: '开发 MCP 能力',
          ops_only: '仅运营处理'
        };
        const fields = [
          { key: 'phenomenon_impact', label: '现象与影响范围' },
          { key: 'root_cause_hypothesis', label: '根因假设' },
          { key: 'evidence_uncertainties', label: '证据与不确定项' },
          { key: 'repair_path_suggestion', label: '修复路径建议' },
          { key: 'recommended_category', label: '推荐分类' },
          { key: 'repair_path', label: '推荐修复路径', format: v => repairPathLabels[v] || v }
        ];
        const cards = fields.map(f => {
          const raw = parsed[f.key];
          if (raw === null || raw === undefined || raw === '') return '';
          const value = f.format ? f.format(raw) : raw;
          return `
            <div class="bg-slate-50 rounded-lg p-3 border border-slate-200">
              <div class="text-xs text-slate-500 mb-1">${f.label}</div>
              <div class="text-sm text-slate-700 whitespace-pre-wrap">${escapeHtml(value)}</div>
            </div>
          `;
        }).filter(Boolean).join('');
        const meta = [];
        if (parsed.model) meta.push(`模型：${escapeHtml(parsed.model)}`);
        if (parsed.trace_id) meta.push(`Trace ID：${escapeHtml(parsed.trace_id)}`);
        if (parsed.token_cost_estimate) meta.push(`Token/成本估算：${escapeHtml(parsed.token_cost_estimate)}`);
        const metaHtml = meta.length ? `<div class="mt-3 text-xs text-slate-500 flex flex-wrap gap-3">${meta.map(m => `<span>${m}</span>`).join('')}</div>` : '';
        return `
          <div class="space-y-3 text-sm text-slate-700">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
              ${cards}
            </div>
            ${metaHtml}
          </div>
        `;
      }

      function renderRetestResult(bc) {
        const retestContext = bc.retest_context || {};
        return `
          <div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-5">
            <h3 class="font-semibold text-slate-900 mb-3">真实复测结果</h3>
            <div class="space-y-3 text-sm text-slate-700">
              <div>
                <div class="text-xs text-slate-500 mb-1">复测回答</div>
                <div class="whitespace-pre-wrap bg-slate-50 rounded-lg p-3 border border-slate-200">${escapeHtml(bc.retest_response || '（无）')}</div>
              </div>
              <details class="group">
                <summary class="text-xs text-slate-500 cursor-pointer hover:text-slate-700">复测上下文（点击展开）</summary>
                <div class="mt-2">${renderKeyValue(retestContext)}</div>
              </details>
              ${bc.retest_trace_id ? `
                <div>
                  <div class="text-xs text-slate-500 mb-1">复测 Trace ID</div>
                  <a href="#observability?trace_id=${encodeURIComponent(bc.retest_trace_id)}" class="font-mono text-xs text-brand-600 bg-slate-50 px-2 py-1 rounded border border-slate-200 inline-block hover:text-brand-700">${escapeHtml(bc.retest_trace_id)}</a>
                </div>
              ` : ''}
            </div>
          </div>
        `;
      }

      async function loadDetail() {
        try {
          await loadAgentsList();
          const data = await apiGet(`/api/badcases/${id}`);
          const bc = data.badcase || data;
          allowed = new Set(bc.allowed_actions || []);
          isTerminal = bc.is_terminal;
          category = bc.category || 'pending';
          const headerStatus = $('#badcase-detail-header-status');
          if (headerStatus) {
            const appliedHint = bc.last_applied_at ? ` · 修复应用时间：${formatTimeLabel(bc.last_applied_at)}` : '';
            const retestHint = bc.last_retest_at ? ` · 最近复测时间：${formatTimeLabel(bc.last_retest_at)}` : '';
            headerStatus.innerHTML = `状态：${statusBadge(bc.status)} <span class="text-slate-700 font-medium">${escapeHtml(bc.status_label || '')}</span>${appliedHint}${retestHint}`;
          }
          const kDrafts = bc.knowledge_drafts || [];
          const sDrafts = bc.skill_prompt_drafts || [];
          const cDrafts = bc.capability_gap_drafts || [];
          const darwinParsed = bc.darwin_analysis_parsed || parseDarwin(bc.darwin_analysis);

          const categoryDraftMap = {
            knowledge_gap: { label: '提取知识草稿', action: 'extract-knowledge', path: `/api/badcases/${id}/extract-knowledge` },
            skill_prompt: { label: '生成 Skill/Prompt 草稿', action: 'darwin-fix', path: `/api/badcases/${id}/darwin-fix` },
            mcp_capability: { label: '记录能力缺口草稿', action: 'darwin-fix', path: `/api/badcases/${id}/darwin-fix` },
            routing: { label: '生成修复计划草稿', action: 'darwin-fix', path: `/api/badcases/${id}/darwin-fix` },
            response_quality: { label: '生成修复计划草稿', action: 'darwin-fix', path: `/api/badcases/${id}/darwin-fix` }
          };
          const catDraft = categoryDraftMap[category];

          function actionBtn(label, actionId, opts = {}) {
            const { cls = 'w-full px-4 py-2 bg-brand-600 hover:bg-brand-700 text-white rounded-xl text-sm transition-colors', id = null, disabledTitle = '当前状态不可执行该操作' } = opts;
            const hasAction = allowed.has(actionId);
            const btnId = id ? ` id="${id}"` : '';
            return `<button type="button"${btnId} class="${cls}" ${hasAction ? '' : `disabled title="${disabledTitle}"`}>${escapeHtml(label)}</button>`;
          }

          let actionButtonsHtml = '';
          if (isTerminal) {
            actionButtonsHtml = `<p class="text-xs text-slate-500 mt-3">该 Badcase 已${bc.status === 'rejected' ? '驳回' : '关闭'}，不可继续操作。</p>`;
          } else if (bc.status === 'pending') {

    async function renderCostGovernancePage(container) {
      container.innerHTML = loadingState();

      const state = {
        filters: { start: '', end: '', model: '', agent: '', intent: '', stage: '', search: '', groupBy: 'model' },
        overview: null,
        traces: [],
        trends: [],
        distribution: [],
        prices: [],
        budget: {},
        costCases: [],
      };

      function fmtDate(d) {
        if (!d) return '';
        const date = new Date(d);
        if (isNaN(date.getTime())) return d;
        return date.toISOString().slice(0, 10);
      }
      function fmtTime(d) {
        if (!d) return '';
        return formatTimeLabel(d);
      }
      function fmtCost(v) {
        if (v === null || v === undefined) return '未配置价格';
        return '¥' + Number(v).toFixed(6);
      }
      function fmtContextTokens(v) {
        if (v === null || v === undefined || v === 0) return '不可得';
        return Number(v).toLocaleString();
      }
      function fmtTokens(v) {
        if (v === null || v === undefined) return '-';
        return Number(v).toLocaleString();
      }
      function sourceBadge(src) {
        if (src === 'provider_reported') return '<span class="px-1.5 py-0.5 bg-green-50 text-green-600 rounded text-[10px]">Provider账单</span>';
        if (src === 'estimated_tokenization') return '<span class="px-1.5 py-0.5 bg-amber-50 text-amber-600 rounded text-[10px]">本地估算</span>';
        return '<span class="px-1.5 py-0.5 bg-slate-100 text-slate-500 rounded text-[10px]">未知</span>';
      }
      function statusBadgeSmall(s) {
        if (s === 'success') return '<span class="text-green-600">成功</span>';
        if (s === 'failed') return '<span class="text-red-600">失败</span>';
        return '<span class="text-slate-500">' + escapeHtml(s || '-') + '</span>';
      }

      async function loadAll() {
        const params = new URLSearchParams();
        if (state.filters.start) params.append('start', state.filters.start);
        if (state.filters.end) params.append('end', state.filters.end);
        if (state.filters.model) params.append('model_id', state.filters.model);
        if (state.filters.stage) params.append('stage', state.filters.stage);
        if (state.filters.search) params.append('trace_id', state.filters.search);
        const qs = params.toString() ? '?' + params.toString() : '';
        const [overview, traces, trends, distribution, prices, budget] = await Promise.all([
          apiGet(`/api/observability/overview${qs}`).catch(() => ({})),
          apiGet(`/api/observability/traces${qs}`).catch(() => ({ traces: [] })),
          apiGet(`/api/observability/trends${qs}`).catch(() => ({ items: [] })),
          apiGet(`/api/observability/distribution?group_by=${state.filters.groupBy}${state.filters.start ? '&start=' + state.filters.start : ''}${state.filters.end ? '&end=' + state.filters.end : ''}${state.filters.model ? '&model_id=' + state.filters.model : ''}`).catch(() => ({ items: [] })),
          apiGet('/api/observability/prices').catch(() => ({ prices: [] })),
          apiGet('/api/observability/budget').catch(() => ({ budget: {} })),
        ]);
        state.overview = overview;
        state.traces = traces.traces || [];
        state.traceRange = { start: traces.start || state.filters.start, end: traces.end || state.filters.end };
        state.trends = trends.items || [];
        state.distribution = distribution.items || [];
        state.prices = prices.prices || [];
        state.budget = budget.budget || {};
      }

      function renderOverview() {
        const o = state.overview || {};
        const alerts = (o.alerts || []).map(a => `<span class="px-2 py-1 rounded-lg text-xs ${a.type === 'daily' ? 'bg-red-100 text-red-700' : 'bg-amber-100 text-amber-700'}">${a.type === 'daily' ? '每日' : '单次'}预警：阈值 ¥${a.threshold}，实际 ¥${a.actual}</span>`).join('');
        const priceMissingWarning = o.price_missing ? `<div class="mt-3 p-3 bg-amber-50 border border-amber-200 rounded-xl text-xs text-amber-700 flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>部分模型调用缺少价格配置，成本显示为“未配置价格”。请先到下方“模型价格表”补全价格。</div>` : '';

        function periodCard(label, p) {
          const usage = p && typeof p.budget_usage_percent === 'number' ? `${p.budget_usage_percent.toFixed(2)}%` : '-';
          const usageBar = p && typeof p.budget_usage_percent === 'number' ? `
            <div class="w-full h-1.5 bg-slate-100 rounded-full mt-2 overflow-hidden">
              <div class="h-full ${p.budget_usage_percent >= 80 ? 'bg-red-500' : 'bg-brand-500'}" style="width: ${Math.min(100, p.budget_usage_percent)}%"></div>
            </div>
          ` : '';
          return `
            <div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-4">
              <div class="text-[11px] text-slate-500 mb-1">${label}</div>
              <div class="text-lg font-semibold text-slate-900">${fmtTokens(p ? p.total_tokens : null)}</div>
              <div class="text-[11px] text-slate-500 mt-1">估算成本 ${fmtCost(p ? p.estimated_cost_cny : null)}</div>
              <div class="mt-2 text-[10px] text-slate-400 flex flex-col gap-0.5">
                <span>Provider 账单 Token：${fmtTokens(p ? p.provider_reported_tokens : null)}</span>
                <span>本地估算 Token：${fmtTokens(p ? p.local_estimated_tokens : null)}</span>
                <span>预算使用：${usage}</span>
              </div>
              ${usageBar}
            </div>
          `;
        }

        return `
          <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3">
            <div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-4">
              <div class="text-[11px] text-slate-500">今日调用次数</div>
              <div class="text-xl font-semibold text-slate-900 mt-1">${Number(o.calls || 0).toLocaleString()}</div>
            </div>
            <div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-4">
              <div class="text-[11px] text-slate-500">今日总 Token</div>
              <div class="text-xl font-semibold text-slate-900 mt-1">${fmtTokens(o.total_tokens)}</div>

      async function showTraceDetail(traceId) {
        try {
          const data = await apiGet(`/api/observability/traces/${traceId}`);
          const trace = data.trace || {};
          const modelCalls = data.model_calls || [];
          const mcpCalls = data.mcp_calls || [];
          const breakdown = data.context_breakdown || {};
          const totalCost = modelCalls.reduce((sum, c) => sum + (c.estimated_cost_cny || 0), 0);
          const totalTokens = modelCalls.reduce((sum, c) => sum + (c.total_tokens || 0), 0);
          const callsHtml = modelCalls.map(c => {
            const formula = c.formula || (
              `cost = input_tokens * input_price + output_tokens * output_price + reasoning_tokens * reasoning_price - cached_tokens * cached_discount`
            );
            const formulaDetail = [
              c.input_price_per_1m ? `输入价 ¥${c.input_price_per_1m}/M` : null,
              c.output_price_per_1m ? `输出价 ¥${c.output_price_per_1m}/M` : null,
              c.reasoning_price_per_1m ? `推理价 ¥${c.reasoning_price_per_1m}/M` : null,
              c.cached_input_price_per_1m ? `缓存价 ¥${c.cached_input_price_per_1m}/M` : null
            ].filter(Boolean).join(' · ') || '价格未配置';
            return `
            <div class="border border-slate-200 rounded-xl p-3 mb-2 text-sm">
              <div class="flex items-center justify-between mb-1">
                <span class="font-medium text-slate-900">${escapeHtml(c.stage)} · ${escapeHtml(c.model_id)}</span>
                <span class="text-xs">${statusBadgeSmall(c.status)} · ${sourceBadge(c.usage_source)}</span>
              </div>
              <div class="text-xs text-slate-500">耗时 ${c.latency_ms || 0}ms · 模型选择原因：${escapeHtml(c.model_selection_reason || '-')}</div>
              <div class="text-xs text-slate-500 mt-1">Token: 输入 ${fmtTokens(c.input_tokens)} / 输出 ${fmtTokens(c.output_tokens)} / 推理 ${fmtTokens(c.reasoning_tokens)} / 缓存 ${fmtTokens(c.cached_tokens)} / 总计 ${fmtTokens(c.total_tokens)}</div>
              <div class="text-xs text-slate-700 mt-1">估算成本：${fmtCost(c.estimated_cost_cny)}</div>
              <details class="mt-2">
                <summary class="text-xs text-brand-600 cursor-pointer hover:text-brand-700">成本计算公式</summary>
                <div class="mt-1 p-2 bg-slate-50 rounded-lg border border-slate-200">
                  <div class="text-xs text-slate-700 font-mono">${escapeHtml(formula)}</div>
                  <div class="text-[10px] text-slate-500 mt-1">${escapeHtml(formulaDetail)}</div>
                </div>
              </details>
              ${c.error_summary ? `<div class="text-xs text-red-600 mt-1">错误：${escapeHtml(c.error_summary)}</div>` : ''}
            </div>
          `;}).join('');
          const mcpHtml = mcpCalls.length ? mcpCalls.map(c => `
            <div class="border border-slate-200 rounded-xl p-3 mb-2 text-sm">
              <div class="flex items-center justify-between mb-1">
                <span class="font-medium text-slate-900">[${escapeHtml(c.server_name)}] ${escapeHtml(c.tool_name)}</span>
                <span class="text-xs">${statusBadgeSmall(c.status)} · ${c.latency_ms || 0}ms</span>
              </div>
              <div class="text-xs text-slate-500">参数：${escapeHtml(JSON.stringify(c.arguments || {}))}</div>
              ${c.result_summary ? `<div class="text-xs text-slate-600 mt-1 bg-slate-50 rounded p-1.5">结果摘要：${escapeHtml(c.result_summary)}</div>` : ''}
              ${c.error_summary ? `<div class="text-xs text-red-600 mt-1">错误：${escapeHtml(c.error_summary)}</div>` : ''}
            </div>
          `).join('') : '<p class="text-sm text-slate-400">无 MCP 调用</p>';
          const breakdownHtml = `
            <div class="text-sm text-slate-600 space-y-1">
              <div class="flex justify-between"><span>system prompt</span><span>${fmtContextTokens(breakdown.system_prompt_tokens)}</span></div>
              <div class="flex justify-between"><span>history（历史消息）</span><span>${fmtContextTokens(breakdown.history_tokens)}</span></div>
              <div class="flex justify-between"><span>skill</span><span>${fmtContextTokens(breakdown.skill_tokens)}</span></div>
              <div class="flex justify-between"><span>rag</span><span>${fmtContextTokens(breakdown.rag_tokens)}</span></div>
              <div class="flex justify-between"><span>tool_result</span><span>${fmtContextTokens(breakdown.tool_result_tokens)}</span></div>
              <div class="flex justify-between"><span>user_message</span><span>${fmtContextTokens(breakdown.user_message_tokens)}</span></div>
              <p class="text-[11px] text-amber-600 mt-2">本地上下文估算，不等于 Provider 原始账单</p>
            </div>
          `;
          const html = `
            <div class="space-y-4">
              <div class="bg-slate-50 rounded-xl p-3 border border-slate-200 text-sm">
                <div><span class="text-slate-500">trace_id:</span> <span class="font-mono">${escapeHtml(traceId)}</span></div>
                <div><span class="text-slate-500">session_id:</span> <span class="font-mono">${escapeHtml(trace.session_id || '-')}</span></div>
                <div><span class="text-slate-500">用户问题：</span>${escapeHtml(trace.user_message || '-')}</div>
              </div>
              <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                <div class="bg-white rounded-xl border border-slate-200 p-3"><div class="text-[11px] text-slate-500">当前轮总 Token</div><div class="text-lg font-semibold">${fmtTokens(totalTokens)}</div></div>
                <div class="bg-white rounded-xl border border-slate-200 p-3"><div class="text-[11px] text-slate-500">当前轮估算成本</div><div class="text-lg font-semibold">${fmtCost(totalCost)}</div></div>
                <div class="bg-white rounded-xl border border-slate-200 p-3"><div class="text-[11px] text-slate-500">RAG 命中分片数</div><div class="text-lg font-semibold">${(data.messages || []).filter(m => m.role === 'assistant' && m.citations).reduce((s, m) => s + (m.citations || []).length, 0)}</div></div>
              </div>
              <div><h4 class="font-medium text-slate-900 mb-2">模型调用</h4>${callsHtml || '<p class="text-sm text-slate-400">无模型调用记录</p>'}</div>
              <div><h4 class="font-medium text-slate-900 mb-2">MCP 工具审计</h4>${mcpHtml}</div>
              <div><h4 class="font-medium text-slate-900 mb-2">输入上下文构成估算</h4>${breakdownHtml}</div>
            </div>
          `;
          openModal('单次调用账单', html, null, '关闭');
        } catch (err) {
          showToast('加载 Trace 详情失败', 'error');
        }
      }

        const body = `

            ${formInput('模型', 'price-model', price ? price.model_id : '', '例如 deepseek-v4-flash')}

            ${formInput('缓存输入 Token 单价', 'price-cached', price ? (price.cached_input_price_per_1m ?? '') : '', '', 'number')}
            ${formInput('输出 Token 单价', 'price-output', price ? (price.output_price_per_1m ?? '') : '', '', 'number')}
            ${formInput('推理 Token 单价', 'price-reasoning', price ? (price.reasoning_price_per_1m ?? '') : '', '', 'number')}
            ${formInput('价格来源备注', 'price-note', price ? (price.source_note || '') : '', '例如 自购 Gateway 账单')}

              await apiPatch(`/api/agents/${agentId}`, { enabled });

      async function openAgentModal(agent = null) {
        const isEdit = !!agent;
        const isSeededRouter = isEdit && agent.agent_id === 'router' && agent.is_router;
        const title = isEdit ? (isSeededRouter ? 'Agent 详情' : '编辑 Agent') : '新增 Agent';
        let skills = [];
        let mcpTools = [];
        try {
          const [skillsData, mcpData] = await Promise.all([apiGet('/api/skills'), apiGet('/api/mcp-servers')]);
          skills = (skillsData.skills || []).map(s => ({ value: s.name, label: `${s.name} (${s.category || '未分类'})` }));
          // Bindings are stored at MCP Server level (tool_name = server name).  Only
          // enabled servers with at least one successfully discovered tool are shown
          // as bindable; disabled / test / tool-less servers are hidden by default.
          const toolPromises = (mcpData.mcp_servers || [])
            .filter(serv => serv.enabled)
            .map(async serv => {
              const tools = serv.tools || (await apiGet(`/api/mcp-servers/${serv.id}/tools`)).tools || [];
              if (!tools.length) return null;
              const toolDescs = tools.map(t => `${t.name}${t.description ? '：' + t.description : ''}`).join('；');
              return { value: serv.name, label: `${serv.name}（${toolDescs}）` };
            });
          mcpTools = (await Promise.all(toolPromises)).filter(Boolean);
        } catch (err) {
          console.error('加载 Agent 选项失败', err);
        }

        // Build router members section when viewing the seeded router.
        let routerMembersHtml = '';
        if (isSeededRouter) {
          const members = cachedAgents.filter(a => !a.is_router && a.enabled);
          routerMembersHtml = `
            <div class="mt-5">
              <h4 class="text-sm font-semibold text-slate-900 mb-2">当前路由成员</h4>
              ${members.length === 0 ? '<p class="text-xs text-slate-400">暂无启用的垂直 Agent</p>' : `
              <div class="space-y-2 max-h-64 overflow-y-auto pr-1">

                    <div class="text-xs text-slate-600 space-y-0.5">
                      <div><span class="text-slate-400">绑定 Skill：</span>${(m.available_skills || []).length ? escapeHtml((m.available_skills || []).join('、')) : '无'}</div>
