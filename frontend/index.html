                    </div>
                  </div>
                `).join('')}
              </div>`}
            </div>
          `;
        }

        let body;
        if (isSeededRouter) {
          body = `
            <div class="space-y-4 text-sm">
              <div class="bg-slate-50 rounded-xl p-3 border border-slate-200">

                <div class="flex justify-between mb-1"><span class="text-slate-500">agent_id</span><span class="font-mono text-slate-700">${escapeHtml(agent.agent_id)}</span></div>
                <div class="flex justify-between mb-1"><span class="text-slate-500">类型</span><span class="text-xs px-2 py-0.5 rounded-full bg-indigo-50 text-indigo-600">路由</span></div>
                <div class="flex justify-between mb-1"><span class="text-slate-500">状态</span><span>${agent.enabled ? '启用' : '禁用'}</span></div>
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">描述</label>
                <p class="text-slate-600 whitespace-pre-line">${escapeHtml(agent.description || '-')}</p>
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">System Prompt</label>
                <div class="bg-slate-50 rounded-xl p-3 border border-slate-200 text-slate-700 whitespace-pre-line text-xs leading-relaxed">${escapeHtml(agent.system_prompt || '-')}</div>
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">绑定 Skill</label>
                <p class="text-slate-600">${(agent.available_skills || []).length ? escapeHtml((agent.available_skills || []).join('、')) : '无'}</p>
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">绑定 MCP Server</label>
                <p class="text-slate-600">${(agent.available_mcp_tools || []).length ? escapeHtml((agent.available_mcp_tools || []).join('、')) : '无'}</p>
              </div>
              ${routerMembersHtml}
            </div>
          `;
          openModal(title, body, null, '关闭');
          return;
        }

        body = `
          ${formInput('名称', 'agent-name', agent ? agent.name : '', '如：维修报修 Agent')}
          ${formInput('描述', 'agent-description', agent ? agent.description : '', '简短描述 Agent 职责')}
          ${formTextarea('System Prompt', 'agent-system-prompt', agent ? agent.system_prompt : '', '定义该 Agent 的系统提示词', 5)}
          ${isEdit ? formSwitch('路由 Agent (is_router)', 'agent-is-router', agent ? agent.is_router : false) : ''}
          ${formCheckboxGroup('可用 Skill', 'agent-skills', skills, agent ? agent.available_skills : [])}
          ${formCheckboxGroup('可用 MCP Server（展开查看可调用工具）', 'agent-mcp-tools', mcpTools, agent ? agent.available_mcp_tools : [])}
        `;
        openModal(title, body, async () => {
          const payload = {
            name: $('#agent-name').value.trim(),
            description: $('#agent-description').value.trim(),
            system_prompt: $('#agent-system-prompt').value.trim(),
            available_skills: Array.from(document.querySelectorAll('input[name="agent-skills"]:checked')).map(cb => cb.value),
            available_mcp_tools: Array.from(document.querySelectorAll('input[name="agent-mcp-tools"]:checked')).map(cb => cb.value),
            enabled: true
          };
          if (isEdit) {
            payload.is_router = $('#agent-is-router') ? $('#agent-is-router').checked : agent.is_router;
          }
          if (!payload.name || !payload.system_prompt) {
            showToast('名称和 System Prompt 不能为空', 'error');
            return;
          }
          try {
            if (isEdit) {
              await apiPut(`/api/agents/${agent.id}`, payload);
              showToast('Agent 已更新');
            } else {
              await apiPost('/api/agents', payload);
              showToast('Agent 已创建');
            }
            closeModal();
            await loadAgents();
          } catch (err) {
            showToast('保存失败，请重试', 'error');
          }
        });
      }

      async function editAgent(agentId) {
        try {
          const data = await apiGet(`/api/agents/${agentId}`);
          openAgentModal(data.agent);

          showToast('加载 Agent 失败', 'error');

          await apiDelete(`/api/agents/${agentId}`);
          showToast('Agent 已删除');
          await loadAgents();

          showToast('删除失败，请重试', 'error');
        }

      await loadAgents();

      function renderAbModelResult(result) {
        if (!result) return '<span class="text-slate-400">无输出</span>';
        if (result.error) {
          return `<div class="text-red-600 text-sm"><span class="font-medium">错误：</span>${escapeHtml(result.error)}</div>`;
        }
        return `<div class="text-sm text-slate-700 whitespace-pre-wrap">${escapeHtml(result.response || '无输出')}</div>`;
      }

      $('#ab-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const prompt = $('#ab-query').value.trim();
        if (!prompt) {
          showToast('请输入测试问题', 'error');
          return;
        }
        $('#ab-results').classList.add('hidden');
        $('#ab-output-a').innerHTML = '<span class="text-slate-400">生成中...</span>';
        $('#ab-output-b').innerHTML = '<span class="text-slate-400">生成中...</span>';
        try {
          const start = performance.now();
          const data = await apiPost('/api/models/ab-test', { prompt, model_a: 'deepseek-v4-flash', model_b: 'deepseek-v4-pro' });
          const elapsed = (performance.now() - start).toFixed(0);
          const modelA = data.model_a || {};
          const modelB = data.model_b || {};
          $('#ab-output-a').innerHTML = renderAbModelResult(modelA);
          $('#ab-output-b').innerHTML = renderAbModelResult(modelB);
          const costEstimateA = modelA.error ? '-' : '待人工记录';
          const costEstimateB = modelB.error ? '-' : '待人工记录';
          $('#ab-metrics').innerHTML = `
            <span>本次并发总耗时：${elapsed} ms（浏览器测得）</span>
            <span class="mx-2">|</span>
            <span>模型 A 成本：${costEstimateA}（人工记录项）</span>
            <span class="mx-2">|</span>
            <span>模型 B 成本：${costEstimateB}（人工记录项）</span>
          `;
          $('#ab-results').classList.remove('hidden');
        } catch (err) {
          showToast('测试运行失败：' + err.message, 'error');
        }
      });

      $$('.ab-score-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          showToast('人工记录已记：' + (btn.dataset.winner === 'tie' ? '两者差不多' : (btn.dataset.winner === 'a' ? '模型 A 更好' : '模型 B 更好')), 'success');
        });
      });
    }

          showToast('删除失败，请重试', 'error');

      async function exportSkill(skillId) {
        try {
          const res = await fetch(`${API_BASE}/api/skills/${skillId}/export`);
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `skill-${skillId}.zip`;
          a.click();
          URL.revokeObjectURL(url);
          showToast('Skill 导出成功');
        } catch (err) {
          showToast('导出失败', 'error');
        }
      }

          const body = `

              <div class="flex gap-2">

            const input = $('#skill-file-input');
            if (!input.files || input.files.length === 0) return;
            const form = new FormData();
            form.append('file', input.files[0]);
            try {
              const res = await fetch(`${API_BASE}/api/skills/${skillId}/files`, { method: 'POST', body: form });
              if (!res.ok) throw new Error('HTTP ' + res.status);
              showToast('上传成功');
              closeModal();
              await manageSkillFiles(skillId);
            } catch (err) {
              showToast('上传失败', 'error');

              try {

                closeModal();
                await manageSkillFiles(skillId);
              } catch (err) {
                showToast('删除失败', 'error');

          showToast('加载文件失败', 'error');
        }

          </div>

          const gitUrl = $('#skill-import-git').value.trim();
          const zipInput = $('#skill-import-zip');
          try {
            if (gitUrl) {
              await apiPost('/api/skills/import-git', { git_url: gitUrl });

            } else if (zipInput.files && zipInput.files.length > 0) {

              showToast('Zip 导入成功');

            await loadSkills();

            showToast('导入失败', 'error');

      $('#skill-import-btn').addEventListener('click', openImportModal);

          ${formInput('参数 (JSON 数组)', 'mcp-args', server ? JSON.stringify(server.args || []) : '[]', '如：["-m", "mcp_server_weather"]')}
          ${formInput('环境变量 (JSON 对象)', 'mcp-env', server ? JSON.stringify(server.env || {}) : '{}', '如：{"API_KEY": "xxx"}')}
          ${formInput('描述', 'mcp-description', server ? server.description : '', '描述该 MCP Server 用途')}
          ${formSwitch('启用', 'mcp-enabled', server ? server.enabled : true)}
        `;
        openModal(title, body, async () => {
          let args, env;
          try {
            args = JSON.parse($('#mcp-args').value.trim() || '[]');
            env = JSON.parse($('#mcp-env').value.trim() || '{}');
          } catch (e) {
            showToast('参数或环境变量 JSON 格式错误', 'error');
            return;
          }
          const payload = {
            name: $('#mcp-name').value.trim(),
            command: $('#mcp-command').value.trim(),
            args: args,
            env: env,
            description: $('#mcp-description').value.trim(),
            enabled: $('#mcp-enabled').checked
          };
          if (!payload.name) {
            showToast('名称不能为空', 'error');
            return;
          }
          try {
            if (isEdit) {
              await apiPut(`/api/mcp-servers/${server.id}`, payload);
              showToast('MCP Server 已更新');
            } else {
              await apiPost('/api/mcp-servers', payload);
              showToast('MCP Server 已创建');
            }
            closeModal();
            await loadMcpServers();
          } catch (err) {
            showToast('保存失败，请重试', 'error');
          }
        });
      }

      async function viewMcpTools(serverId) {
        try {
          const data = await apiGet(`/api/mcp-servers/${serverId}/tools`);
          const server = data.mcp_server || {};
          const tools = data.tools || [];
          const body = tools.length === 0
            ? '<p class="text-sm text-slate-500">该 MCP Server 暂未返回工具列表。</p>'
            : `<div class="space-y-3">${tools.map(t => `
                <div class="bg-slate-50 rounded-xl p-3 border border-slate-200">
                  <div class="flex items-center justify-between mb-1">
                    <span class="text-sm font-medium text-slate-900">${escapeHtml(t.name)}</span>
                    <span class="text-xs px-2 py-0.5 bg-brand-50 text-brand-600 rounded-full">${escapeHtml(t.type || 'tool')}</span>
                  </div>
                  <p class="text-xs text-slate-600 mb-2">${escapeHtml(t.description || '暂无描述')}</p>
                  ${t.parameters ? `<pre class="text-[10px] bg-white rounded-lg p-2 border border-slate-200 overflow-x-auto">${escapeHtml(JSON.stringify(t.parameters, null, 2))}</pre>` : ''}
                </div>
              `).join('')}</div>`;
          openDrawer(`${escapeHtml(server.name || 'MCP Server')} 工具列表`, body);
        } catch (err) {
          showToast('加载工具列表失败', 'error');
        }
      }

      async function editMcpServer(serverId) {
        try {
          const data = await apiGet(`/api/mcp-servers/${serverId}`);
          openMcpModal(data.mcp_server);
        } catch (err) {
          showToast('加载 MCP Server 失败', 'error');
        }
      }

      async function deleteMcpServer(serverId) {
        if (!confirm('确定要删除这个 MCP Server 吗？')) return;
        try {
          await apiDelete(`/api/mcp-servers/${serverId}`);
          showToast('MCP Server 已删除');
          await loadMcpServers();
        } catch (err) {
          showToast('删除失败，请重试', 'error');
        }
      }

      $('#mcp-add-btn').addEventListener('click', () => openMcpModal());
      await loadMcpServers();
    }

    // ==========================================
    // Helpers
    // ==========================================
    function escapeHtml(text) {
      if (text == null) return '';
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function openSidebar() {
      STATE.sidebarOpen = true;
      $('#sidebar').classList.remove('-translate-x-full');
      $('#sidebar-overlay').classList.remove('hidden');
    }

    function closeSidebar() {
      STATE.sidebarOpen = false;
      $('#sidebar').classList.add('-translate-x-full');
      $('#sidebar-overlay').classList.add('hidden');
    }

    // ==========================================
    // Initialization
    // ==========================================
    async function init() {
      try {
        // Restore persisted chat session so history survives reloads/tab switches.
        try {
          const savedSession = localStorage.getItem('chatSessionId');
          if (savedSession) STATE.chatSessionId = savedSession;
        } catch (e) {}

        ['#main-content', '#sub-menu', '#role-title'].forEach(sel => requireElement(sel, 'init'));
        const versionEl = $('#app-version');
        if (versionEl) versionEl.textContent = APP_VERSION;
        renderTopTabs();
        renderSidebar();
        await renderContent();

        $$('.top-tab, .top-tab-mobile').forEach(btn => {
          btn.addEventListener('click', async () => {
            try {
              STATE.topTab = btn.dataset.top;
              const firstSub = MENU[STATE.topTab][0].id;
              STATE.subTab = firstSub;
              renderTopTabs();
              renderSidebar();
              await renderContent();
              if (window.innerWidth < 768) openSidebar();
            } catch (err) {
              displayRenderError(err, `切换 ${btn.dataset.top} 标签`);
            }
          });
        });

        $('#mobile-menu-btn').addEventListener('click', () => {
          if (STATE.sidebarOpen) closeSidebar();
          else openSidebar();
        });

        $('#sidebar-overlay').addEventListener('click', closeSidebar);

        window.addEventListener('resize', () => {
          if (window.innerWidth >= 768) closeSidebar();
        });
      } catch (err) {
        displayRenderError(err, '初始化');
        throw err;
      }
    }

    document.addEventListener('DOMContentLoaded', () => init().catch(err => displayRenderError(err, '启动')));
  </script>
</body>
</html>
