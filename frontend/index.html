    function $(selector) { return document.querySelector(selector); }
    function $$(selector) { return document.querySelectorAll(selector); }

    function requireElement(selector, context = '') {
      const el = $(selector);
      if (!el) throw new Error(`渲染失败：缺少必要 DOM 元素 "${selector}"${context ? ' (' + context + ')' : ''}`);
      return el;
    }

    function displayRenderError(err, context = '') {
      console.error(`[${context || 'frontend'}] 渲染失败:`, err);
      const main = document.getElementById('main-content');
      if (!main) return;
      const msg = err && err.message ? err.message : String(err);
      main.innerHTML = `
        <div class="min-h-screen flex items-center justify-center p-6 fade-in">
          <div class="max-w-md w-full bg-white rounded-2xl shadow-soft border border-slate-200 p-8 text-center">

            </div>
            <h2 class="text-lg font-semibold text-slate-800 mb-2">页面加载失败</h2>
            ${context ? `<p class="text-sm text-slate-500 mb-2">${escapeHtml(context)}</p>` : ''}
            <pre class="text-xs text-left bg-slate-50 p-3 rounded-lg text-red-600 overflow-auto max-h-32 mb-6">${escapeHtml(msg)}</pre>
            <button onclick="location.reload()" class="px-4 py-2 bg-brand-600 hover:bg-brand-700 text-white rounded-lg transition-colors">刷新重试</button>
          </div>
        </div>`;
    }

    function showToast(message, type = 'success') {
      const toast = $('#toast');
      const icon = type === 'success'
        ? '<svg class="w-5 h-5 text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>'
        : '<svg class="w-5 h-5 text-gold-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';
      $('#toast-icon').innerHTML = icon;

    async function parseApiError(res) {
      let detail = null;
      try {
        const data = await res.json();
        detail = data.detail || data.message || data.error || (typeof data === 'string' ? data : null);
        if (detail && typeof detail === 'object') {
          detail = detail.message
            ? `${detail.message}${detail.detail ? `：${detail.detail}` : ''}`
            : JSON.stringify(detail);
        }
      } catch (e) {
        try {
          detail = await res.text();
        } catch (e2) {
          detail = null;
        }
      }
      return detail || `HTTP ${res.status}`;
    }

    async function apiGet(url) {
      try {
        const res = await fetch(`${API_BASE}${url}`);
        if (!res.ok) throw new Error(await parseApiError(res));
        return await res.json();
      } catch (err) {
        console.error('API GET error:', err);
        throw err;
      }
    }

          method: 'POST',

          body: JSON.stringify({ session_id: STATE.chatSessionId, message_id: messageId, type, reason })

    // ==========================================
    // UI Rendering
    // ==========================================
    function renderTopTabs() {
      $$('.top-tab, .top-tab-mobile').forEach(btn => {
        const tab = btn.dataset.top;
        const active = tab === STATE.topTab;
        if (btn.classList.contains('top-tab')) {
          if (active) {
            btn.className = 'top-tab px-4 py-2 rounded-lg text-sm font-medium transition-all bg-brand-600 text-white shadow-md';
          } else {
            btn.className = 'top-tab px-4 py-2 rounded-lg text-sm font-medium transition-all text-slate-300 hover:text-white hover:bg-slate-700/60';
          }
        } else {
          if (active) {
            btn.className = 'top-tab-mobile whitespace-nowrap px-4 py-2 rounded-lg text-sm font-medium bg-brand-600 text-white shadow-md';
          } else {
            btn.className = 'top-tab-mobile whitespace-nowrap px-4 py-2 rounded-lg text-sm font-medium text-slate-300 bg-slate-800/60';
          }
        }
      });
    }

    function renderSidebar() {
      const role = ROLES[STATE.topTab];
      if (!role) throw new Error(`renderSidebar: 未知角色 "${STATE.topTab}"`);
      requireElement('#role-title', 'renderSidebar').textContent = role.title;
      requireElement('#role-subtitle', 'renderSidebar').textContent = role.subtitle;
      const avatar = requireElement('#role-avatar', 'renderSidebar');
      avatar.textContent = role.avatar;
      avatar.className = `w-10 h-10 rounded-full bg-gradient-to-br ${role.color} flex items-center justify-center text-white font-semibold shadow-lg`;

      const menu = MENU[STATE.topTab];
      if (!menu) throw new Error(`renderSidebar: 无菜单配置 "${STATE.topTab}"`);
      requireElement('#sub-menu', 'renderSidebar').innerHTML = menu.map(item => {
        const active = item.id === STATE.subTab;
        return `
          <button data-sub="${item.id}" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all ${active ? 'bg-brand-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}">
            <span class="${active ? 'text-white' : 'text-slate-400'}">${ICONS[item.icon]}</span>
            ${item.label}
          </button>
        `;
      }).join('');

      $$('#sub-menu button').forEach(btn => {
        btn.addEventListener('click', () => {
          const topTab = STATE.topTab;
          const subTab = btn.dataset.sub;
          queueNavigation(
            topTab,
            subTab,
            `切换 ${subTab} 页面`,
            window.innerWidth < 768
          );
        });
      });
    }

    async function renderContent() {
      const main = requireElement('#main-content', 'renderContent');
      main.innerHTML = '';
      main.scrollTop = 0;

      switch (STATE.subTab) {
        case 'chat': await renderChatPage(main); break;
        case 'my-orders': await renderMyOrdersPage(main); break;
        case 'work-orders': await renderStaffWorkOrdersPage(main); break;
        case 'handoff-orders': await renderHandoffPage(main); break;
        case 'runtime': await renderRuntimePage(main); break;
        case 'agents': await renderAgentsPage(main); break;
        case 'models': await renderModelsPage(main); break;
        case 'model-ab': await renderModelAbPage(main); break;
        case 'skills': await renderSkillsPage(main); break;
        case 'mcp': await renderMcpPage(main); break;
        case 'knowledge': await renderKnowledgePage(main); break;
        case 'badcases': await renderBadcasesPage(main); break;
        case 'badcase-detail': await renderBadcaseDetailPage(main); break;
        case 'evaluations': await renderEvaluationsPage(main); break;
        case 'cost-governance': await renderCostGovernancePage(main); break;
        case 'cost-strategy': await renderCostStrategyPage(main); break;
        default: throw new Error(`renderContent: 未知页面 "${STATE.subTab}"`);
      }
    }

    function queueNavigation(topTab, subTab, context = '', closeMobile = false) {
      navigationQueue = navigationQueue
        .catch(() => {})
        .then(async () => {
          if (!MENU[topTab]) throw new Error(`未知顶层标签 "${topTab}"`);
          if (!(MENU[topTab] || []).some(item => item.id === subTab)) {
            throw new Error(`标签 "${topTab}" 不包含页面 "${subTab}"`);
          }
          STATE.topTab = topTab;
          STATE.subTab = subTab;
          renderTopTabs();
          renderSidebar();
          await renderContent();
          if (closeMobile && window.innerWidth < 768) closeSidebar();
        });
      navigationQueue.catch(err => displayRenderError(err, context || '页面切换'));
      return navigationQueue;
    }

    function pageHeader(title, desc) {
      return `
        <div class="px-6 py-5 border-b border-slate-200 bg-white/60 backdrop-blur sticky top-0 z-10">
          <div class="max-w-6xl mx-auto">

            <p class="text-sm text-slate-500 mt-1">${desc}</p>
          </div>
        </div>

            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>

    // ==========================================
    // Chat Page
    // ==========================================
    function renderSessionListItems() {
      const sessions = STATE.chatSessions || [];
      const currentId = STATE.chatSessionId;
      const items = sessions.map(s => {
        const isActive = s.session_id === currentId;
        const title = escapeHtml(s.title || s.last_message_preview || '新会话');
        const time = formatTimeLabel(s.last_message_at || s.updated_at || s.created_at);
        const handoffMeta = {
          requested: ['待领取', 'bg-amber-100 text-amber-700'],
          active: ['人工中', 'bg-green-100 text-green-700'],
          waiting_user: ['待我补充', 'bg-blue-100 text-blue-700'],
          resolved: ['待确认', 'bg-slate-100 text-slate-700']
        }[s.handoff_status] || ['', ''];
        const handoffText = handoffMeta[0];
        const handoffClass = handoffMeta[1];
        const agentText = s.last_agent ? ` · ${escapeHtml(s.last_agent)}` : '';
        return `
          <button type="button" data-session-id="${escapeHtml(s.session_id)}" class="session-item w-full text-left px-3 py-2.5 rounded-xl transition-colors ${isActive ? 'bg-brand-50 border border-brand-200' : 'hover:bg-slate-100 border border-transparent'}">
            <div class="flex items-center justify-between gap-2">
              <span class="text-sm font-medium text-slate-800 truncate flex-1">${title}</span>

            </div>
            <div class="text-[11px] text-slate-400 mt-0.5 truncate">${time}${agentText}</div>

    function renderChatSessionsSidebar() {
      return `
        <div class="h-full flex flex-col w-64 border-r border-slate-200 bg-slate-50/80">
          <div class="p-3 border-b border-slate-200">
            <button type="button" id="chat-new-session" class="w-full flex items-center justify-center gap-2 px-3 py-2 bg-brand-600 hover:bg-brand-700 text-white text-sm font-medium rounded-xl transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>

            </button>

    function refreshSidebar() {
      const sidebar = $('#chat-session-list');
      if (!sidebar) return;
      sidebar.innerHTML = renderSessionListItems();
      sidebar.querySelectorAll('.session-item').forEach(btn => {
        btn.addEventListener('click', () => switchChatSession(btn.dataset.sessionId));
      });
    }

    async function loadChatSessions() {
      try {
        const data = await apiGet('/api/chat/sessions?user_id=web-user');
        STATE.chatSessions = data.sessions || [];
      } catch (err) {
        console.error('Load sessions failed:', err);
        STATE.chatSessions = [];
      }
    }

    async function createNewSession() {
      if (STATE.chatStreaming) {
        showToast('流式回复中，请稍后再新建会话', 'error');
        return;
      }
      try {
        const data = await apiPost('/api/chat/sessions?user_id=web-user', {});
        const session = data.session || {};
        STATE.chatSessionId = session.session_id || null;
        try { if (STATE.chatSessionId) localStorage.setItem('chatSessionId', STATE.chatSessionId); } catch (e) {}
        STATE.chatMessages = [];
        STATE.currentAiMessage = null;
        STATE.currentRoute = null;
        await loadChatSessions();
        await renderContent();
        const input = $('#chat-input');
        if (input) input.focus();
        showToast('已创建新会话', 'success');
      } catch (err) {
        console.error('createNewSession failed:', err);
        showToast('新建会话失败', 'error');
      }
    }

    async function switchChatSession(sessionId) {
      if (STATE.chatStreaming) {
        showToast('流式回复中，请稍后再切换', 'error');
        return;
      }
      if (!sessionId || sessionId === STATE.chatSessionId) return;
      STATE.chatSessionId = sessionId;
      try { localStorage.setItem('chatSessionId', sessionId); } catch (e) {}
      STATE.chatMessages = [];
      STATE.currentAiMessage = null;
      STATE.currentRoute = null;
      await loadChatSessions();
      renderContent();
    }

        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          form.dispatchEvent(new Event('submit'));
        }
      });

        e.preventDefault();
        const text = input.value.trim();
        if (!text) {
          showToast('请输入您的问题', 'error');
          return;
        }
        if (STATE.chatStreaming) return;
        input.value = '';
        input.style.height = 'auto';

          return;

        if (!confirm('确定要转接人工服务吗？')) return;
        try {
          const res = await fetch(`${API_BASE}/api/chat/handoff`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ session_id: STATE.chatSessionId, reason: '业主主动点击转人工按钮' })
          });

          updateHandoffBanner('requested');

        await loadChatSessions();
        refreshSidebar();
        await restoreChatMessages();
        showToast('会话已刷新', 'success');

      await loadChatSessions();
      refreshSidebar();

      if (newSessionBtn && !newSessionBtn.dataset.bound) {
        newSessionBtn.addEventListener('click', createNewSession);
        newSessionBtn.dataset.bound = '1';

    function updateHandoffBanner(status) {
      const banner = $('#chat-handoff-banner');
      if (!banner) return;
        const labels = {
          none: null,
          requested: { text: '已发起人工协同：等待工作人员领取', cls: 'bg-amber-100 text-amber-700' },
          active: { text: '人工协同处理中：AI 已停让，工作人员正在负责后续处理', cls: 'bg-green-100 text-green-700' },
          waiting_user: { text: '人工协同等待您补充信息：您下一条消息会同步给工作人员', cls: 'bg-blue-100 text-blue-700' },
          resolved: { text: '工作人员已给出处理结果：可继续与 AI 咨询，或由工作人员关闭本次协同', cls: 'bg-slate-100 text-slate-700' },
          closed: { text: '本次人工协同已关闭', cls: 'bg-slate-100 text-slate-600' },
          cancelled: { text: '本次人工协同已取消', cls: 'bg-slate-100 text-slate-600' }
        };
        const meta = labels[status] || null;
        const text = meta && meta.text;
      if (!text) {
        banner.classList.add('hidden');
        banner.innerHTML = '';
        return;
      }
        banner.classList.remove('hidden');
        banner.innerHTML = `<span class="inline-block px-3 py-1 rounded-full text-xs font-medium ${meta.cls}">${text}</span>`;
    }

    window.sendQuickQuestion = function(text) {

      input.focus();
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 128) + 'px';
    };

    function formatTimeLabel(isoString) {
      if (!isoString) return '';
      // Backend stores Beijing time as "YYYY-MM-DD HH:mm:ss" without timezone.
      // Treat bare datetime strings as +08:00 so the display is always Beijing time.
      let value = isoString;
      if (typeof value === 'string' && value.includes(' ') && !value.includes('T') && !value.match(/[Z+-]\d/)) {
        value = value.replace(' ', 'T') + '+08:00';
      }
      const date = new Date(value);
      if (isNaN(date.getTime())) return isoString;
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      const hours = String(date.getHours()).padStart(2, '0');
      const minutes = String(date.getMinutes()).padStart(2, '0');
      const seconds = String(date.getSeconds()).padStart(2, '0');
      return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
    }

    function stripThinking(content) {
      // Remove reasoning blocks like </think>...</think> or <think>...</think>
      return content.replace(/<\/?think>[\s\S]*?<\/?think>/g, '').trim();
    }

    function formatTokenDetail(detail) {
      if (!detail) return '';
      const parts = [];
      if (detail.input_tokens) parts.push(`输入 ${detail.input_tokens}`);
      if (detail.output_tokens) parts.push(`输出 ${detail.output_tokens}`);
      if (detail.reasoning_tokens) parts.push(`推理 ${detail.reasoning_tokens}`);
      if (detail.cached_tokens) parts.push(`缓存命中 ${detail.cached_tokens}`);
      if (detail.total_tokens) parts.push(`总计 ${detail.total_tokens}`);
      return parts.join(' · ');
    }

    function tokenUsageLabel(tokenCount, usageSource) {
      if (usageSource === 'not_applicable') return '规则工作流：未调用模型';
      if (!tokenCount) return '业务回答 Token：不可得';
      const prefix = usageSource === 'estimated_tokenization' ? '本地估算业务回答 Token' : '业务回答 Token';
      return `${prefix}：${tokenCount}`;
    }

    function roundTokenLabel(roundTokenCount, answerTokenCount) {
      const total = Number(roundTokenCount || 0);
      const answer = Number(answerTokenCount || 0);
      if (!total || total <= answer) return '';
      return `本轮累计 Token：${total}`;
    }

    function renderTokenUsage(tokenCount, roundTokenCount, tokenDetail, usageSource) {
      const mainText = tokenUsageLabel(tokenCount, usageSource);
      const roundText = roundTokenLabel(roundTokenCount, tokenCount);
      const detailParts = [formatTokenDetail(tokenDetail)];
      if (roundText) detailParts.push(`其中路由 Token：${Number(roundTokenCount) - Number(tokenCount || 0)}`);
      const detailText = detailParts.filter(Boolean).join(' · ');
      const label = roundText ? `${mainText} · ${roundText}` : mainText;
      return detailText
        ? `<span class="cursor-help underline decoration-dotted" title="${escapeHtml(detailText)}">${label}</span>`
        : label;
    }

    function normalizeCitationMarkers(content) {
      return String(content || '').replace(/【(?:参考)?引用\s*(\d+)】|\[(?:参考)?引用\s*(\d+)\]|[（(](?:参考)?引用\s*(\d+)[）)]/g, (_, a, b, c) => `【引用${a || b || c}】`);
    }

    function getUsedCitationIndices(content, maxCount) {
      const used = new Set();
      const normalized = normalizeCitationMarkers(content);
      const regex = /【引用(\d+)】/g;
      let match;
      while ((match = regex.exec(normalized)) !== null) {
        const index = parseInt(match[1], 10);
        if (index >= 1 && index <= maxCount) used.add(index);
      }
      return used;
    }

    function materializeCitationButtons(html, citations) {
      // marked's renderer callback differs between bundled versions.  Replace
      // citation markers once more after Markdown rendering so 【引用1】 is
      // always a real clickable control, never a decorative plain-text token.
      return String(html || '').replace(/【引用(\d+)】/g, (match, value) => {
        const index = Number(value);
        const citation = citations && citations[index - 1];
        if (!citation || (!citation.doc_id && !citation.evidence_id)) return match;
        const chunkIndex = typeof citation.chunk_index === 'number' ? citation.chunk_index : '';
        if (citation.evidence_id && (citation.content_snapshot || citation.content)) {
          registerCitationSnapshot(citation);
          return `<button type="button" class="inline-citation-btn px-1 py-0.5 mx-0.5 bg-brand-50 text-brand-700 rounded text-[11px] hover:bg-brand-100 transition-colors align-text-bottom" onclick="showCitationEvidence('${escapeHtml(citation.evidence_id)}')">引用${index}</button>`;
        }
        return `<button type="button" class="inline-citation-btn px-1 py-0.5 mx-0.5 bg-brand-50 text-brand-700 rounded text-[11px] hover:bg-brand-100 transition-colors align-text-bottom" onclick="showCitationChunk(${Number(citation.doc_id)}, '${escapeHtml(String(chunkIndex))}')">引用${index}</button>`;
      });
    }

    function renderMarkdownWithCitations(content, citations) {
      const safeContent = normalizeCitationMarkers(content);
      if (!citations || citations.length === 0) return marked.parse(safeContent);
      const renderer = new marked.Renderer();
      renderer.text = (token) => {
        const rawText = typeof token === 'string' ? token : (token && token.text ? token.text : '');
        return String(rawText).replace(/【引用(\d+)】/g, (match, value) => {
          const index = parseInt(value, 10);
          const citation = citations[index - 1];
          if (!citation || (!citation.doc_id && !citation.evidence_id)) return match;
          const chunkIndex = typeof citation.chunk_index === 'number' ? citation.chunk_index : '';
          if (citation.evidence_id && (citation.content_snapshot || citation.content)) {
            registerCitationSnapshot(citation);
            return `<button type="button" class="inline-citation-btn px-1 py-0.5 mx-0.5 bg-brand-50 text-brand-700 rounded text-[11px] hover:bg-brand-100 transition-colors align-text-bottom" onclick="showCitationEvidence('${escapeHtml(citation.evidence_id)}')">引用${index}</button>`;
          }
          return `<button type="button" class="inline-citation-btn px-1 py-0.5 mx-0.5 bg-brand-50 text-brand-700 rounded text-[11px] hover:bg-brand-100 transition-colors align-text-bottom" onclick="showCitationChunk(${Number(citation.doc_id)}, '${escapeHtml(String(chunkIndex))}')">引用${index}</button>`;
        });
      };
      return materializeCitationButtons(marked.parse(safeContent, { renderer }), citations);
    }

    function renderCitations(citations, content = '') {
      if (!citations || citations.length === 0) return '';
      const usedSet = getUsedCitationIndices(content, citations.length);
      const items = citations.map((citation, index) => ({ citation, index: index + 1 }));
      const used = items.filter(item => usedSet.has(item.index) || item.citation.used_in_answer === true);
      const candidates = items.filter(item => !usedSet.has(item.index) && item.citation.used_in_answer !== true);
      const renderItem = (item) => {
        const citation = item.citation;
        const scoreValue = citation.retrieval_score ?? citation.score;
        const score = typeof scoreValue === 'number' ? scoreValue.toFixed(3) : '-';
        const provenance = [
          citation.retrieval_sources?.length ? `召回：${citation.retrieval_sources.join('+')}` : '',
          citation.retrieval_paths?.length ? `路径：${citation.retrieval_paths.join('+')}` : '',
          citation.context_score != null ? `证据相关度：${Number(citation.context_score).toFixed(3)}` : ''
        ].filter(Boolean).join(' · ');
        const title = escapeHtml(citation.doc_title || '未知文档');
        const docId = Number(citation.doc_id || 0);
        const chunkIndex = typeof citation.chunk_index === 'number' ? citation.chunk_index : '';
        let click = docId ? `class="mt-1 cursor-pointer hover:text-brand-600 hover:underline" onclick="showCitationChunk(${docId}, '${escapeHtml(String(chunkIndex))}')"` : 'class="mt-1"';
        if (citation.evidence_id && (citation.content_snapshot || citation.content)) {
          registerCitationSnapshot(citation);
          click = `class="mt-1 cursor-pointer hover:text-brand-600 hover:underline" onclick="showCitationEvidence('${escapeHtml(citation.evidence_id)}')"`;
        }
        return `<li ${click}>[${item.index}] 《${title}》${chunkIndex !== '' ? ` · 分片 ${chunkIndex}` : ''}<span class="text-slate-400">（相关度 ${score}）</span>${provenance ? `<span class="block text-[9px] text-slate-400">${escapeHtml(provenance)}</span>` : ''}</li>`;
      };
      let html = '<div class="ai-message-citations mt-2 pt-2 border-t border-slate-100">';
      if (used.length) html += `<p class="text-[10px] text-slate-400 mb-1">回答中实际引用的证据</p><ol class="text-[10px] text-slate-500 list-decimal list-inside">${used.map(renderItem).join('')}</ol>`;
      if (candidates.length) html += `<details class="mt-2"><summary class="text-[10px] text-slate-400 cursor-pointer hover:text-slate-600 select-none">本轮检索候选（${candidates.length} 条未在回答中引用）</summary><ol class="text-[10px] text-slate-500 list-decimal list-inside mt-1">${candidates.map(renderItem).join('')}</ol></details>`;
      return html + '</div>';
    }

    const CITATION_SNAPSHOTS = {};

    function registerCitationSnapshot(citation) {
      if (citation && citation.evidence_id) CITATION_SNAPSHOTS[citation.evidence_id] = citation;
    }

    function showCitationEvidence(evidenceId) {
      const citation = CITATION_SNAPSHOTS[evidenceId];
      if (!citation) {
        showToast('该历史证据快照不可得；不会改为查询当前索引。', 'error');
        return;
      }
      const title = citation.doc_title || citation.title || '知识文档';
      const content = citation.content_snapshot || citation.content || '';
      const html = `<div class="bg-slate-50 rounded-xl p-3 border border-slate-200">
        <p class="text-xs text-slate-500 mb-2">Evidence ID：${escapeHtml(evidenceId)} · 分片 ${escapeHtml(String(citation.chunk_index ?? '-'))}</p>
        <p class="text-xs text-slate-500 mb-2">文档版本：${escapeHtml(citation.document_version || '-')} · Chunk：${escapeHtml(citation.chunk_id || '-')}</p>
        <p class="text-sm text-slate-700 whitespace-pre-line">${escapeHtml(content)}</p>
      </div>`;
      openModal(`《${escapeHtml(title)}》历史证据快照`, html, null, '关闭');
    }
    window.showCitationEvidence = showCitationEvidence;

    async function showCitationChunk(docId, chunkIndex, snippet = '') {
      try {
        const data = await apiGet(`/api/knowledge/docs/${docId}/chunks`);
        const chunks = data.chunks || [];
        const title = data.knowledge_doc?.title || '知识文档';
        const hasIndex = chunkIndex !== '' && chunkIndex !== null && chunkIndex !== undefined;
        const chunk = hasIndex ? chunks.find(c => String(c.chunk_index) === String(chunkIndex)) : null;
        let html = '';
        if (!hasIndex) {
          // Legacy citation without chunk_index: show the first chunk only as a reference, clearly labelled.
          const first = chunks[0];
          const content = first ? first.content : '';
          let display = escapeHtml(content);
          if (snippet && content) {
            const plainSnippet = snippet.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&');
            if (plainSnippet.length > 6 && content.includes(plainSnippet)) {
              display = display.replace(escapeHtml(plainSnippet), `<strong class="text-brand-700 bg-brand-50 px-1 rounded">${escapeHtml(plainSnippet)}</strong>`);
            }
          }
          html = `<div class="bg-amber-50 rounded-xl p-3 border border-amber-200">
            <p class="text-xs text-amber-700 mb-2">历史引用，分片编号缺失</p>
            ${content ? `<p class="text-xs text-slate-500 mb-1">参考：文档首分片</p><p class="text-sm text-slate-700 whitespace-pre-line">${display}</p>` : '<p class="text-sm text-slate-500">未找到对应分片内容。</p>'}
          </div>`;
        } else if (chunk) {
          const content = chunk.content;
          let display = escapeHtml(content);
          if (snippet) {
            const plainSnippet = snippet.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&');
            if (plainSnippet.length > 6 && content.includes(plainSnippet)) {
              display = display.replace(escapeHtml(plainSnippet), `<strong class="text-brand-700 bg-brand-50 px-1 rounded">${escapeHtml(plainSnippet)}</strong>`);
            }
          }
          html = `<div class="bg-slate-50 rounded-xl p-3 border border-slate-200">
            <p class="text-xs text-slate-500 mb-2">分片 ${escapeHtml(chunk.chunk_index)}</p>
            <p class="text-sm text-slate-700 whitespace-pre-line">${display}</p>
          </div>`;
        } else {
          // Exact chunk not found: do not silently fall back to the first chunk.
          const available = chunks.map(c => c.chunk_index).join(', ');
          html = `<div class="bg-red-50 rounded-xl p-3 border border-red-200">
            <p class="text-sm font-medium text-red-700 mb-1">该引用分片已不存在或无法定位</p>
            <p class="text-xs text-slate-600">doc_id: ${escapeHtml(docId)}，chunk_index: ${escapeHtml(chunkIndex)}</p>
            ${available ? `<p class="text-xs text-slate-500 mt-1">文档现有分片编号：${escapeHtml(available)}</p>` : '<p class="text-xs text-slate-500 mt-1">该文档暂无分片数据。</p>'}
          </div>`;
        }
        openModal(`《${escapeHtml(title)}》引用分片`, html, null, '关闭');
      } catch (err) {
        showToast('加载引用分片失败：' + (err && err.message ? err.message : err), 'error');
      }
    }
    window.showCitationChunk = showCitationChunk;

    function renderActivatedSkills(skills) {
      if (!skills || skills.length === 0) return '';
      const tags = skills.map(s => `<span class="px-1.5 py-0.5 bg-brand-50 text-brand-600 rounded text-[10px]">${escapeHtml(s)}</span>`).join('');
      return `<div class="flex flex-wrap items-center gap-1 mt-2"><span class="text-[10px] text-slate-400">已调用skill:</span>${tags}</div>`;
    }

    function updateAiMessage(content, done = false, tokenCount = 0, roundTokenCount = 0, messageId = null, tokenDetail = null, citations = null, activatedSkills = null, tools = null, agent = null, modelId = '', thinkingEnabled = null, modelSelectionReason = '', traceId = '', mcpCalls = null, usageSource = '', currentAgentId = '') {
      const current = STATE.currentAiMessage;
      if (!current) return;
      const contentDiv = current.querySelector('.ai-message-content');
      if (!contentDiv) return;
      const clean = stripThinking(content);
      contentDiv.innerHTML = renderMarkdownWithCitations(clean, citations);
      if (done) {
        const indicator = current.querySelector('.ai-message-typing');
        if (indicator) indicator.remove();
        current.classList.remove('ai-message-current');
        if (messageId) current.dataset.messageId = messageId;
        const footer = current.querySelector('.ai-message-footer');
        if (footer) {
          footer.classList.remove('hidden');
          const tokensEl = footer.querySelector('.ai-message-tokens');
          if (tokensEl) {
            tokensEl.innerHTML = renderTokenUsage(tokenCount, roundTokenCount, tokenDetail, usageSource);
          }
          const upBtn = footer.querySelector('.thumb-up-btn');
          const downBtn = footer.querySelector('.thumb-down-btn');
          if (upBtn) upBtn.onclick = () => sendThumbFeedback(messageId, 'thumb_up');
          if (downBtn) downBtn.onclick = () => openThumbFeedbackModal(messageId);
          const tagsEl = footer.querySelector('.ai-message-tags');
          if (tagsEl) {
            const route = STATE.currentRoute || {};
            tagsEl.innerHTML = renderAiMessageTags(activatedSkills, tools, agent, route.reason || '', route.intent || '', modelId, thinkingEnabled, modelSelectionReason, traceId, mcpCalls, usageSource, currentAgentId || route.current_agent_id || '');
          }
          // Persist agent id on the message object so drawer can read it.
          if (STATE.currentMessage) {
            STATE.currentMessage.current_agent_id = currentAgentId || route.current_agent_id || '';
          }
          // Append citation footnotes below the footer row.
          const existingFootnotes = footer.parentElement.querySelector('.ai-message-footnotes');
          if (existingFootnotes) existingFootnotes.remove();
          const footnotes = document.createElement('div');
          footnotes.className = 'ai-message-footnotes';
          footnotes.innerHTML = renderCitations(citations, clean);
          if (footnotes.innerHTML) footer.parentElement.appendChild(footnotes);
        }
        STATE.currentAiMessage = null;
      }
      scrollChatToBottom();
    }

    function scrollChatToBottom() {
      const container = $('#chat-messages');
      if (container) container.scrollTop = container.scrollHeight;
    }

    function finalizeCurrentAiMessage(data = {}) {
      const route = STATE.currentRoute || {};
      STATE.currentRoute = {
        intent: data.route_intent || route.intent || '',
        reason: data.route_reason || route.reason || '',
        current_agent: data.current_agent || route.current_agent || '',
        current_agent_id: data.current_agent_id || route.current_agent_id || ''
      };
      const current = STATE.currentAiMessage;
      if (current) {
        const progressEl = current.querySelector('.ai-message-tool-status');
        if (progressEl) progressEl.textContent = '';
        // The live route line is a running-state aid.  Once completed, the
        // same route reason is rendered in the durable footer tags and Trace,
        // which makes live and restored history visually consistent.
        const routeEl = current.querySelector('.ai-message-route-status');
        if (routeEl) routeEl.textContent = '';
      }
      updateAiMessage(
        data.content || '',
        true,
        data.token_count || 0,
        data.round_token_count || data.token_count || 0,
        data.message_id || data.id || null,
        data.token_detail || null,
        data.citations || null,
        data.activated_skills || null,
        data.tool_calls || null,
        data.current_agent || STATE.currentRoute.current_agent || null,
        data.model_id || '',
        data.thinking_enabled || false,
        data.model_selection_reason || '',
        data.trace_id || STATE.currentTraceId || '',
        data.mcp_calls || null,
        data.usage_source || '',
        data.current_agent_id || STATE.currentRoute.current_agent_id || ''
      );
    }

    async function recoverPersistedAssistantMessage(traceId) {
      if (!STATE.chatSessionId) return null;
      const delays = [0, 250, 750];
      for (const delay of delays) {
        if (delay) await new Promise(resolve => setTimeout(resolve, delay));
        try {
          const res = await fetch(`${API_BASE}/api/chat/history?session_id=${encodeURIComponent(STATE.chatSessionId)}`, {
            cache: 'no-store'
          });
          if (!res.ok) continue;
          const payload = await res.json();
          const assistants = (payload.messages || []).filter(msg => msg.role === 'assistant');
          const matched = traceId
            ? assistants.slice().reverse().find(msg => msg.trace_id === traceId)
            : assistants[assistants.length - 1];
          if (matched && matched.content && matched.status !== 'failed') return matched;
        } catch (err) {
          console.warn('Stream reconciliation attempt failed:', err);
        }
      }
      return null;
    }

    async function sendChatMessage(text) {
      appendUserMessage(text);
      STATE.chatStreaming = true;
      STATE.currentRoute = null;
      const btn = $('#chat-send');
      if (btn) btn.disabled = true;

      const placeholder = appendAiMessagePlaceholder();
      STATE.currentAiMessage = placeholder;
      let accumulated = '';

      try {
        const response = await fetch(`${API_BASE}/api/chat/stream`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, session_id: STATE.chatSessionId, user_id: 'web-user' })
        });

        if (!response.ok) {
          let errText = '';
          try { errText = await response.text(); } catch (e) {}
          throw new Error(`服务暂时不可用（HTTP ${response.status}${errText ? ': ' + errText.slice(0, 200) : ''}）`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let receivedDone = false;
        let finalPayload = null;

        while (true) {
          const { done, value } = await reader.read();
          if (value) buffer += decoder.decode(value, { stream: !done });
          if (done) buffer += decoder.decode();
          buffer = buffer.replace(/\r\n/g, '\n');
          // Some proxies close immediately after the final SSE record and may
          // omit the last empty line. Treat the remaining complete record as a
          // final event instead of leaving the typing indicator forever.
          if (done && buffer.trim() && !buffer.endsWith('\n\n')) buffer += '\n\n';

          // Extract complete SSE events split by double newlines.
          const events = [];
          let idx;
          while ((idx = buffer.indexOf('\n\n')) !== -1) {
            events.push(buffer.slice(0, idx));
            buffer = buffer.slice(idx + 2);
          }

          for (const event of events) {
            if (!event.trim()) continue;
            let eventType = '';
            const dataLines = [];
            for (const line of event.split('\n')) {
              if (line.startsWith('event:')) eventType = line.slice(6).trim();
              else if (line.startsWith('data:')) dataLines.push(line.slice(5).trim());
            }
            if (dataLines.length === 0) continue;

            let data;
            try {
              data = JSON.parse(dataLines.join('\n'));
            } catch (e) {
              console.warn('SSE data parse error:', e, dataLines.join('\n'));
              continue;
            }

            if (eventType === 'start') {
              STATE.chatSessionId = data.session_id;
              try { localStorage.setItem('chatSessionId', data.session_id); } catch (e) {}
              if (data.trace_id) STATE.currentTraceId = data.trace_id;
            } else if (eventType === 'route') {
              STATE.currentRoute = {
                intent: data.intent || '',
                reason: data.reason || '',
                current_agent: data.current_agent || '',
                current_agent_id: data.current_agent_id || ''
              };
              const statusEl = placeholder.querySelector('.ai-message-route-status');
              if (statusEl) statusEl.textContent = `路由：${data.reason || data.intent || ''} → ${data.current_agent || ''}`;
            } else if (eventType === 'progress') {
              const progressLabels = {
                'rag.retrieve': '正在检索知识库…',
                'mcp.invoke': '正在调用已绑定工具…',
                'model.invoke': '正在生成回复…'
              };
              const statusEl = placeholder.querySelector('.ai-message-tool-status');
              if (statusEl) statusEl.textContent = progressLabels[data.stage] || '正在处理…';
            } else if (eventType === 'delta') {
              if (data.current_agent && STATE.currentRoute) STATE.currentRoute.current_agent = data.current_agent;
              if (data.current_agent_id && STATE.currentRoute) STATE.currentRoute.current_agent_id = data.current_agent_id;
              accumulated += (data.content || '');
              updateAiMessage(accumulated);
            } else if (eventType === 'final') {
              if (data.current_agent && STATE.currentRoute) STATE.currentRoute.current_agent = data.current_agent;
              if (data.current_agent_id && STATE.currentRoute) STATE.currentRoute.current_agent_id = data.current_agent_id;
              if (typeof data.content === 'string') accumulated = data.content;
              finalPayload = data;
              const statusEl = placeholder.querySelector('.ai-message-tool-status');
              if (statusEl) statusEl.textContent = '';
              updateAiMessage(accumulated);
            } else if (eventType === 'tool_calls') {
              if (data.current_agent && STATE.currentRoute) STATE.currentRoute.current_agent = data.current_agent;
              if (data.current_agent_id && STATE.currentRoute) STATE.currentRoute.current_agent_id = data.current_agent_id;
              const toolNames = (data.tool_calls || []).map(t => typeof t === 'string' ? t : (t.name || t.tool_name || JSON.stringify(t))).join('、');
              const statusEl = placeholder.querySelector('.ai-message-tool-status');
              if (statusEl) statusEl.textContent = toolNames ? `调用工具：${toolNames}` : '';
            } else if (eventType === 'done') {
              receivedDone = true;
              if (typeof data.content === 'string') accumulated = data.content;
              finalizeCurrentAiMessage({ ...data, content: accumulated });
              if (data.handoff) {
                const handoffStatus = data.handoff_state || data.handoff_status || 'requested';
                STATE.chatHandoff = ['requested', 'active', 'waiting_user'].includes(handoffStatus);
                updateHandoffBanner(handoffStatus);
                showToast(handoffStatus === 'active' ? '信息已同步给人工处理人' : '人工协同状态已更新', 'success');
              }
              loadChatSessions().then(() => refreshSidebar());
              STATE.currentTraceId = null;
            } else if (eventType === 'error') {
              receivedDone = true;
              accumulated += `\n\n[错误: ${data.error}]`;
              updateAiMessage(accumulated, true);
            }
          }
          if (done) break;
        }

        if (!receivedDone) {
          const recovered = await recoverPersistedAssistantMessage(STATE.currentTraceId);
          if (recovered) {
            accumulated = recovered.content || accumulated;
            finalizeCurrentAiMessage(recovered);
            receivedDone = true;
            loadChatSessions().then(() => refreshSidebar());
            STATE.currentTraceId = null;
          } else if (finalPayload && typeof finalPayload.content === 'string') {
            accumulated = finalPayload.content;
            finalizeCurrentAiMessage({
              ...finalPayload,
              content: accumulated,
              trace_id: STATE.currentTraceId || ''
            });
            receivedDone = true;
            STATE.currentTraceId = null;
          } else {
            throw new Error('流式连接提前结束，且未找到已持久化的完整回复，请重试');
          }
        }
      } catch (err) {
        console.error('Chat error:', err);
        updateAiMessage((accumulated ? accumulated + '\n\n' : '') + `[${err.message || '连接失败，请稍后重试'}]`, true);
      } finally {
        STATE.chatStreaming = false;
        const btn = $('#chat-send');
        if (btn) btn.disabled = false;
      }
    }

    async function restoreChatMessages() {
      if (!STATE.chatSessionId) return;
      try {
        const res = await fetch(`${API_BASE}/api/chat/history?session_id=${encodeURIComponent(STATE.chatSessionId)}`);
        if (!res.ok) return;
        const data = await res.json();
        const messages = data.messages || [];
        const session = data.session || {};
        STATE.chatHandoff = ['requested', 'active', 'waiting_user'].includes(session.handoff_status);
        const container = $('#chat-message-list');
        if (!container) return;
        // Clear existing messages except the welcome message
        const welcome = container.querySelector('.welcome-message');
        container.innerHTML = '';
        if (welcome) container.appendChild(welcome);
        messages.forEach(msg => {
          if (msg.role === 'user') {
            appendUserMessage(msg.content || '', msg.created_at);
          } else if (msg.role === 'assistant') {
            appendAiMessageFromHistory(
              msg.content || '',
              msg.created_at,
              msg.token_count,
              msg.round_token_count || msg.token_count,
              msg.id,
              msg.token_detail,
              msg.citations,
              msg.activated_skills,
              msg.tool_calls,
              msg.current_agent,
              msg.route_reason,
              msg.route_intent,
              msg.model_id,
              msg.thinking_enabled,
              msg.model_selection_reason,
              msg.trace_id,
              msg.mcp_calls,
              msg.usage_source,
              msg.current_agent_id
            );
          } else if (msg.role === 'staff') {
            appendStaffMessage(msg.content || '', msg.created_at);
          }
        });
        updateHandoffBanner(session.handoff_status);
      } catch (err) {
        console.error('Restore chat history failed:', err);
      }
    }

    function openFeedbackModal(messageId, content) {
      const body = `

          showToast('请填写具体描述', 'error');

            method: 'POST',

            body: JSON.stringify({ session_id: STATE.chatSessionId, message_id: messageId, reason })

          closeModal();
          return true;

          return false;

    async function loadHandoffSessions() {
      const content = $('#handoff-content');
      if (!content) return;
      content.innerHTML = loadingState();
      try {
        const data = await apiGet('/api/chat/handoffs');
        const sessions = data.sessions || [];
        if (!sessions.length) { content.innerHTML = emptyState('暂无待处理的人工协同会话'); return; }
        content.innerHTML = `<div class="bg-white rounded-2xl shadow-soft border border-slate-200 overflow-x-auto"><table class="w-full min-w-[860px] text-sm text-left"><thead class="bg-slate-50 text-slate-600"><tr><th class="px-4 py-3 font-medium">会话</th><th class="px-4 py-3 font-medium">责任状态</th><th class="px-4 py-3 font-medium">风险 / 队列</th><th class="px-4 py-3 font-medium">接管原因</th><th class="px-4 py-3 font-medium">最后动作</th><th class="px-4 py-3 font-medium">操作</th></tr></thead><tbody class="divide-y divide-slate-100">${sessions.map(s => { const meta = handoffStatusMeta(s.handoff_status); return `<tr class="hover:bg-slate-50"><td class="px-4 py-3"><div class="font-mono text-xs text-slate-600">${escapeHtml(s.session_id)}</div><div class="text-[11px] text-slate-400 mt-1">${escapeHtml(s.assigned_to || '未分配')}</div></td><td class="px-4 py-3"><span class="text-xs px-2 py-1 rounded-full ${meta.cls}" title="${escapeHtml(meta.hint)}">${meta.label}</span></td><td class="px-4 py-3"><div class="text-xs font-medium text-slate-700">${escapeHtml(s.handoff_risk_level || 'L3')}</div><div class="text-[11px] text-slate-400">${escapeHtml(s.handoff_queue || 'property_service')}</div></td><td class="px-4 py-3 text-slate-700 max-w-xs">${escapeHtml(s.handoff_reason || '-')}</td><td class="px-4 py-3 text-xs text-slate-500">${formatTimeLabel(s.handoff_last_action_at || s.handoff_requested_at)}</td><td class="px-4 py-3"><button data-session="${escapeHtml(s.session_id)}" class="handoff-workbench-btn text-xs px-3 py-1.5 bg-brand-600 hover:bg-brand-700 text-white rounded-lg transition-colors">查看接管包 / 处理</button></td></tr>`; }).join('')}</tbody></table></div>`;
        $$('.handoff-workbench-btn').forEach(btn => btn.addEventListener('click', () => openHandoffWorkbench(btn.dataset.session)));
      } catch (err) { content.innerHTML = emptyState('加载失败，请刷新重试'); }
    }

    function renderHandoffContextMessage(msg) {
      const role = msg.role === 'staff' ? '工作人员' : (msg.role === 'assistant' ? 'AI' : '业主');
      const style = msg.role === 'staff' ? 'bg-indigo-50 border-indigo-100' : (msg.role === 'assistant' ? 'bg-brand-50 border-brand-100' : 'bg-slate-50 border-slate-200');
      return `<div class="mb-2"><p class="text-[10px] text-slate-400 mb-0.5">${role} · ${formatTimeLabel(msg.created_at)}</p><div class="${style} border rounded-lg p-2 text-xs text-slate-700 whitespace-pre-wrap">${escapeHtml(msg.content || '')}</div></div>`;
    }

    async function openHandoffWorkbench(sessionId) {
      const modal = document.createElement('div');
      modal.className = 'fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4';
      modal.innerHTML = `<div class="bg-white rounded-2xl shadow-2xl w-full max-w-5xl max-h-[92vh] flex flex-col overflow-hidden"><div class="px-6 py-4 border-b border-slate-200 flex items-center justify-between"><div><h3 class="text-lg font-semibold text-slate-900">人工协同接管包</h3><p class="text-xs text-slate-400 font-mono mt-1">${escapeHtml(sessionId)}</p></div><button class="handoff-close-modal p-2 text-slate-400 hover:text-slate-600">&times;</button></div><div id="handoff-workbench-content" class="p-6 overflow-y-auto flex-1">${loadingState()}</div></div>`;
      document.body.appendChild(modal);
      const close = () => modal.remove();
      modal.querySelector('.handoff-close-modal').addEventListener('click', close);
      modal.addEventListener('click', e => { if (e.target === modal) close(); });
      const target = modal.querySelector('#handoff-workbench-content');
      try {
        const [bundle, history] = await Promise.all([apiGet(`/api/chat/handoff/${encodeURIComponent(sessionId)}/package`), apiGet(`/api/chat/history?session_id=${encodeURIComponent(sessionId)}`)]);
        const session = bundle.session || {};
        const pkg = bundle.package || {};
        const risk = pkg.risk || {};
        const meta = handoffStatusMeta(session.handoff_status);
        const actions = bundle.actions || [];
        const messages = history.messages || [];
        const canClaim = ['requested', 'waiting_user'].includes(session.handoff_status);
        const canReply = session.handoff_status === 'active';
        const canResolve = ['active', 'waiting_user'].includes(session.handoff_status);
        const canClose = session.handoff_status === 'resolved';
        target.innerHTML = `<div class="space-y-5"><div class="flex flex-wrap items-center gap-2"><span class="px-2 py-1 rounded-full text-xs ${meta.cls}">${meta.label}</span><span class="text-xs text-slate-500">${escapeHtml(meta.hint)}</span><span class="text-xs px-2 py-1 rounded-full bg-red-50 text-red-700">${escapeHtml(session.handoff_risk_level || risk.level || 'L3')}</span><span class="text-xs text-slate-400">队列：${escapeHtml(session.handoff_queue || risk.queue || 'property_service')}</span></div><section class="rounded-xl border border-slate-200 p-4"><h4 class="font-medium text-slate-900 mb-2">业主原始诉求</h4><p class="text-sm text-slate-700 whitespace-pre-wrap">${escapeHtml((pkg.owner_request || {}).content || session.handoff_reason || '-')}</p><p class="text-xs text-slate-500 mt-2">接管原因：${escapeHtml(session.handoff_reason || risk.reason || '-')}</p><p class="text-xs text-slate-500 mt-1">工作人员要决定：${escapeHtml(pkg.human_task || risk.human_task || '-')}</p></section><section><h4 class="font-medium text-slate-900 mb-2">AI 已完成的可核验证据</h4>${compactHandoffEvidence(pkg)}</section><section class="rounded-xl border border-slate-200 p-4"><h4 class="font-medium text-slate-900 mb-2">操作审计</h4><div class="space-y-2">${actions.length ? actions.map(a => `<div class="text-xs border-l-2 border-slate-200 pl-3"><span class="text-slate-700">${escapeHtml(a.action_type)}</span> <span class="text-slate-400">${escapeHtml(a.status_before || '-')} → ${escapeHtml(a.status_after || '-')} · ${escapeHtml(a.actor || '-')} · ${formatTimeLabel(a.created_at)}</span></div>`).join('') : '<p class="text-xs text-slate-400">暂无操作记录</p>'}</div></section><details class="rounded-xl border border-slate-200 p-4"><summary class="font-medium text-slate-900 cursor-pointer">查看最近会话上下文（${messages.length} 条）</summary><div class="mt-3 max-h-64 overflow-y-auto">${messages.slice(-12).map(renderHandoffContextMessage).join('')}</div></details>${session.handoff_summary ? `<section class="rounded-xl bg-emerald-50 border border-emerald-200 p-4"><h4 class="font-medium text-emerald-800 mb-1">人工处理结论</h4><p class="text-sm text-emerald-900 whitespace-pre-wrap">${escapeHtml(session.handoff_summary)}</p></section>` : ''}<section class="rounded-xl bg-slate-50 border border-slate-200 p-4 space-y-3"><h4 class="font-medium text-slate-900">人工操作</h4><div class="grid grid-cols-1 md:grid-cols-2 gap-3"><div><label class="text-xs text-slate-500">工作人员姓名</label><input id="handoff-staff-name" value="${escapeHtml(session.assigned_to || '张师傅')}" class="mt-1 w-full px-3 py-2 border border-slate-200 rounded-lg text-sm"></div><div><label class="text-xs text-slate-500">回复 / 处理结论</label><textarea id="handoff-staff-message" rows="3" placeholder="回复业主，或填写本次处理结论" class="mt-1 w-full px-3 py-2 border border-slate-200 rounded-lg text-sm"></textarea></div></div><label class="flex items-center gap-2 text-xs text-slate-600"><input id="handoff-create-badcase" type="checkbox">此处理暴露了 AI 能力问题，沉淀为 Badcase 复盘</label><div class="flex flex-wrap gap-2">${canClaim ? '<button id="handoff-claim-btn" class="px-3 py-2 bg-brand-600 text-white rounded-lg text-sm">领取并接管</button>' : ''}${canReply ? '<button id="handoff-reply-btn" class="px-3 py-2 bg-indigo-600 text-white rounded-lg text-sm">发送人工回复</button><button id="handoff-wait-btn" class="px-3 py-2 bg-blue-600 text-white rounded-lg text-sm">请求业主补充</button>' : ''}${canResolve ? '<button id="handoff-resolve-btn" class="px-3 py-2 bg-emerald-600 text-white rounded-lg text-sm">记录处理结果</button>' : ''}${canClose ? '<button id="handoff-close-btn" class="px-3 py-2 bg-slate-700 text-white rounded-lg text-sm">关闭协同</button>' : ''}</div></section></div>`;
        const staff = () => (modal.querySelector('#handoff-staff-name').value.trim() || '物业工作人员');
        const message = () => modal.querySelector('#handoff-staff-message').value.trim();
        const post = async (path, body, success) => { const res = await fetch(`${API_BASE}${path}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }); if (!res.ok) { const detail = await res.text(); throw new Error(detail || '操作失败'); } showToast(success, 'success'); close(); await loadHandoffSessions(); };
        const claim = modal.querySelector('#handoff-claim-btn'); if (claim) claim.addEventListener('click', async () => { try { await post('/api/chat/handoff-claim', { session_id: sessionId, staff_name: staff() }, '已领取人工协同会话'); } catch (err) { showToast('领取失败：' + err.message, 'error'); } });
        const reply = modal.querySelector('#handoff-reply-btn'); if (reply) reply.addEventListener('click', async () => { if (!message()) return showToast('请输入回复内容', 'error'); try { await post('/api/chat/handoff-reply', { session_id: sessionId, staff_name: staff(), message: message() }, '人工回复已发送'); } catch (err) { showToast('发送失败：' + err.message, 'error'); } });
        const wait = modal.querySelector('#handoff-wait-btn'); if (wait) wait.addEventListener('click', async () => { if (!message()) return showToast('请说明需要业主补充的信息', 'error'); try { await post('/api/chat/handoff-waiting-user', { session_id: sessionId, staff_name: staff(), message: message() }, '已请求业主补充信息'); } catch (err) { showToast('操作失败：' + err.message, 'error'); } });
        const resolve = modal.querySelector('#handoff-resolve-btn'); if (resolve) resolve.addEventListener('click', async () => { if (!message()) return showToast('请填写处理结论', 'error'); try { await post('/api/chat/handoff-resolve', { session_id: sessionId, staff_name: staff(), resolution: message(), create_badcase: modal.querySelector('#handoff-create-badcase').checked }, '人工处理结果已记录'); } catch (err) { showToast('操作失败：' + err.message, 'error'); } });
        const closeBtn = modal.querySelector('#handoff-close-btn'); if (closeBtn) closeBtn.addEventListener('click', async () => { try { await post('/api/chat/handoff-close', { session_id: sessionId, staff_name: staff() }, '人工协同已关闭'); } catch (err) { showToast('关闭失败：' + err.message, 'error'); } });
      } catch (err) { target.innerHTML = `<p class="text-sm text-red-600">加载接管包失败：${escapeHtml(err.message || String(err))}</p>`; }
    }

          <div id="knowledge-content">${loadingState()}</div>

      `;

      let activeTab = 'docs';

      function setTab(tab) {
        activeTab = tab;

      function setSearchMode(mode) {

        $('#knowledge-search-input').placeholder = mode === 'semantic' ? '输入自然语言查询语义检索...' : '输入关键词搜索知识库...';

      function indexStatusBadge(doc) {
        if (!doc.is_indexed) return `<span class="text-xs px-2 py-1 bg-slate-100 text-slate-500 rounded-full">验收隔离 · 不参与业主检索</span>`;

      }

      async function loadDocs(query) {
        $('#knowledge-docs-list').innerHTML = loadingState();
        try {
          let path;

            path = `/api/knowledge/search?query=${encodeURIComponent(query)}&mode=${searchMode}`;

                <form id="retrieval-settings-form" class="space-y-5">

                  ${formInput('关键词权重（0-1）', 'rs-keyword-weight', s.keyword_weight != null ? String(s.keyword_weight) : '0.3', '如：0.3', 'number')}
                  ${formInput('语义权重（0-1）', 'rs-semantic-weight', s.semantic_weight != null ? String(s.semantic_weight) : '0.7', '如：0.7', 'number')}
                  ${formInput('RRF 融合参数 K', 'rs-rrf-k', s.rrf_k != null ? String(s.rrf_k) : '60', '如：60', 'number')}
                  ${formSwitch('启用重排序', 'rs-enable-rerank', !!s.enable_rerank)}
                  ${formInput('重排序模型', 'rs-rerank-model', s.rerank_model || '', '如：cross-encoder/ms-marco-MiniLM-L-6-v2')}
                  ${formInput('相似度阈值（可选）', 'rs-score-threshold', s.score_threshold != null ? String(s.score_threshold) : '', '如：0.5', 'number')}
                  ${formInput('证据相关性阈值（0-1）', 'rs-context-threshold', s.context_threshold != null ? String(s.context_threshold) : '0.2', '如：0.2；越高越严格', 'number')}
                  <div class="pt-2">
                    <button type="submit" class="px-4 py-2 bg-brand-600 hover:bg-brand-700 text-white rounded-xl text-sm transition-colors">保存设置</button>
                  </div>
                </form>
              </div>
            </div>
          `;
          $('#retrieval-settings-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
              top_k: parseInt($('#rs-topk').value || '5', 10),
              keyword_weight: parseFloat($('#rs-keyword-weight').value),
              semantic_weight: parseFloat($('#rs-semantic-weight').value),
              rrf_k: parseInt($('#rs-rrf-k').value || '60', 10),
              enable_rerank: $('#rs-enable-rerank').checked,
              rerank_model: $('#rs-rerank-model').value.trim() || null,
              score_threshold: $('#rs-score-threshold').value.trim() ? parseFloat($('#rs-score-threshold').value) : null,
              context_threshold: $('#rs-context-threshold').value.trim() ? parseFloat($('#rs-context-threshold').value) : null
            };
            try {
              await apiPost('/api/knowledge/retrieval-settings', payload);
              showToast('检索设置已保存');
            } catch (err) {
              showToast('保存失败：' + err.message, 'error');
            }
          });
        } catch (err) {
          $('#knowledge-content').innerHTML = emptyState('加载设置失败');
        }
      }

      function renderDebugColumn(title, results) {
        return `
          <div class="bg-white rounded-2xl shadow-soft border border-slate-200 p-4">
            <h3 class="text-sm font-semibold text-slate-900 mb-3">${title} <span class="text-xs font-normal text-slate-400">(${results.length})</span></h3>
            <div class="space-y-3">
              ${results.length === 0 ? '<p class="text-xs text-slate-400">无结果</p>' : results.map((r, i) => {
                const docId = r.doc_id || r.id || '';
                const docTitle = r.doc_title || r.title || '未知文档';
                const chunkIdx = r.chunk_index != null ? r.chunk_index : '';
                const evidenceMeta = [
                  r.retrieval_sources?.length ? `召回：${r.retrieval_sources.join('+')}` : '',
                  r.retrieval_paths?.length ? `路径：${r.retrieval_paths.join('+')}` : '',
                  r.rrf_score != null ? `RRF：${Number(r.rrf_score).toFixed(4)}` : '',
                  r.context_score != null ? `证据相关度：${Number(r.context_score).toFixed(3)}` : '',
                  r.rerank_mode === 'lexical_fallback' ? '重排：本地词项降级' : (r.rerank_mode === 'cross_encoder' ? '重排：Cross-Encoder' : ''),
                  r.evidence_status === 'filtered_low_relevance' ? '已被证据阈值过滤' : ''
                ].filter(Boolean).join(' · ');
                return `
                <div class="bg-slate-50 rounded-xl p-3 border border-slate-200">
                  <div class="flex items-center justify-between mb-1">
                    <span class="text-xs font-semibold text-slate-500">#${i + 1} ${escapeHtml(docTitle)}</span>
                    <span class="text-xs font-mono text-slate-600">score ${typeof r.score === 'number' ? r.score.toFixed(3) : '-'}</span>
                  </div>
                  <p class="text-[10px] text-slate-400 mb-2">${escapeHtml(evidenceMeta || '原始候选')}</p>
                  <p class="text-xs text-slate-700 mb-2 max-h-20 overflow-hidden">${escapeHtml((r.content || '').slice(0, 180))}${(r.content || '').length > 180 ? '...' : ''}</p>
                  <button class="debug-view-chunk text-xs text-brand-600 hover:text-brand-700 underline" data-doc-id="${docId}" data-chunk-index="${chunkIdx}">查看分片</button>
                </div>
              `;
              }).join('')}
            </div>
          </div>
        `;
      }

      async function renderDebugTab() {
        $('#knowledge-content').innerHTML = `
          <div class="space-y-4">
            <form id="retrieval-debug-form" class="flex gap-2">
              <input id="debug-query" type="text" placeholder="输入检索问题..." class="flex-1 px-4 py-2.5 bg-white border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-brand-400 focus:ring-2 focus:ring-brand-100">
              <button type="submit" class="px-4 py-2.5 bg-brand-600 hover:bg-brand-700 text-white rounded-xl text-sm transition-colors">检索</button>
            </form>
            <div id="debug-rerank-note" class="hidden text-xs text-slate-500 bg-slate-50 rounded-lg p-3 border border-slate-200"></div>
            <div id="debug-results" class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-4 gap-4"></div>
          </div>
        `;
        $('#retrieval-debug-form').addEventListener('submit', async (e) => {
          e.preventDefault();
          const query = $('#debug-query').value.trim();
          if (!query) {
            showToast('请输入检索问题', 'error');
            return;
          }
          $('#debug-results').innerHTML = `<div class="col-span-full flex justify-center py-10 text-slate-400"><div class="w-8 h-8 border-2 border-slate-200 border-t-brand-500 rounded-full animate-spin mr-2"></div>检索中...</div>`;
          $('#debug-rerank-note').classList.add('hidden');
          try {
            const data = await apiPost('/api/retrieval/debug', { query });
            const settings = data.settings || {};
            const rerankEnabled = !!settings.enable_rerank;
            const rerankReturned = Array.isArray(data.reranked_results) && data.reranked_results.length > 0;
            const noteEl = $('#debug-rerank-note');
            noteEl.classList.remove('hidden');
            if (rerankEnabled && rerankReturned) {
              noteEl.textContent = `重排序已启用（模型：${settings.rerank_model || '默认'}），下方展示重排后的结果。`;
              noteEl.className = 'text-xs text-brand-600 bg-brand-50 rounded-lg p-3 border border-brand-100';
            } else if (rerankEnabled && !rerankReturned) {
              noteEl.textContent = '重排序开关已启用，但后端本次未返回重排序结果，下方展示 RRF 融合结果。';
              noteEl.className = 'text-xs text-amber-600 bg-amber-50 rounded-lg p-3 border border-amber-100';
            } else {
              noteEl.textContent = '重排序未启用，下方展示关键词、语义、RRF 融合及最终结果。';
              noteEl.className = 'text-xs text-slate-500 bg-slate-50 rounded-lg p-3 border border-slate-200';
            }
            $('#debug-results').innerHTML =
              renderDebugColumn('关键词检索', data.keyword_results || []) +
              renderDebugColumn('语义检索', data.semantic_results || []) +
              renderDebugColumn('RRF 融合', data.fused_results || []) +
              renderDebugColumn('最终结果', data.results || []);
            $$('.debug-view-chunk').forEach(btn => {
              btn.addEventListener('click', () => showCitationChunk(Number(btn.dataset.docId), btn.dataset.chunkIndex));
            });
          } catch (err) {
            $('#debug-results').innerHTML = `<div class="col-span-full text-sm text-red-600">检索失败：${escapeHtml(err.message)}</div>`;
          }
        });
      }

      function bindKnowledgeActions() {
        $$('.knowledge-edit-btn').forEach(btn => {
          btn.addEventListener('click', () => editKnowledgeDoc(Number(btn.dataset.id)));
        });
        $$('.knowledge-delete-btn').forEach(btn => {
          btn.addEventListener('click', () => deleteKnowledgeDoc(Number(btn.dataset.id)));
        });
        $$('.knowledge-reindex-btn').forEach(btn => {
          btn.addEventListener('click', () => reindexDoc(Number(btn.dataset.id)));
        });

          btn.addEventListener('click', () => viewChunks(Number(btn.dataset.id)));

      function openKnowledgeModal(doc = null) {
        const isEdit = !!doc;
        const title = isEdit ? '编辑知识文档' : '新增知识文档';
        const addNote = isEdit ? '' : `<div class="bg-blue-50 text-blue-800 text-xs rounded-lg p-2 mb-3 border border-blue-100 space-y-1"><p>保存后系统将自动进行结构化文本切分、关键词索引与向量索引；无需手动选择 RAG 方案。当前仅支持文本粘贴，不支持 PDF/Word 上传。</p><p>章节、FAQ、编号规则会尽量保持为可引用证据单元；短而完整的规则可能只有 1 个分片，属于正常结果。</p></div>`;
        const sourceType = doc?.source_type || 'business';
        const body = `
          ${addNote}
          ${formInput('标题', 'kd-title', doc ? doc.title : '', '请输入文档标题')}
          ${formInput('分类', 'kd-category', doc ? doc.category : '', '如：服务承诺、收费标准、FAQ')}
          <div><label class="block text-sm font-medium text-slate-700 mb-1.5">文档用途</label><select id="kd-source-type" class="w-full px-3 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-brand-400"><option value="business" ${sourceType === 'business' ? 'selected' : ''}>业务知识（参与业主 RAG）</option><option value="demo_test" ${sourceType === 'demo_test' ? 'selected' : ''}>验收/测试材料（隔离，不参与业主 RAG）</option></select></div>
          ${formTextarea('内容', 'kd-content', doc ? doc.content : '', '请输入知识库内容，支持多行文本', 8)}
        `;
        openModal(title, body, async () => {
          const payload = {
            title: $('#kd-title').value.trim(),
            category: $('#kd-category').value.trim() || '未分类',
            source_type: $('#kd-source-type').value,
            content: $('#kd-content').value.trim()
          };
          if (!payload.title || !payload.content) {
            showToast('标题和内容不能为空', 'error');
            return;
          }
          try {
            if (isEdit) {
              await apiPut(`/api/knowledge/docs/${doc.id}`, payload);
              showToast('知识文档 Draft 已更新；发布 RuntimeRelease 后进入下一新会话');
            } else {
              await apiPost('/api/knowledge/docs', payload);
              showToast('知识文档 Draft 已创建并索引；发布 RuntimeRelease 后进入下一新会话');
            }
            closeModal();
            if (activeTab === 'docs') await loadDocs($('#knowledge-search-input').value.trim());
          } catch (err) {
            showToast('保存失败，请重试', 'error');
          }
        });
      }

      async function editKnowledgeDoc(docId) {
        try {
          const data = await apiGet(`/api/knowledge/docs/${docId}`);
          openKnowledgeModal(data.knowledge_doc);
        } catch (err) {
          showToast('加载文档失败', 'error');
        }
      }

      async function deleteKnowledgeDoc(docId) {
        if (!confirm('确定要删除这条知识文档吗？')) return;
        try {
          await apiDelete(`/api/knowledge/docs/${docId}`);
          showToast('知识文档已删除');
          if (activeTab === 'docs') await loadDocs($('#knowledge-search-input').value.trim());
        } catch (err) {
          showToast('删除失败，请重试', 'error');
        }
      }

      async function reindexDoc(docId) {
        try {
          await apiPost(`/api/knowledge/docs/${docId}/reindex`);
          showToast('重新索引已开始');
          if (activeTab === 'docs') await loadDocs($('#knowledge-search-input').value.trim());
        } catch (err) {
          showToast('重新索引失败', 'error');
        }
      }

      async function viewChunks(docId) {
        try {
          const data = await apiGet(`/api/knowledge/docs/${docId}/chunks`);
          const chunks = data.chunks || [];
          const title = data.knowledge_doc?.title || '知识文档';
          const html = chunks.length === 0
            ? '<p class="text-sm text-slate-500">暂无分片，请先点击“重新索引”。</p>'
            : `<div class="space-y-3">${chunks.map((c) => `
                <div class="bg-slate-50 rounded-xl p-3 border border-slate-200">
                  <p class="text-[10px] text-slate-400 mb-1">分片 #${c.chunk_index != null ? c.chunk_index : '?'}</p>
                  <p class="text-sm text-slate-700 whitespace-pre-line">${escapeHtml(c.content)}</p>
                </div>
              `).join('')}</div>`;
          openModal(`《${escapeHtml(title)}》分片详情`, html, null, '关闭');
        } catch (err) {
          showToast('加载分片失败', 'error');
        }
      }

      $$('.knowledge-tab-btn').forEach(btn => {
        btn.addEventListener('click', () => setTab(btn.dataset.tab));
      });
      $('#knowledge-add-btn').addEventListener('click', () => openKnowledgeModal());
      setTab('docs');
    }

        return '<span class="text-[10px] px-2 py-0.5 rounded-full bg-slate-100 text-slate-500 border border-slate-200">auto</span>';
      }
      function priorityBadge(priority) {
        const color = priority === 'high' ? 'bg-red-500' : (priority === 'medium' ? 'bg-amber-500' : 'bg-slate-300');
        const label = priority === 'high' ? '高' : (priority === 'medium' ? '中' : (priority === 'low' ? '低' : '默认'));
        return `<span class="inline-flex items-center gap-1 text-xs text-slate-600"><span class="w-2 h-2 rounded-full ${color}"></span>${label}</span>`;
      }
      function traceSnippet(traceId) {
        if (!traceId) return '<span class="text-xs text-slate-400">-</span>';
        const short = traceId.length > 12 ? traceId.slice(0, 12) + '…' : traceId;
        return `<a href="#observability?trace_id=${encodeURIComponent(traceId)}" class="font-mono text-xs text-brand-600 hover:text-brand-700 bg-slate-50 px-2 py-1 rounded border border-slate-200 whitespace-nowrap" title="${escapeHtml(traceId)}">${escapeHtml(short)}</a>`;

      async function loadBadcases() {

        const hasTrace = $('#badcase-filter-has-trace').value;
        const hasRetest = $('#badcase-filter-has-retest').value;
        const start = $('#badcase-filter-start').value;
        const end = $('#badcase-filter-end').value;
        $('#badcases-content').innerHTML = loadingState();
        try {
          let path = '/api/badcases';
          const params = [];
          if (status) params.push(`status=${encodeURIComponent(status)}`);
          if (category) params.push(`category=${encodeURIComponent(category)}`);
          if (source) params.push(`source=${encodeURIComponent(source)}`);
          if (hasTrace) params.push(`has_trace=${encodeURIComponent(hasTrace)}`);
          if (hasRetest) params.push(`has_retest=${encodeURIComponent(hasRetest)}`);
          if (start) params.push(`created_after=${encodeURIComponent(start + ' 00:00:00')}`);
          if (end) params.push(`created_before=${encodeURIComponent(end + ' 23:59:59')}`);
          if (params.length) path += '?' + params.join('&');
          const data = await apiGet(path);

                      <th class="px-4 py-3 text-left font-semibold text-slate-600">操作</th>
                    </tr>
